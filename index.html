<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Загрузчик файлов</title>
</head>
<body>

    <input type="file" id="fileInput" />
    <button onclick="uploadToPuter()">Загрузить на сервер</button>

    <script src="https://js.puter.com/v2/"></script>

    <script>
        async function uploadToPuter() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];

            if (!file) {
                alert('выбери файл');
                return;
            }

            try {
                // 1. Создаем папку, если её нет
                await puter.fs.mkdir('uploads').catch(() => {});

                // 2. Загружаем файл
                const uploadedFile = await puter.fs.write('uploads/' + file.name, file);
                
                // 3. Получаем публичную ссылку через метод .url()
                // Это универсальный способ для актуальной версии Puter.js
                const url = await uploadedFile.url();
                
                console.log('ссылка для скачивания:', url);
                alert('файл готов! ссылка: ' + url);
            } catch (err) {
                console.error('Ошибка:', err);
                alert('ошибка: ' + err.message);
            }
        }
    </script>
</body>
</html>
