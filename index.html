<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MesWy — Социальная сеть</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#121212',
                        darkPanel: '#1f1f22',
                        darkHover: '#2a2a2e',
                        primary: 'var(--accent-color)'
                    },
                    borderRadius: { 'custom': '16px' }
                }
            }
        }
    </script>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        :root { --accent-color: #2563eb; }
        * { box-sizing: border-box; }
        body { background-color: #121212; color: #e5e7eb; font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 20px; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .toast-enter { animation: slideIn 0.3s ease-out forwards; }

        /* Навигация */
        .nav-btn {
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1 1 0;
            padding: 8px 0;
            position: relative;
            color: #9ca3af;
        }
        .nav-btn i { font-size: 26px; transition: color 0.2s; }
        .nav-btn .nav-label { display: none; }
        .nav-btn.active i { color: #2563eb !important; }
        .nav-btn.active .nav-label { color: #2563eb !important; }
        /* Для ПК отображаем лейблы при наведении */
        @media (min-width: 640px) {
            .nav-btn { padding: 12px 16px; justify-content: flex-start; flex: none; width: 100%; }
            .nav-btn i { font-size: 28px; min-width: 3rem; text-align: center; }
            .nav-btn .nav-label { display: inline; margin-left: 12px; font-weight: 500; opacity: 0; transition: opacity 0.2s; white-space: nowrap; }
            .group:hover .nav-btn .nav-label { opacity: 1; }
        }
        /* Мобильное меню: без отступов, кнопки по центру */
        .mobile-nav {
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 100%;
            padding: 0 4px;
        }
        .mobile-nav .nav-btn {
            flex: 1;
            justify-content: center;
            padding: 4px 0;
        }
        .mobile-nav .nav-btn i { font-size: 24px; }
        @media (max-width: 639px) {
            .nav-btn .nav-label { display: none; }
        }

        /* Панели (выезжающие) */
        .slide-panel {
            position: fixed;
            top: 0;
            right: 0;
            height: 100%;
            width: 100%;
            max-width: 480px;
            background: #1f1f22;
            z-index: 50;
            transform: translateX(100%);
            transition: transform 0.3s ease;
            border-left: 1px solid #2a2a2e;
            display: flex;
            flex-direction: column;
        }
        .slide-panel.open { transform: translateX(0); }
        .slide-panel .panel-header {
            padding: 16px 20px;
            border-bottom: 1px solid #2a2a2e;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1f1f22;
            flex-shrink: 0;
        }
        .slide-panel .panel-body {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
        }
        .slide-panel .panel-body::-webkit-scrollbar { width: 4px; }
        .slide-panel .panel-body::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }

        /* Кнопка подписки на посте */
        .follow-btn-post {
            position: absolute;
            top: 12px;
            right: 12px;
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 34px;
            height: 34px;
            font-size: 22px;
            line-height: 1;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
            z-index: 10;
        }
        .follow-btn-post:hover { transform: scale(1.1); background: #1d4ed8; }
        .follow-btn-post.following { background: #1f1f22; color: #888; box-shadow: none; }

        /* Комментарии */
        .comment-item { border-bottom: 1px solid #2a2a2e; padding: 12px 0; }
        .comment-item:last-child { border-bottom: none; }

        /* Адаптив для ПК: боковая панель меню */
        .sidebar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: #1f1f22;
            border-top: 1px solid #2a2a2e;
            z-index: 40;
            display: flex;
            align-items: center;
        }
        @media (min-width: 640px) {
            .sidebar {
                width: 72px;
                height: 100%;
                border-top: none;
                border-right: 1px solid #2a2a2e;
                flex-direction: column;
                justify-content: flex-start;
                padding-top: 12px;
                overflow-y: auto;
            }
            .sidebar .mobile-nav {
                flex-direction: column;
                height: auto;
                width: 100%;
                gap: 4px;
            }
            .sidebar .mobile-nav .nav-btn {
                width: 100%;
                justify-content: flex-start;
                padding: 10px 16px;
            }
        }

        /* Остальное */
        .post-card { background: #1f1f22; border-radius: 16px; border: 1px solid #2a2a2e; padding: 16px; position: relative; transition: border-color 0.2s; }
        .post-card:hover { border-color: #3f3f46; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background: #2a2a2e; }
        .avatar-sm { width: 32px; height: 32px; }
        #profileEmail { color: #9ca3af !important; } /* убран акцент */

        /* Тень для панелей при открытии */
        .panel-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 45;
            display: none;
        }
        .panel-overlay.active { display: block; }
        @media (min-width: 640px) {
            .panel-overlay { display: none !important; }
        }
    </style>
</head>
<body>

    <!-- Тосты -->
    <div id="toastContainer" class="fixed bottom-20 sm:bottom-4 right-4 z-[9999] flex flex-col gap-2"></div>

    <!-- Экран бана -->
    <div id="banScreen" class="hidden fixed inset-0 z-[10000] bg-red-600 flex flex-col items-center justify-center p-6 text-center">
        <i class='bx bx-block text-8xl text-white mb-6'></i>
        <h1 class="text-4xl font-bold text-white mb-4">Аккаунт заблокирован</h1>
        <p id="banReason" class="text-xl text-white mb-2 font-medium"></p>
        <p id="banUntil" class="text-lg text-white/80 mb-6"></p>
        <button id="banLogoutBtn" class="bg-white text-red-600 font-bold px-8 py-3 rounded-custom hover:bg-gray-200 transition shadow-lg text-lg">
            <i class='bx bx-log-out'></i> Выйти
        </button>
    </div>

    <!-- Авторизация -->
    <div id="authModal" class="fixed inset-0 z-[100] flex items-center justify-center bg-black/90 backdrop-blur-md p-4">
        <div class="bg-darkPanel p-6 rounded-custom shadow-2xl w-full max-w-sm border border-gray-800">
            <div class="flex justify-center mb-4"><i class='bx bx-infinite text-5xl text-primary'></i></div>
            <h2 id="authTitle" class="text-2xl font-bold mb-4 text-center">Вход в MesWy</h2>
            <form id="authForm" class="space-y-3">
                <input type="email" id="authEmail" placeholder="Email" required class="w-full p-3 rounded-custom bg-[#121212] border border-gray-800 focus:border-primary outline-none transition text-base">
                <input type="password" id="authPassword" placeholder="Пароль" required class="w-full p-3 rounded-custom bg-[#121212] border border-gray-800 focus:border-primary outline-none transition text-base">
                <button type="submit" id="authSubmitBtn" class="w-full bg-primary hover:opacity-90 text-white font-bold py-3 rounded-custom transition-all text-base">Войти</button>
            </form>
            <p class="mt-4 text-center text-gray-400 text-sm cursor-pointer hover:text-white transition" id="authToggleBtn">Нет аккаунта? Создать</p>
        </div>
    </div>

    <!-- Боковое меню (Sidebar) -->
    <aside class="sidebar group" id="sidebar">
        <div class="mobile-nav">
            <!-- 1. Лента -->
            <button onclick="loadPosts(true); setActiveNav(this)" class="nav-btn active" id="navFeed">
                <i class='bx bx-home-alt-2'></i>
                <span class="nav-label">Лента</span>
            </button>
            <!-- 2. Поиск (панель) -->
            <button onclick="toggleSearchPanel(); setActiveNav(null)" class="nav-btn" id="navSearch">
                <i class='bx bx-search'></i>
                <span class="nav-label">Поиск</span>
            </button>
            <!-- 3. Рекомендации -->
            <button onclick="loadRecs(); setActiveNav(this)" class="nav-btn" id="navRecs">
                <i class='bx bx-trending-up'></i>
                <span class="nav-label">Рекомендации</span>
            </button>
            <!-- 4. Создать (панель) — без подсветки -->
            <button onclick="toggleCreatePanel(); setActiveNav(null)" class="nav-btn" id="navCreate">
                <i class='bx bx-plus-circle' style="color:#2563eb;"></i>
                <span class="nav-label" style="color:#2563eb;">Создать</span>
            </button>
            <!-- 5. Уведомления (панель) -->
            <button onclick="toggleNotifications(); setActiveNav(this)" class="nav-btn" id="navNotif">
                <i class='bx bx-bell'></i>
                <span class="nav-label">Уведомления</span>
                <span id="notifBadge" class="hidden absolute top-1 right-1 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-darkPanel" style="top:4px; right:4px;"></span>
            </button>
            <!-- 6. Профиль (панель) -->
            <button onclick="if(currentUser) openProfile(currentUser.uid); setActiveNav(this)" class="nav-btn" id="navProfile">
                <i class='bx bx-user'></i>
                <span class="nav-label">Профиль</span>
            </button>
            <!-- 7. Выход -->
            <button id="navLogout" class="nav-btn text-red-500 hover:text-red-400" style="color:#ef4444;">
                <i class='bx bx-log-out'></i>
                <span class="nav-label">Выйти</span>
            </button>
        </div>
    </aside>

    <!-- Основная лента -->
    <main id="mainContent" class="w-full h-full overflow-y-auto p-3 sm:p-6 flex justify-center pb-20 sm:pb-6" style="margin-left:0; transition: margin-left 0.3s;">
        <div class="max-w-xl w-full flex flex-col gap-4" id="postsFeed"></div>
    </main>

    <!-- Оверлей для мобильных панелей -->
    <div id="panelOverlay" class="panel-overlay" onclick="closeAllPanels()"></div>

    <!-- Панель профиля -->
    <div id="profilePanel" class="slide-panel">
        <div class="panel-header">
            <h2 class="text-xl font-bold">Профиль</h2>
            <button onclick="closeProfilePanel()" class="text-gray-400 hover:text-white text-2xl"><i class='bx bx-x'></i></button>
        </div>
        <div class="panel-body">
            <div id="profileCover" class="h-32 sm:h-40 bg-gray-800 rounded-custom mb-4 bg-cover bg-center"></div>
            <div class="flex items-center gap-4 -mt-10 relative z-10">
                <img id="profileAvatar" src="" class="w-20 h-20 rounded-full border-4 border-darkPanel object-cover bg-darkPanel shadow-lg">
                <div class="flex-1">
                    <h2 id="profileName" class="text-xl font-bold"></h2>
                    <p id="profileEmail" class="text-sm text-gray-400"></p>
                    <p id="profileBio" class="text-gray-400 text-sm mt-1 whitespace-pre-wrap"></p>
                </div>
            </div>
            <div class="mt-4 flex gap-2">
                <button id="adminPanelBtn" onclick="document.getElementById('adminModal').classList.remove('hidden')" class="hidden bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-custom font-bold text-sm">Админ</button>
                <button id="editProfileBtn" onclick="openEditProfile()" class="hidden bg-[#121212] hover:bg-gray-800 text-white px-4 py-2 rounded-custom font-bold border border-gray-700 text-sm">Редактировать</button>
            </div>
            <div class="mt-6 border-t border-gray-800 pt-4">
                <h3 class="font-bold mb-3 flex items-center gap-2"><i class='bx bx-grid-alt text-primary'></i> Публикации</h3>
                <div id="profilePostsFeed" class="flex flex-col gap-4"></div>
            </div>
        </div>
    </div>

    <!-- Панель уведомлений -->
    <div id="notificationsPanel" class="slide-panel">
        <div class="panel-header">
            <h2 class="text-xl font-bold flex items-center gap-2"><i class='bx bx-bell text-primary'></i> Уведомления</h2>
            <button onclick="closeNotificationsPanel()" class="text-gray-400 hover:text-white text-2xl"><i class='bx bx-x'></i></button>
        </div>
        <div id="notificationsList" class="panel-body"></div>
    </div>

    <!-- Панель создания поста -->
    <div id="createPanel" class="slide-panel">
        <div class="panel-header">
            <h2 class="text-xl font-bold flex items-center gap-2"><i class='bx bx-plus-circle text-primary'></i> Новый пост</h2>
            <button onclick="closeCreatePanel()" class="text-gray-400 hover:text-white text-2xl"><i class='bx bx-x'></i></button>
        </div>
        <div class="panel-body">
            <form id="createPostForm" class="space-y-4">
                <input type="text" id="postTitle" placeholder="Заголовок поста..." required class="w-full p-3 rounded-custom bg-[#121212] border border-gray-800 focus:border-primary outline-none transition text-base">
                <textarea id="postDesc" placeholder="Расскажите, что происходит?" rows="4" class="w-full p-3 rounded-custom bg-[#121212] border border-gray-800 focus:border-primary outline-none transition resize-none text-base"></textarea>
                <div class="bg-[#121212] p-4 rounded-custom border border-gray-800 cursor-pointer hover:border-gray-600 transition group">
                    <label class="flex flex-col items-center justify-center w-full h-full cursor-pointer">
                        <i class='bx bx-images text-4xl text-gray-500 group-hover:text-primary transition-colors mb-2'></i>
                        <span class="text-sm text-gray-400 font-medium">Прикрепить фото (до 10 шт)</span>
                        <input type="file" id="postImages" multiple accept="image/*" class="hidden">
                    </label>
                    <div id="imagePreview" class="mt-3 flex gap-2 overflow-x-auto hide-scroll"></div>
                </div>
                <button type="submit" id="postSubmitBtn" class="w-full bg-primary hover:opacity-90 text-white font-bold py-3 rounded-custom transition-all text-base">Опубликовать</button>
            </form>
        </div>
    </div>

    <!-- Панель поиска -->
    <div id="searchPanel" class="slide-panel">
        <div class="panel-header">
            <h2 class="text-xl font-bold flex items-center gap-2"><i class='bx bx-search text-primary'></i> Поиск</h2>
            <button onclick="closeSearchPanel()" class="text-gray-400 hover:text-white text-2xl"><i class='bx bx-x'></i></button>
        </div>
        <div class="panel-body">
            <div class="relative mb-4">
                <i class='bx bx-search absolute left-4 top-1/2 -translate-y-1/2 text-xl text-gray-500'></i>
                <input type="text" id="searchInput" placeholder="Введите текст для поиска постов..." class="w-full pl-12 p-4 rounded-custom bg-[#121212] border border-gray-800 focus:border-primary outline-none transition text-base">
            </div>
            <div id="searchResults" class="flex flex-col gap-4">
                <div class="text-center text-gray-500 mt-8"><i class='bx bx-search text-5xl opacity-20 mb-3'></i><br>Начните вводить запрос</div>
            </div>
        </div>
    </div>

    <!-- Модалка комментариев -->
    <div id="commentsModal" class="hidden fixed inset-0 z-[80] flex items-center justify-center bg-black/90 backdrop-blur-md p-4">
        <div class="bg-darkPanel p-5 sm:p-6 rounded-custom shadow-2xl w-full max-w-lg max-h-[90vh] flex flex-col border border-gray-800 relative">
            <button onclick="closeCommentsModal()" class="absolute top-4 right-4 text-gray-500 hover:text-white w-8 h-8 flex items-center justify-center rounded-full bg-[#121212] transition">
                <i class='bx bx-x text-xl'></i>
            </button>
            <h3 class="text-xl font-bold mb-3" id="commentsModalTitle">Комментарии</h3>
            <div id="commentsList" class="flex-1 overflow-y-auto hide-scroll mb-4 space-y-2"></div>
            <div class="flex gap-3 items-center border-t border-gray-800 pt-3">
                <img id="commentsModalAvatar" src="" class="w-10 h-10 rounded-full object-cover shadow-md">
                <input type="text" id="commentsModalInput" placeholder="Написать комментарий..." class="flex-1 bg-[#121212] border border-gray-800 rounded-custom px-4 py-2.5 text-sm outline-none focus:border-primary transition" onkeypress="if(event.key==='Enter') sendCommentFromModal()">
                <button onclick="sendCommentFromModal()" class="bg-primary text-white w-10 h-10 rounded-full flex items-center justify-center hover:opacity-90 transition shadow-lg shrink-0">
                    <i class='bx bx-send text-xl'></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Админка -->
    <div id="adminModal" class="hidden fixed inset-0 z-[90] flex items-center justify-center bg-black/90 backdrop-blur-md p-4">
        <div class="bg-darkPanel p-6 rounded-custom shadow-2xl w-full max-w-md border border-red-900/50 relative">
            <button onclick="document.getElementById('adminModal').classList.add('hidden')" class="absolute top-4 right-4 text-gray-500 hover:text-white w-8 h-8 flex items-center justify-center rounded-full bg-[#121212] transition">
                <i class='bx bx-x text-xl'></i>
            </button>
            <h2 class="text-2xl font-bold mb-6 text-red-500 flex items-center gap-2"><i class='bx bx-shield-quarter'></i> Админ-Панель</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">Email пользователя</label>
                    <input type="email" id="banEmail" placeholder="Введите email" class="w-full p-3 rounded-custom bg-[#121212] border border-gray-800 focus:border-red-500 outline-none transition text-base">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">Причина блокировки</label>
                    <input type="text" id="banReasonInput" placeholder="Например: Спам" class="w-full p-3 rounded-custom bg-[#121212] border border-gray-800 focus:border-red-500 outline-none transition text-base">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">Срок (в днях)</label>
                    <input type="number" id="banDays" placeholder="Дней" value="1" min="1" class="w-full p-3 rounded-custom bg-[#121212] border border-gray-800 focus:border-red-500 outline-none transition text-base">
                </div>
                <button onclick="banUser()" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-custom transition-all text-base mt-2">Выдать блокировку</button>
                <button onclick="unbanUser()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-custom transition-all text-base mt-2">Разбанить</button>
            </div>
        </div>
    </div>

    <!-- Модалка редактирования профиля -->
    <div id="editProfileModal" class="hidden fixed inset-0 z-[90] flex items-center justify-center bg-black/90 backdrop-blur-md p-4">
        <div class="bg-darkPanel p-5 sm:p-6 rounded-custom shadow-2xl w-full max-w-md relative border border-gray-800 overflow-y-auto max-h-[90vh] hide-scroll">
            <button onclick="document.getElementById('editProfileModal').classList.add('hidden')" class="absolute top-4 right-4 text-gray-500 hover:text-white w-8 h-8 flex items-center justify-center rounded-full bg-[#121212] transition">
                <i class='bx bx-x text-xl'></i>
            </button>
            <h2 class="text-2xl font-bold mb-4">Редактировать профиль</h2>
            <form id="editProfileForm" class="space-y-4">
                <input type="text" id="editName" placeholder="Имя пользователя" required class="w-full p-3 rounded-custom bg-[#121212] border border-gray-800 focus:border-primary outline-none transition text-base">
                <textarea id="editBio" placeholder="О себе" rows="3" class="w-full p-3 rounded-custom bg-[#121212] border border-gray-800 focus:border-primary outline-none transition resize-none text-base"></textarea>
                <div class="bg-[#121212] p-4 rounded-custom border border-gray-800">
                    <label class="block text-sm font-medium text-gray-400 mb-2">Сменить аватарку</label>
                    <input type="file" id="editAvatar" accept="image/*" class="w-full text-xs file:bg-darkHover file:text-white file:border-0 file:rounded-custom file:px-3 file:py-1.5 file:cursor-pointer">
                </div>
                <button type="submit" id="editProfileSubmitBtn" class="w-full bg-white text-black hover:bg-gray-200 font-bold py-3 rounded-custom transition-all text-base mt-2">Сохранить</button>
            </form>
        </div>
    </div>

    <!-- Зум изображений -->
    <div id="imageViewerModal" class="hidden fixed inset-0 z-[999] bg-black/95 flex items-center justify-center p-4 backdrop-blur-sm">
        <button onclick="closeImage()" class="absolute top-4 right-4 text-white w-10 h-10 bg-gray-900/50 hover:bg-gray-800 rounded-full flex items-center justify-center transition z-50">
            <i class='bx bx-x text-2xl'></i>
        </button>
        <div class="w-full h-full flex items-center justify-center overflow-hidden" id="imageZoomContainer">
            <img id="viewerImage" src="" class="max-w-full max-h-full object-contain transition-transform duration-200 cursor-grab rounded-custom shadow-2xl">
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, doc, setDoc, updateDoc, getDoc, query, orderBy, limit, startAfter, arrayUnion, where, deleteField } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

        const app = initializeApp({
            apiKey: "AIzaSyCBSWHaooqAwJTUjDhwjXKDN1z5locXCcM",
            authDomain: "meswy-web.firebaseapp.com",
            projectId: "meswy-web"
        });
        const auth = getAuth(app);
        const db = getFirestore(app);
        const IMGBB_KEY = "cfedaeb5c6bb179902b44ba10cb396cb";

        window.currentUser = null;
        window.userDataCache = null;
        const userCache = {};

        // --- Вспомогательные ---
        window.showToast = (msg, type = 'info') => {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');

            const icon = type === 'error' ? 'bx-error-circle text-red-500' : 'bx-check-circle text-primary';
            toast.className = `toast-enter flex items-center gap-3 p-4 rounded-custom border ${bg} text-white shadow-2xl min-w-[250px] mb-2 text-sm`;
            toast.innerHTML = `<i class='bx ${icon} text-xl'></i> <span class="font-bold">${msg}</span>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';

        // --- Панели: управление оверлеем и открытием/закрытием ---

                list.appendChild(el);

        // --- Открытие поста по ID (прокрутка к нему) ---
        window.openPostById = async (postId) => {
            // Закрываем все панели
            closeAllPanels();
            // Ищем пост в ленте, если его нет — загружаем
            const feed = document.getElementById('postsFeed');
            // Проверим, есть ли уже пост с таким ID
            const existing = feed.querySelector(`[data-postid="${postId}"]`);
            if(existing) {
                existing.scrollIntoView({ behavior: 'smooth', block: 'center' });
                existing.style.borderColor = '#2563eb';
                setTimeout(() => existing.style.borderColor = '', 3000);
                return;
            }
            // Если нет — загружаем один пост
            try {
                const docSnap = await getDoc(doc(db, "posts", postId));
                if(docSnap.exists()) {
                    // Вставляем в начало ленты
                    const container = document.createElement('div');
                    container.dataset.postid = postId;
                    await renderPost(docSnap, container, false);
                    feed.prepend(container);
                    container.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    container.style.borderColor = '#2563eb';
                    setTimeout(() => container.style.borderColor = '', 3000);
                } else {
                    showToast("Пост не найден", "error");
                }
            } catch(e) {
                showToast("Ошибка загрузки поста", "error");
            }

        // --- Авторизация ---
        let isLoginMode = true;

                });

        document.getElementById('authForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const btn = document.getElementById('authSubmitBtn');
            btn.disabled = true; btn.textContent = "Загрузка...";

                if (isLoginMode) {

        document.getElementById('navLogout').addEventListener('click', () => signOut(auth));
        document.getElementById('banLogoutBtn').addEventListener('click', () => signOut(auth));

        // --- Состояние пользователя ---
        onAuthStateChanged(auth, async (user) => {

        // --- Админка (бан/разбан) ---
        window.banUser = async () => {
            const email = document.getElementById('banEmail').value.trim();
            const reason = document.getElementById('banReasonInput').value;
            const days = parseInt(document.getElementById('banDays').value || 1);
            if(!email) return showToast("Введите email", "error");
            try {
                const q = query(collection(db, "users"), where("email", "==", email));
                const snap = await getDocs(q);
                if(snap.empty) return showToast("Пользователь не найден", "error");
                const targetUid = snap.docs[0].id;
                const until = new Date(); until.setDate(until.getDate() + days);
                await updateDoc(doc(db, "users", targetUid), { banned: { reason, until: until.toISOString() } });
                showToast("Пользователь забанен");
                document.getElementById('adminModal').classList.add('hidden');
            } catch(e) { showToast("Ошибка бана: " + e.message, "error"); }
        };

        window.unbanUser = async () => {
            const email = document.getElementById('banEmail').value.trim();
            if(!email) return showToast("Введите email", "error");
            try {
                const q = query(collection(db, "users"), where("email", "==", email));
                const snap = await getDocs(q);
                if(snap.empty) return showToast("Пользователь не найден", "error");
                const targetUid = snap.docs[0].id;
                await updateDoc(doc(db, "users", targetUid), { banned: deleteField() });
                showToast("Пользователь разбанен");
                document.getElementById('adminModal').classList.add('hidden');
            } catch(e) { showToast("Ошибка разбана: " + e.message, "error"); }
        };

        // --- Уведомления (отправка) ---
        window.sendNotification = async (targetUid, type, postId) => {
            if(targetUid === currentUser.uid) return;
            try {
                const fromData = await getUserData(currentUser.uid);
                const notif = { 
                    type, 
                    from: currentUser.uid, 
                    postId, 
                    date: new Date().toISOString(),
                    fromName: fromData.displayName,
                    fromAvatar: fromData.photoURL
                };
                await updateDoc(doc(db, "users", targetUid), {
                    notifications: arrayUnion(notif)
                });
                // обновим бейдж
                checkNotifications();
            } catch(e) {}
        };

        async function checkNotifications() {
            if(!currentUser) return;
            const data = await getUserData(currentUser.uid);
            if(data.notifications && data.notifications.length > 0) {
                document.getElementById('notifBadge').classList.remove('hidden');
            } else {
                document.getElementById('notifBadge').classList.add('hidden');
            }
        }

        // --- Лайк ---
        window.toggleLike = async (postId, authorId, btn) => {
            try {
                const ref = doc(db, "posts", postId);
                const s = await getDoc(ref);
                const likes = s.data().likes || [];
                const isLiked = likes.includes(currentUser.uid);
                const nl = isLiked ? likes.filter(i=>i!==currentUser.uid) : [...likes, currentUser.uid];
                await updateDoc(ref, { likes: nl });
                if(!isLiked) sendNotification(authorId, 'like', postId);
                btn.innerHTML = `<i class='bx ${isLiked ? 'bx-heart' : 'bxs-heart text-red-500 drop-shadow-md'} text-2xl'></i> <span class="font-bold text-base">${nl.length}</span>`;
            } catch(e) { showToast("Ошибка", "error"); }
        };

        // --- Комментарии ---
        let currentCommentsPostId = null;
        let currentCommentsAuthorId = null;

        window.openCommentsModal = async (postId, authorId) => {
            currentCommentsPostId = postId;
            currentCommentsAuthorId = authorId;
            const modal = document.getElementById('commentsModal');
            const list = document.getElementById('commentsList');
            const avatar = document.getElementById('commentsModalAvatar');
            avatar.src = userDataCache?.photoURL || 'https://i.ibb.co/30Zc4Fq/default-avatar.png';
            modal.classList.remove('hidden');
            list.innerHTML = '<div class="text-center py-4"><i class="bx bx-loader-alt bx-spin text-2xl text-primary"></i></div>';
            try {
                const snap = await getDoc(doc(db, "posts", postId));
                const data = snap.data();
                const comments = data.comments || [];
                list.innerHTML = '';
                if(comments.length === 0) {
                    list.innerHTML = '<p class="text-gray-400 text-center py-4">Пока нет комментариев. Будьте первым!</p>';
                } else {
                    for(let c of comments.slice().reverse()) {

                            <div class="flex-1">
                                <span class="font-bold text-sm cursor-pointer hover:text-primary transition" onclick="openProfile('${c.uid}')">${u.displayName}</span>
                                <p class="text-gray-300 text-sm mt-1">${c.text}</p>

                            </div>

                document.getElementById('commentsModalInput').value = '';
                document.getElementById('commentsModalInput').focus();

                list.innerHTML = '<div class="text-red-400 text-center">Ошибка загрузки</div>';

        window.sendCommentFromModal = async () => {
            const input = document.getElementById('commentsModalInput');
            const text = input.value.trim();
            if(!text || !currentCommentsPostId) return;
            try {
                input.disabled = true;
                const postRef = doc(db, "posts", currentCommentsPostId);
                const snap = await getDoc(postRef);
                const comments = snap.data().comments || [];
                const newComment = { uid: currentUser.uid, text: text, date: new Date().toISOString() };
                await updateDoc(postRef, { comments: arrayUnion(newComment) });
                sendNotification(currentCommentsAuthorId, 'comment', currentCommentsPostId);
                showToast("Комментарий отправлен");
                input.value = '';
                await openCommentsModal(currentCommentsPostId, currentCommentsAuthorId);

        window.closeCommentsModal = () => {
            document.getElementById('commentsModal').classList.add('hidden');

        // --- Подписка (исправлена) ---
        window.toggleFollow = async (targetUid, btn) => {
            if(targetUid === currentUser.uid) return;
            try {
                const userRef = doc(db, "users", currentUser.uid);
                const snap = await getDoc(userRef);
                const following = snap.data()?.following || [];
                const isFollowing = following.includes(targetUid);
                if(isFollowing) {
                    await updateDoc(userRef, { following: arrayRemove(targetUid) });
                    btn.textContent = '+';
                    btn.classList.remove('following');
                } else {
                    await updateDoc(userRef, { following: arrayUnion(targetUid) });
                    btn.textContent = '✓';
                    btn.classList.add('following');
                    sendNotification(targetUid, 'follow', null);
                }
            } catch(e) { showToast("Ошибка подписки: " + e.message, "error"); }
        };

        // --- Рендер поста ---
        async function renderPost(docSnap, container, compact = false) {
            const p = docSnap.data();
            const u = await getUserData(p.authorId);
            const isOwn = p.authorId === currentUser.uid;
            
            let imgs = '';
            if(p.images && p.images.length > 0) {
                const gridClass = p.images.length === 1 ? 'grid-cols-1' : 'grid-cols-2';
                imgs = `<div class="grid ${gridClass} gap-2 mt-4 rounded-custom overflow-hidden">`;
                p.images.forEach(url => {
                    imgs += `<img src="${url}" onclick="openImage('${url}')" class="w-full ${compact ? 'h-36' : 'h-48 sm:h-64'} object-cover cursor-pointer hover:scale-105 transition duration-500 shadow-sm" alt="post">`;
                });
                imgs += `</div>`;
            }

            const isLiked = p.likes && p.likes.includes(currentUser.uid);
            const commentCount = p.comments?.length || 0;

            const el = document.createElement('article');
            el.className = "post-card";
            el.dataset.postid = docSnap.id;
            el.innerHTML = `
                <div class="flex items-center space-x-3 mb-4 cursor-pointer" onclick="openProfile('${p.authorId}')">
                    <img src="${u.photoURL}" class="avatar border-2 border-transparent hover:border-primary transition">
                    <div>
                        <h3 class="text-base font-bold hover:text-primary transition">${u.displayName}</h3>
                        <span class="text-xs text-gray-500">${new Date(p.createdAt).toLocaleDateString()}</span>
                    </div>
                </div>
                ${p.title ? `<h2 class="text-xl font-bold mb-2">${p.title}</h2>` : ''}
                <p class="text-gray-300 text-base whitespace-pre-wrap leading-relaxed">${p.description}</p>
                ${imgs}
                
                <div class="mt-4 flex items-center gap-6 border-t border-gray-800 pt-4">
                    <button onclick="toggleLike('${docSnap.id}', '${p.authorId}', this)" class="flex items-center gap-2 text-gray-400 hover:text-white transition">
                        <i class='bx ${isLiked ? 'bxs-heart text-red-500 drop-shadow-md' : 'bx-heart'} text-2xl'></i> 
                        <span class="font-bold text-base">${p.likes?.length || 0}</span>
                    </button>
                    <button onclick="openCommentsModal('${docSnap.id}', '${p.authorId}')" class="flex items-center gap-2 text-gray-400 hover:text-white transition">
                        <i class='bx bx-message-rounded text-2xl'></i> 
                        <span class="font-bold text-base">${commentCount}</span>
                    </button>
                </div>
            `;

            if(!isOwn) {
                const followBtn = document.createElement('button');
                followBtn.className = 'follow-btn-post';
                followBtn.textContent = '+';
                // Проверяем подписку
                (async () => {
                    const userData = await getUserData(currentUser.uid);
                    const following = userData?.following || [];
                    if(following.includes(p.authorId)) {
                        followBtn.textContent = '✓';
                        followBtn.classList.add('following');
                    }
                })();
                followBtn.onclick = (e) => {
                    e.stopPropagation();
                    toggleFollow(p.authorId, followBtn);
                };
                el.appendChild(followBtn);
            }

            container.appendChild(el);
        }

        // --- Лента ---
        let lastVisiblePost = null;
        window.loadPosts = async (reset = false) => {
            const feed = document.getElementById('postsFeed');
            if(reset) { feed.innerHTML = ''; lastVisiblePost = null; }
            const oldBtn = document.getElementById('loadMoreBtn');
            if(oldBtn) oldBtn.remove();

            let q = lastVisiblePost 
                ? query(collection(db, "posts"), orderBy("createdAt", "desc"), startAfter(lastVisiblePost), limit(15))
                : query(collection(db, "posts"), orderBy("createdAt", "desc"), limit(15));

            try {
                const s = await getDocs(q);
                if (s.empty && reset) {
                    feed.innerHTML = '<div class="text-center text-gray-500 mt-8 p-6 bg-darkPanel rounded-custom border border-gray-800 text-base">Пока ничего нет. Напиши первый пост!</div>';
                    return;
                }
                for(const d of s.docs) await renderPost(d, feed);
                if (s.docs.length === 15) {
                    lastVisiblePost = s.docs[s.docs.length - 1];
                    const btn = document.createElement('button');
                    btn.id = 'loadMoreBtn';
                    btn.className = "w-full py-4 bg-darkPanel border border-gray-800 rounded-custom font-bold text-gray-400 hover:text-white hover:border-gray-600 transition mt-4 text-base";
                    btn.textContent = "Загрузить еще";
                    btn.onclick = () => loadPosts(false);
                    feed.appendChild(btn);
                }
            } catch(e) { showToast("Ошибка загрузки", "error"); }
        };

        window.loadRecs = async () => {
            const feed = document.getElementById('postsFeed');
            feed.innerHTML = '<div class="text-center py-10"><i class="bx bx-loader-alt bx-spin text-4xl text-primary"></i></div>';
            try {
                const s = await getDocs(query(collection(db, "posts"), limit(30))); 
                feed.innerHTML = '<div class="bg-primary/10 border border-primary/20 text-primary p-4 rounded-custom mb-4 font-bold flex items-center gap-2"><i class="bx bx-trending-up text-xl"></i> Рекомендации для вас</div>';
                const docs = s.docs.sort(() => 0.5 - Math.random()).slice(0, 10);
                for(const d of docs) await renderPost(d, feed);
            } catch(e) { showToast("Ошибка", "error"); }
        };

        // --- Поиск в панели ---
        document.getElementById('searchInput').addEventListener('input', async (e) => {
            const val = e.target.value.toLowerCase();
            const results = document.getElementById('searchResults');
            if(val.length < 2) { results.innerHTML = '<div class="text-center text-gray-500 mt-8"><i class="bx bx-search text-5xl opacity-20 mb-3"></i><br>Введите запрос</div>'; return; }
            results.innerHTML = '<div class="text-center text-primary mt-8"><i class="bx bx-loader-alt bx-spin text-4xl"></i></div>';
            try {
                const snap = await getDocs(query(collection(db, "posts"), orderBy("createdAt", "desc"), limit(50)));
                results.innerHTML = '';
                let found = 0;
                for(const docSnap of snap.docs) {
                    const data = docSnap.data();
                    if (data.title?.toLowerCase().includes(val) || data.description?.toLowerCase().includes(val)) {
                        found++;
                        await renderPost(docSnap, results, true);
                    }
                }
                if(found === 0) results.innerHTML = '<div class="text-center text-gray-500 mt-8 text-base bg-[#121212] p-4 rounded-custom border border-gray-800">Ничего не найдено</div>';
            } catch(err) { results.innerHTML = '<div class="text-center text-red-500">Ошибка поиска</div>'; }
        });

        // --- Создание поста (из панели) ---
        document.getElementById('postImages').addEventListener('change', function() {
            const preview = document.getElementById('imagePreview');
            preview.innerHTML = '';
            Array.from(this.files).forEach(file => {
                const img = document.createElement('img');
                img.src = URL.createObjectURL(file);
                img.className = "w-16 h-16 object-cover rounded-xl border border-gray-700 shadow-md";
                preview.appendChild(img);
            });
        });

        document.getElementById('createPostForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('postSubmitBtn');
            btn.disabled = true; btn.innerHTML = "<i class='bx bx-loader-alt bx-spin'></i> Публикуем...";
            try {
                const files = document.getElementById('postImages').files;
                const uploadPromises = Array.from(files).map(f => uploadToImgBB(f));
                const imageUrls = (await Promise.all(uploadPromises)).filter(url => url !== null);
                await addDoc(collection(db, "posts"), {
                    title: document.getElementById('postTitle').value,
                    description: document.getElementById('postDesc').value,
                    images: imageUrls,
                    authorId: currentUser.uid,
                    createdAt: new Date().toISOString(),
                    likes: [], comments: []
                });
                closeCreatePanel();
                document.getElementById('createPostForm').reset();
                document.getElementById('imagePreview').innerHTML = '';
                showToast("Пост опубликован");
                loadPosts(true);
            } catch (err) { showToast(err.message, "error"); }
            finally { btn.disabled = false; btn.innerHTML = "Опубликовать"; }
        });

        async function uploadToImgBB(file) {
            const fd = new FormData(); fd.append('image', file);
            try {
                const r = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, {method:'POST',body:fd});
                return (await r.json()).data.url;
            } catch(e) { return null; }
        }

        // --- Редактирование профиля ---
        window.openEditProfile = () => {
            document.getElementById('editProfileModal').classList.remove('hidden');
            if(currentUserData) {
                document.getElementById('editName').value = currentUserData.displayName || '';
                document.getElementById('editBio').value = currentUserData.bio || '';
            }
        };

        document.getElementById('editProfileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('editProfileSubmitBtn');
            btn.disabled = true; btn.textContent = "Сохраняем...";
            try {
                const updates = { 
                    displayName: document.getElementById('editName').value, 
                    bio: document.getElementById('editBio').value 
                };
                const f = document.getElementById('editAvatar').files[0];
                if(f) updates.photoURL = await uploadToImgBB(f);
                await updateDoc(doc(db, "users", currentUser.uid), updates);
                userCache[currentUser.uid] = { ...userCache[currentUser.uid], ...updates }; 
                userDataCache = { ...userDataCache, ...updates };
                document.getElementById('editProfileModal').classList.add('hidden');
                if(document.getElementById('profilePanel').classList.contains('open')) {
                    openProfile(currentUser.uid);
                }
                loadPosts(true); 
                showToast("Профиль обновлен");
            } catch(e) { showToast("Ошибка", "error"); }
            finally { btn.disabled = false; btn.textContent = "Сохранить"; }
        });

        // --- Зум изображений ---
        let zoomScale = 1;
        const vImg = document.getElementById('viewerImage');
        const imgZoomContainer = document.getElementById('imageZoomContainer');
        window.openImage = (url) => {
            zoomScale = 1; 
            vImg.style.transform = `scale(1)`;
            vImg.src = url; 
            document.getElementById('imageViewerModal').classList.remove('hidden');
        };
        window.closeImage = () => { document.getElementById('imageViewerModal').classList.add('hidden'); };
        imgZoomContainer.addEventListener('wheel', (e) => {
            e.preventDefault();
            zoomScale += e.deltaY * -0.002;
            zoomScale = Math.min(Math.max(0.5, zoomScale), 5);
            vImg.style.transform = `scale(${zoomScale})`;
        });

        // --- Инициализация активной вкладки ---
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('navFeed').classList.add('active');
        });
    </script>
</body>
</html>
