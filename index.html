<!DOCTYPE html>
<html>
<body>

    <input type="file" id="fileInput" />
    <button onclick="uploadToPuter()">Загрузить на сервер</button>

    <!-- подключаем библиотеку puter -->
    <script src="https://js.puter.com/v2/"></script>

    <script>
        async function uploadToPuter() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];

            if (!file) {
                alert('выбери файл сначала');
                return;
            }

            try {
                // загружаем файл в облако puter
                // файлы сохраняются в папку /uploads/
                const uploadedFile = await puter.fs.write('uploads/' + file.name, file);
                
                // получаем прямую ссылку для скачивания
                const url = await puter.fs.urlFor(uploadedFile);
                
                console.log('файл успешно загружен!');
                console.log('ссылка для скачивания:', url);
                alert('готово! ссылка в консоли: ' + url);
            } catch (err) {
                console.error('ошибка:', err);
                alert('не удалось загрузить: ' + err.message);
            }
        }
    </script>
</body>
</html>
