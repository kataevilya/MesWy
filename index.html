<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MesWy Messenger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: { extend: { colors: { brand: { 500: '#22c55e', 600: '#16a34a' }, dark: { bg: '#09090b', surface: '#18181b', sidebar: '#121214', border: '#27272a', muted: '#71717a', text: '#f4f4f5' } } } }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-dark-bg text-dark-text h-screen w-screen overflow-hidden font-sans antialiased flex">

    <!-- Auth -->
    <div id="auth-screen" class="absolute inset-0 z-50 flex flex-col items-center justify-center bg-dark-bg px-4 hidden">
        <div class="bg-dark-surface border border-dark-border p-8 rounded-2xl w-full max-w-md text-center">
            <h1 class="text-3xl font-black text-white mb-6">MesWy</h1>
            <button id="btn-login" class="w-full flex justify-center py-3 bg-white text-black font-bold rounded-xl">Войти через Google</button>
        </div>
    </div>

    <!-- Onboarding -->
    <div id="onboarding-screen" class="absolute inset-0 z-50 flex flex-col items-center justify-center bg-dark-bg px-4 hidden">
        <div class="bg-dark-surface border border-dark-border p-8 rounded-2xl w-full max-w-md">
            <h2 class="text-2xl font-bold text-white mb-4">Начальная настройка</h2>
            <input type="text" id="ob-username" placeholder="@username" class="w-full bg-dark-bg border border-dark-border rounded-xl px-4 py-3 text-white mb-4 outline-none focus:border-brand-500">
            <button id="btn-finish-ob" class="w-full py-3 bg-brand-600 text-white font-bold rounded-xl">Начать</button>
        </div>
    </div>

    <!-- App -->
    <div id="app-screen" class="flex w-full h-full hidden">
        <!-- Sidebar -->
        <aside id="sidebar" class="w-full md:w-80 flex flex-col border-r border-dark-border bg-dark-sidebar z-20">
            <div class="p-4 border-b border-dark-border flex justify-between items-center bg-dark-surface">
                <div class="flex items-center gap-3 cursor-pointer" id="btn-my-profile">
                    <div id="my-avatar-container"></div>
                    <div class="min-w-0"><h2 id="my-name" class="font-bold text-sm text-white truncate">...</h2></div>
                </div>
                <div class="flex gap-2">
                    <button id="btn-new-chat" class="text-zinc-400 hover:text-white"><i class="fa-solid fa-pen-to-square"></i></button>
                    <button id="btn-settings" class="text-zinc-400 hover:text-white"><i class="fa-solid fa-gear"></i></button>
                </div>
            </div>

            <!-- Stories -->
            <div class="p-2 border-b border-dark-border flex gap-3 overflow-x-auto no-scrollbar items-center" id="stories-list">
                <button id="btn-add-story" class="flex-shrink-0 w-14 h-14 rounded-full border-2 border-dashed border-dark-muted flex flex-col items-center justify-center text-dark-muted hover:text-white hover:border-brand-500">
                    <i class="fa-solid fa-plus text-lg"></i>
                </button>
            </div>

            <!-- Folders -->
            <div class="flex overflow-x-auto p-2 gap-2 text-xs font-semibold no-scrollbar border-b border-dark-border" id="folders-tabs">
                <button data-folder="all" class="folder-tab px-3 py-1.5 rounded-lg bg-dark-surface text-white">Все</button>
            </div>

            <div id="chats-list" class="flex-1 overflow-y-auto p-2 space-y-1"></div>
        </aside>

        <!-- Chat -->
        <main id="chat-window" class="flex-1 flex flex-col bg-dark-bg hidden md:flex relative">
            <div id="blank-chat" class="flex-1 flex items-center justify-center text-dark-muted">Выберите чат</div>
            
            <div id="active-chat" class="hidden flex-1 flex flex-col">
                <div class="p-4 border-b border-dark-border flex items-center justify-between bg-dark-surface">
                    <div class="flex items-center gap-3">
                        <button id="btn-back" class="md:hidden text-zinc-400"><i class="fa-solid fa-arrow-left"></i></button>
                        <div id="chat-avatar-container"></div>
                        <div>
                            <h3 id="chat-name" class="font-bold text-white text-sm">...</h3>
                            <p id="chat-username" class="text-xs text-brand-500">...</p>
                        </div>
                    </div>
                </div>

                <div id="messages-list" class="flex-1 overflow-y-auto p-4 space-y-4"></div>

                <div class="p-3 border-t border-dark-border bg-dark-surface relative">
                    <!-- Emoji Picker -->
                    <div id="emoji-picker" class="hidden absolute bottom-16 left-2 bg-dark-sidebar border border-dark-border rounded-xl p-2 grid grid-cols-5 gap-2 text-xl z-50">
                        <span class="cursor-pointer hover:scale-110">😀</span><span class="cursor-pointer hover:scale-110">😂</span>
                        <span class="cursor-pointer hover:scale-110">🥰</span><span class="cursor-pointer hover:scale-110">😎</span>
                        <span class="cursor-pointer hover:scale-110">🤔</span><span class="cursor-pointer hover:scale-110">😭</span>
                        <span class="cursor-pointer hover:scale-110">😡</span><span class="cursor-pointer hover:scale-110">👍</span>
                        <span class="cursor-pointer hover:scale-110">🔥</span><span class="cursor-pointer hover:scale-110">✨</span>
                    </div>

                    <form id="msg-form" class="flex items-end gap-2">
                        <button type="button" id="btn-emoji" class="p-2 text-dark-muted hover:text-white"><i class="fa-regular fa-face-smile"></i></button>
                        <label class="p-2 text-dark-muted hover:text-white cursor-pointer">
                            <i class="fa-solid fa-paperclip"></i>
                            <input type="file" id="msg-file" class="hidden" accept="image/*">
                        </label>
                        <div class="flex-1 bg-dark-bg border border-dark-border rounded-xl flex flex-col">
                            <div id="preview-box" class="hidden p-2 border-b border-dark-border flex items-center gap-2">
                                <img id="preview-img" class="w-10 h-10 rounded object-cover">
                                <span class="text-xs text-white" id="preview-txt">Загрузка...</span>
                                <button type="button" id="btn-clear-file" class="ml-auto text-red-500 text-xs"><i class="fa-solid fa-xmark"></i></button>
                            </div>
                            <textarea id="msg-input" rows="1" class="w-full bg-transparent p-3 text-sm text-white outline-none resize-none" placeholder="Сообщение..."></textarea>
                        </div>
                        <button type="submit" class="p-3 bg-brand-600 text-white rounded-xl"><i class="fa-solid fa-paper-plane"></i></button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <!-- Modals (Settings, Create Chat, Story) -->
    <div id="modal-settings" class="fixed inset-0 bg-black/80 z-50 flex items-center justify-center hidden">
        <div class="bg-dark-surface w-full max-w-md p-6 rounded-2xl">
            <h3 class="text-xl font-bold text-white mb-4">Настройки</h3>
            <div class="space-y-4">
                <input type="text" id="set-name" class="w-full bg-dark-bg p-3 rounded-xl border border-dark-border text-white" placeholder="Имя">
                <input type="text" id="set-username" class="w-full bg-dark-bg p-3 rounded-xl border border-dark-border text-white" placeholder="@username">
                <label class="block text-xs text-dark-muted">Папки (через запятую)</label>
                <input type="text" id="set-folders" class="w-full bg-dark-bg p-3 rounded-xl border border-dark-border text-white" placeholder="Работа, Семья">
                <button id="btn-save-settings" class="w-full py-3 bg-brand-600 text-white rounded-xl font-bold">Сохранить</button>
                <button id="btn-del-account" class="w-full py-3 bg-red-600/20 text-red-500 rounded-xl font-bold mt-4 border border-red-900/50">Удалить аккаунт</button>
            </div>
            <button id="btn-close-settings" class="absolute top-4 right-4 text-white p-2">Закрыть</button>
        </div>
    </div>

    <div id="modal-create" class="fixed inset-0 bg-black/80 z-50 flex items-center justify-center hidden">
        <div class="bg-dark-surface w-full max-w-md p-6 rounded-2xl">
            <h3 class="text-xl font-bold text-white mb-4">Новый чат</h3>
            <select id="create-type" class="w-full bg-dark-bg p-3 rounded-xl border border-dark-border text-white mb-4 outline-none">
                <option value="dm">Личный (по @username)</option>
                <option value="group">Группа</option>
                <option value="channel">Канал</option>
            </select>
            <input type="text" id="create-title" class="w-full bg-dark-bg p-3 rounded-xl border border-dark-border text-white mb-4" placeholder="Имя / @username">
            <input type="text" id="create-username" class="w-full bg-dark-bg p-3 rounded-xl border border-dark-border text-white mb-4 hidden" placeholder="@уникальный_id">
            <button id="btn-submit-create" class="w-full py-3 bg-brand-600 text-white rounded-xl font-bold">Создать</button>
            <button id="btn-close-create" class="mt-2 w-full py-3 text-dark-muted rounded-xl">Отмена</button>
        </div>
    </div>

    <div id="modal-story" class="fixed inset-0 bg-black/90 z-50 flex items-center justify-center hidden">
        <div class="bg-dark-surface w-full max-w-md p-6 rounded-2xl flex flex-col items-center">
            <h3 class="text-white font-bold mb-4">Редактор Истории</h3>
            <input type="file" id="story-file" accept="image/*" class="mb-4 text-white text-sm">
            <textarea id="story-text" class="w-full bg-dark-bg p-3 text-white border border-dark-border rounded-xl mb-2" placeholder="Добавить текст/эмодзи..."></textarea>
            <div class="flex gap-2 w-full">
                <button id="btn-pub-story" class="flex-1 py-2 bg-brand-600 text-white rounded-xl">Опубликовать</button>
                <button id="btn-close-story" class="flex-1 py-2 bg-zinc-800 text-white rounded-xl">Закрыть</button>
            </div>
        </div>
    </div>

    <div id="modal-view-story" class="fixed inset-0 bg-black/95 z-[60] flex items-center justify-center hidden">
        <div class="relative w-full max-w-md h-[80vh] bg-dark-surface rounded-2xl overflow-hidden flex flex-col">
            <div id="story-progress" class="h-1 bg-brand-500 w-full"></div>
            <img id="view-story-img" class="w-full h-full object-cover absolute inset-0 mix-blend-overlay opacity-50">
            <div class="relative z-10 flex-1 flex items-center justify-center p-6 text-center text-white text-2xl font-bold" id="view-story-text"></div>
            <button id="btn-close-view-story" class="absolute top-4 right-4 z-20 text-white w-10 h-10 bg-black/50 rounded-full"><i class="fa-solid fa-xmark"></i></button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, deleteUser } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, addDoc, query, where, orderBy, onSnapshot, serverTimestamp, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const app = initializeApp({
            apiKey: "AIzaSyCBSWHaooqAwJTUjDhwjXKDN1z5locXCcM",
            authDomain: "meswy-web.firebaseapp.com",
            projectId: "meswy-web",
            storageBucket: "meswy-web.firebasestorage.app",
            messagingSenderId: "802423553668",
            appId: "1:802423553668:web:64be6aae3f34b2d0f88cd1"
        });

        const auth = getAuth(app);
        const db = getFirestore(app);
        
        let me = null;
        let activeChatId = null;
        let chats = [];
        let currentFolder = 'all';
        let msgUnsub = null;
        let pendingImgUrl = null;

        const getEl = id => document.getElementById(id);
        
        // Utils: First Letter Avatar
        function getAvatarHtml(name, url, size="w-10 h-10", text="text-lg") {
            if(url) return `<img src="${url}" class="${size} rounded-full object-cover">`;
            const letter = (name || "?").charAt(0).toUpperCase();
            return `<div class="${size} rounded-full bg-gradient-to-br from-brand-600 to-emerald-900 text-white flex items-center justify-center font-bold ${text} shadow-inner">${letter}</div>`;
        }

        // Utils: ImgBB
        async function uploadImg(file) {
            const fd = new FormData(); fd.append("image", file);
            const r = await fetch("https://api.imgbb.com/1/upload?key=614175d15985961d996a8c076c776f08", { method: "POST", body: fd });
            const j = await r.json(); return j.data.url;
        }

        // Utils: Safe Link Format (no js)
        function formatSafeLinks(text) {
            const safeText = text.replace(/[&<>'"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[c]));
            return safeText.replace(/(https?:\/\/[^\s]+)/g, url => {
                return `<a href="${url}" target="_blank" rel="noopener" class="block mt-2 p-3 rounded-lg bg-zinc-900 border border-zinc-800 text-brand-500 hover:bg-zinc-800 transition truncate text-sm">
                            <i class="fa-solid fa-link text-zinc-500 mr-2"></i>${url}
                        </a>`;
            });
        }

        onAuthStateChanged(auth, async u => {
            if(!u) {
                getEl('auth-screen').classList.remove('hidden');
                getEl('app-screen').classList.add('hidden');
                return;
            }
            getEl('auth-screen').classList.add('hidden');
            const ref = doc(db, "users", u.uid);
            const d = await getDoc(ref);
            if(d.exists() && d.data().username) {
                me = { uid: u.uid, ...d.data() };
                initApp();
            } else {
                getEl('onboarding-screen').classList.remove('hidden');
                getEl('btn-finish-ob').onclick = async () => {
                    const un = getEl('ob-username').value.trim().toLowerCase();
                    if(!un) return;
                    me = { uid: u.uid, name: u.displayName||"User", email: u.email, username: un, folders: ['Работа', 'Семья'] };
                    await setDoc(ref, me);
                    getEl('onboarding-screen').classList.add('hidden');
                    initApp();
                };
            }
        });

        getEl('btn-login').onclick = () => signInWithPopup(auth, new GoogleAuthProvider());

        function initApp() {
            getEl('app-screen').classList.remove('hidden');
            getEl('my-avatar-container').innerHTML = getAvatarHtml(me.name, me.photo);
            getEl('my-name').innerText = me.name;
            renderFolders();
            syncChats();
            syncStories();
        }

        // Folders
        function renderFolders() {
            const c = getEl('folders-tabs');
            c.innerHTML = `<button data-folder="all" class="folder-tab px-3 py-1.5 rounded-lg ${currentFolder==='all'?'bg-dark-surface text-white':'text-dark-muted'}">Все</button>`;
            (me.folders||[]).forEach(f => {
                c.innerHTML += `<button data-folder="${f}" class="folder-tab px-3 py-1.5 rounded-lg ${currentFolder===f?'bg-dark-surface text-white':'text-dark-muted'}">${f}</button>`;
            });
            document.querySelectorAll('.folder-tab').forEach(b => b.onclick = (e) => {
                currentFolder = e.target.dataset.folder;
                renderFolders();
                renderChats();
            });
        }

        // Sync & Render Chats
        function syncChats() {
            onSnapshot(query(collection(db, "chats"), orderBy("updated", "desc")), snap => {
                chats = [];
                snap.forEach(d => {
                    let c = d.data(); c.id = d.id;
                    if(c.type === 'dm' && !c.members.includes(me.username)) return;
                    chats.push(c);
                });
                renderChats();
            });
        }

        function renderChats() {
            const list = getEl('chats-list'); list.innerHTML = '';
            chats.forEach(c => {
                // simple folder logic: if folder selected, chat must contain folder tag
                if(currentFolder !== 'all' && !(c.tags||[]).includes(currentFolder)) return;
                
                let name = c.name, img = c.photo;
                if(c.type === 'dm') name = c.members.find(x => x !== me.username) || "Избранное";
                
                const div = document.createElement('div');
                div.className = `p-3 rounded-xl cursor-pointer flex gap-3 items-center hover:bg-dark-surface ${activeChatId===c.id?'bg-brand-900/20':''}`;
                div.innerHTML = `${getAvatarHtml(name, img, "w-11 h-11", "text-xl")}
                                 <div class="flex-1 min-w-0"><div class="text-sm font-bold text-white truncate">${name}</div>
                                 <div class="text-xs text-dark-muted truncate">${c.last||'Нет сообщений'}</div></div>`;
                div.onclick = () => openChat(c.id, name, img, c.username || (c.type==='dm'?name:''));
                list.appendChild(div);
            });
        }

        // Chat Logic
        function openChat(id, name, img, un) {
            activeChatId = id;
            getEl('sidebar').classList.add('hidden'); getEl('sidebar').classList.add('md:flex');
            getEl('chat-window').classList.remove('hidden');
            getEl('blank-chat').classList.add('hidden'); getEl('active-chat').classList.remove('hidden'); getEl('active-chat').classList.add('flex');
            
            getEl('chat-avatar-container').innerHTML = getAvatarHtml(name, img);
            getEl('chat-name').innerText = name;
            getEl('chat-username').innerText = un ? `@${un}` : '';

            if(msgUnsub) msgUnsub();
            msgUnsub = onSnapshot(query(collection(db, `chats/${id}/msgs`), orderBy("time", "asc")), snap => {
                const ml = getEl('messages-list'); ml.innerHTML = '';
                snap.forEach(d => {
                    const m = d.data(); const isMe = m.user === me.username;
                    ml.innerHTML += `<div class="flex flex-col ${isMe?'items-end':'items-start'}">
                        ${!isMe ? `<span class="text-[10px] text-zinc-500 ml-1 mb-1">@${m.user}</span>` : ''}
                        <div class="max-w-[75%] p-3 rounded-2xl ${isMe?'bg-brand-600 text-white rounded-br-none':'bg-dark-surface border border-dark-border rounded-bl-none'}">
                            ${m.img ? `<img src="${m.img}" class="rounded-lg mb-2 max-w-full">` : ''}
                            ${m.text ? `<div class="text-sm break-words">${formatSafeLinks(m.text)}</div>` : ''}
                        </div>
                    </div>`;
                });
                ml.scrollTop = ml.scrollHeight;
            });
        }

        getEl('btn-back').onclick = () => {
            getEl('sidebar').classList.remove('hidden'); getEl('chat-window').classList.add('hidden');
        };

        // Send Msg
        getEl('msg-form').onsubmit = async e => {
            e.preventDefault();
            const txt = getEl('msg-input').value.trim();
            if(!txt && !pendingImgUrl) return;
            getEl('msg-input').value = '';
            
            let img = pendingImgUrl; pendingImgUrl = null; 
            getEl('preview-box').classList.add('hidden'); getEl('msg-file').value = '';

            await addDoc(collection(db, `chats/${activeChatId}/msgs`), { user: me.username, text: txt, img: img, time: serverTimestamp() });
            await setDoc(doc(db, "chats", activeChatId), { last: txt||'Фото', updated: serverTimestamp() }, {merge:true});
        };

        // Emoji & File
        getEl('btn-emoji').onclick = () => getEl('emoji-picker').classList.toggle('hidden');
        document.querySelectorAll('#emoji-picker span').forEach(sp => {
            sp.onclick = () => { getEl('msg-input').value += sp.innerText; getEl('emoji-picker').classList.add('hidden'); }
        });
        
        getEl('msg-file').onchange = async e => {
            if(!e.target.files[0]) return;
            getEl('preview-box').classList.remove('hidden'); getEl('preview-txt').innerText = "Загрузка...";
            try {
                pendingImgUrl = await uploadImg(e.target.files[0]);
                getEl('preview-img').src = pendingImgUrl; getEl('preview-txt').innerText = "Готово";
            } catch(er) { getEl('preview-txt').innerText = "Ошибка"; }
        };
        getEl('btn-clear-file').onclick = () => { pendingImgUrl=null; getEl('preview-box').classList.add('hidden'); getEl('msg-file').value=''; };

        // Create Chat
        getEl('btn-new-chat').onclick = () => getEl('modal-create').classList.remove('hidden');
        getEl('btn-close-create').onclick = () => getEl('modal-create').classList.add('hidden');
        getEl('create-type').onchange = e => {
            const isGrp = e.target.value !== 'dm';
            getEl('create-username').classList.toggle('hidden', !isGrp);
            getEl('create-title').placeholder = isGrp ? "Название" : "@username собеседника";
        };
        getEl('btn-submit-create').onclick = async () => {
            const t = getEl('create-type').value;
            const title = getEl('create-title').value.trim();
            const un = getEl('create-username').value.trim();
            if(!title) return;
            
            let payload = { type: t, updated: serverTimestamp(), tags: ['all'] };
            if(t === 'dm') {
                payload.members = [me.username, title.replace('@','')];
                payload.name = "Личные";
            } else {
                payload.name = title; payload.username = un.replace('@',''); payload.members = [me.username];
            }
            await addDoc(collection(db, "chats"), payload);
            getEl('modal-create').classList.add('hidden');
        };

        // Settings & Delete Acc
        getEl('btn-settings').onclick = () => {
            getEl('set-name').value = me.name; getEl('set-username').value = me.username;
            getEl('set-folders').value = (me.folders||[]).join(', ');
            getEl('modal-settings').classList.remove('hidden');
        };
        getEl('btn-close-settings').onclick = () => getEl('modal-settings').classList.add('hidden');
        getEl('btn-save-settings').onclick = async () => {
            me.name = getEl('set-name').value.trim(); me.username = getEl('set-username').value.replace('@','').trim();
            me.folders = getEl('set-folders').value.split(',').map(s=>s.trim()).filter(s=>s);
            await setDoc(doc(db, "users", me.uid), me, {merge:true});
            getEl('modal-settings').classList.add('hidden'); initApp();
        };
        getEl('btn-del-account').onclick = async () => {
            if(confirm("Удалить аккаунт навсегда?")) {
                await deleteDoc(doc(db, "users", me.uid));
                await deleteUser(auth.currentUser);
                location.reload();
            }
        };

        // Stories
        getEl('btn-add-story').onclick = () => getEl('modal-story').classList.remove('hidden');
        getEl('btn-close-story').onclick = () => getEl('modal-story').classList.add('hidden');
        let storyImg = null;
        getEl('story-file').onchange = async e => { if(e.target.files[0]) storyImg = await uploadImg(e.target.files[0]); };
        getEl('btn-pub-story').onclick = async () => {
            const text = getEl('story-text').value.trim();
            if(!text && !storyImg) return;
            await addDoc(collection(db, "stories"), { user: me.username, avatar: me.photo, img: storyImg, text: text, time: serverTimestamp() });
            getEl('modal-story').classList.add('hidden'); getEl('story-text').value=''; storyImg=null;
        };

        function syncStories() {
            const d = new Date(); d.setHours(d.getHours() - 24);
            onSnapshot(query(collection(db, "stories"), where("time", ">", d), orderBy("time", "desc")), snap => {
                const lst = getEl('stories-list'); 
                lst.innerHTML = `<button id="btn-add-story-2" class="flex-shrink-0 w-14 h-14 rounded-full border-2 border-dashed border-dark-muted flex flex-col items-center justify-center text-dark-muted"><i class="fa-solid fa-plus text-lg"></i></button>`;
                getEl('btn-add-story-2').onclick = () => getEl('modal-story').classList.remove('hidden');
                
                snap.forEach(docSnap => {
                    const s = docSnap.data();
                    const btn = document.createElement('div');
                    btn.className = "flex-shrink-0 cursor-pointer rounded-full p-0.5 bg-gradient-to-tr from-brand-500 to-emerald-400";
                    btn.innerHTML = getAvatarHtml(s.user, s.avatar, "w-13 h-13", "text-xl border-2 border-dark-bg");
                    btn.onclick = () => openStory(s);
                    lst.appendChild(btn);
                });
            });
        }
        
        function openStory(s) {
            getEl('modal-view-story').classList.remove('hidden');
            getEl('view-story-img').src = s.img || '';
            getEl('view-story-text').innerText = s.text || '';
            setTimeout(() => getEl('modal-view-story').classList.add('hidden'), 5000);
        }
        getEl('btn-close-view-story').onclick = () => getEl('modal-view-story').classList.add('hidden');

    </script>
</body>
</html>
