<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Загрузчик файлов</title>
</head>
<body>

    <input type="file" id="fileInput" />
    <button onclick="uploadToFileIo()">Загрузить файл</button>

    <script>
        async function uploadToFileIo() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];

            if (!file) {
                alert('Сначала выбери файл!');
                return;
            }

            const formData = new FormData();
            formData.append('file', file);

            try {
                // Отправляем файл на File.io
                const response = await fetch('https://file.io', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (result.success) {
                    console.log('Ссылка для скачивания:', result.link);
                    alert('Файл загружен! Ссылка: ' + result.link);
                } else {
                    alert('Ошибка при загрузке: ' + (result.message || 'Неизвестная ошибка'));
                }
            } catch (err) {
                console.error('Ошибка:', err);
                alert('Не удалось загрузить файл.');
            }
        }
    </script>
</body>
</html>
