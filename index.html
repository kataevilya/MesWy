<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MesWy - Social Network</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { primary: '#2563eb' } } }
        }
    </script>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Segoe UI', sans-serif; }
        .active-tab { color: #2563eb !important; border-right: 2px solid #2563eb; }
        .glass { background: rgba(25, 25, 25, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body>

    <aside class="fixed bottom-0 w-full h-16 sm:h-full sm:w-64 border-t sm:border-t-0 sm:border-r border-gray-800 glass flex sm:flex-col justify-around sm:justify-start z-50">
        <div class="hidden sm:flex p-6 text-2xl font-bold text-primary">MesWy</div>
        <nav class="flex sm:flex-col w-full sm:w-auto">
            <a href="#" class="nav-link flex items-center p-4 hover:text-primary transition" data-tab="home"><i class='bx bxs-home text-2xl'></i> <span class="hidden sm:block ml-4">Главная</span></a>
            <a href="#" class="nav-link flex items-center p-4 hover:text-primary transition" data-tab="search"><i class='bx bx-search text-2xl'></i> <span class="hidden sm:block ml-4">Поиск</span></a>
            <a href="#" class="nav-link flex items-center p-4 hover:text-primary transition" data-tab="notifs"><i class='bx bx-bell text-2xl'></i> <span class="hidden sm:block ml-4">Уведомления</span></a>
            <a href="#" class="nav-link flex items-center p-4 hover:text-primary transition" data-tab="profile"><i class='bx bx-user text-2xl'></i> <span class="hidden sm:block ml-4">Профиль</span></a>
        </nav>
        <div class="mt-auto p-4 hidden sm:block">
            <button id="logoutBtn" class="text-red-500 font-bold"><i class='bx bx-log-out'></i> Выход</button>
        </div>
    </aside>

    <main id="mainContent" class="sm:ml-64 p-4 pb-20">
        <div id="feed" class="max-w-2xl mx-auto space-y-4"></div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc, collection, query, orderBy, onSnapshot, arrayUnion } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

        const app = initializeApp({ projectId: "meswy-web" });
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if(user) renderFeed();
        });

        async function renderFeed() {
            const feed = document.getElementById('feed');
            feed.innerHTML = '';
            
            const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
            onSnapshot(q, (snapshot) => {
                const scrollPos = window.scrollY;
                feed.innerHTML = '';
                snapshot.forEach(docSnap => {
                    const post = docSnap.data();
                    const isFollowing = post.authorId !== currentUser.uid;
                    
                    const article = document.createElement('article');
                    article.className = "bg-[#111] p-4 rounded-xl border border-gray-800";
                    article.innerHTML = `
                        <div class="flex justify-between items-center mb-2">
                            <span class="font-bold text-lg">${post.authorName || 'Пользователь'}</span>
                            ${isFollowing ? `<button onclick="follow('${post.authorId}')" class="bg-primary px-3 py-1 rounded-full text-sm font-bold">+ Подписаться</button>` : ''}
                        </div>
                        <p class="text-white mb-2">${post.text}</p>
                        <div class="flex gap-4">
                            <button onclick="likePost('${docSnap.id}')" class="text-xl"><i class='bx bx-heart'></i> ${post.likes?.length || 0}</button>
                            <button class="text-xl"><i class='bx bx-message-rounded'></i></button>
                        </div>
                    `;
                    feed.appendChild(article);
                });
                window.scrollTo(0, scrollPos);
            });
        }

        window.likePost = async (postId) => {
            const ref = doc(db, "posts", postId);
            await updateDoc(ref, { likes: arrayUnion(currentUser.uid) });
        };

        window.follow = async (targetId) => {
            if(targetId === currentUser.uid) return;
            await updateDoc(doc(db, "users", currentUser.uid), { following: arrayUnion(targetId) });
        };

        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', (e) => {
                document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active-tab'));
                link.classList.add('active-tab');
            });
        });

        document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));
    </script>
</body>
</html>
