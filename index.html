<!DOCTYPE html>
<html>
<body>

    <input type="file" id="fileInput" />
    <button onclick="uploadToPuter()">Загрузить на сервер</button>

    <!-- подключаем библиотеку puter -->
    <script src="https://js.puter.com/v2/"></script>

    <script>
        async function uploadToPuter() {
    const fileInput = document.getElementById('fileInput');
    const file = fileInput.files[0];

    if (!file) {
        alert('выбери файл');
        return;
    }

    try {
        // 1. Сначала пытаемся создать папку (если она уже есть, это не вызовет ошибку)
        await puter.fs.mkdir('uploads').catch(() => {});

        // 2. Теперь загружаем файл
        const uploadedFile = await puter.fs.write('uploads/' + file.name, file);
        
        // 3. Получаем ссылку
        const url = await puter.fs.urlFor(uploadedFile);
        
        console.log('ссылка:', url);
        alert('файл готов: ' + url);
    } catch (err) {
        console.error('Ошибка:', err);
        alert('ошибка: ' + err.message);
    }
}
    </script>
</body>
</html>
