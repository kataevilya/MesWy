<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Загрузчик файлов</title>
</head>
<body>

    <input type="file" id="fileInput" />
    <button onclick="uploadToGofile()">Загрузить на сервер</button>

    <script>
        async function uploadToGofile() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];

            if (!file) {
                alert('Сначала выбери файл!');
                return;
            }

            const formData = new FormData();
            formData.append('file', file);

            try {
                // Gofile.io лучше работает с CORS
                const response = await fetch('https://store1.gofile.io/uploadFile', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (result.status === 'ok') {
                    console.log('Ссылка:', result.data.downloadPage);
                    alert('Файл загружен! Ссылка: ' + result.data.downloadPage);
                } else {
                    alert('Ошибка: ' + result.status);
                }
            } catch (err) {
                console.error('Ошибка:', err);
                alert('Ошибка сети или CORS. Попробуй с другого браузера.');
            }
        }
    </script>
</body>
</html>
