<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>MesWy - Лучшее хранение ваших сохранений</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #121212;
            --text-color: #ffffff;
            --panel-bg: #1e1e1e;
            --accent: #bb86fc;
            --hover-bg: #333333;
        }
        [data-theme="light"] {
            --bg-color: #f5f5f5;
            --text-color: #000000;
            --panel-bg: #ffffff;
            --accent: #6200ee;
            --hover-bg: #e0e0e0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: var(--bg-color); color: var(--text-color); display: flex; height: 100vh; overflow: hidden; transition: 0.3s; }
        
        .sidebar-left {
            width: 60px;
            background: var(--panel-bg);
            transition: width 0.3s;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--hover-bg);
            z-index: 10;
        }
        .sidebar-left:hover { width: 250px; }
        .nav-item {
            display: flex;
            align-items: center;
            padding: 15px;
            color: var(--text-color);
            text-decoration: none;
            cursor: pointer;
            white-space: nowrap;
        }
        .nav-item:hover { background: var(--hover-bg); }
        .nav-item i { min-width: 30px; text-align: center; font-size: 20px; }
        .nav-item span { margin-left: 15px; opacity: 0; transition: opacity 0.3s; }
        .sidebar-left:hover .nav-item span { opacity: 1; }
        
        .feed {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            background: var(--bg-color);
        }
        .post {
            background: var(--panel-bg);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            cursor: pointer;
            border: 1px solid var(--hover-bg);
        }
        
        .sidebar-right {
            width: 300px;
            background: var(--panel-bg);
            padding: 20px;
            border-left: 1px solid var(--hover-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            background-size: cover;
            background-position: center;
        }
        .profile-icon { font-size: 50px; margin-bottom: 10px; color: var(--accent); background: rgba(0,0,0,0.5); border-radius: 50%; padding: 20px; }
        .profile-name { font-size: 24px; font-weight: bold; margin-bottom: 10px; text-shadow: 1px 1px 2px #000; }
        
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .modal-content {
            background: var(--panel-bg);
            padding: 20px;
            border-radius: 10px;
            width: 400px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .modal-content input, .modal-content select {
            padding: 10px;
            background: var(--bg-color);
            border: 1px solid var(--hover-bg);
            color: var(--text-color);
            border-radius: 5px;
        }
        .modal-content button {
            padding: 10px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .modal-content button:hover { opacity: 0.8; }
    </style>
</head>
<body>

    <nav class="sidebar-left">
        <div class="nav-item" onclick="openUploadModal()">
            <i class="fa-solid fa-plus"></i>
            <span>загрузить сохранение</span>
        </div>
        <div class="nav-item" onclick="showMyProfile()">
            <i class="fa-solid fa-user"></i>
            <span>мой профиль</span>
        </div>
        <div class="nav-item" onclick="openEditModal()">
            <i class="fa-solid fa-pen-to-square"></i>
            <span>настроить профиль</span>
        </div>
        <div class="nav-item" onclick="changeTheme()">
            <i class="fa-solid fa-palette"></i>
            <span>смена темы</span>
        </div>
        <a class="nav-item" href="https://t.me/ryzik348" target="_blank">
            <i class="fa-solid fa-headset"></i>
            <span>поддержка</span>
        </a>
    </nav>

    <main class="feed">
        <h2>лента сохранений</h2>
        <br>
        <div class="post" onclick="viewUserProfile('гость', 'fa-ghost', '')">
            <h3>гость <i class="fa-solid fa-ghost"></i></h3>
            <p>мое крутое сохранение для игры</p>
            <div style="background:#333; height:150px; border-radius:5px; margin-top:10px; display:flex; align-items:center; justify-content:center;">скриншот.png</div>
        </div>
    </main>

    <aside class="sidebar-right" id="profilePanel">
        <i class="fa-solid fa-user profile-icon" id="profileIcon"></i>
        <div class="profile-name" id="profileNameDisplay">загрузка</div>
        <p style="background:rgba(0,0,0,0.5); padding:5px; border-radius:5px;">статус: онлайн</p>
    </aside>

    <div id="setupModal" class="modal">
        <div class="modal-content">
            <h3>добро пожаловать в meswy</h3>
            <p>введите ваше имя для первой настройки</p>
            <input type="text" id="setupNameInput" placeholder="ваше имя">
            <button onclick="saveInitialName()">войти</button>
        </div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3>настройки профиля</h3>
            <input type="text" id="editNameInput" placeholder="ваше имя">
            <input type="text" id="editBgInput" placeholder="ссылка на фон профиля (url)">
            <select id="editIconSelect">
                <option value="fa-user">обычный юзер</option>
                <option value="fa-star">звезда</option>
                <option value="fa-fire">огонь</option>
                <option value="fa-bolt">молния</option>
                <option value="fa-crown">корона</option>
                <option value="fa-gamepad">геймер</option>
            </select>
            <button onclick="saveProfileChanges()">сохранить профиль</button>
            <button onclick="closeModals()" style="background:var(--hover-bg)">отмена</button>
        </div>
    </div>

    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <h3>новое сохранение</h3>
            <label>скриншот сохранения:</label>
            <input type="file" accept="image/*">
            <label>файл сохранения (.pc):</label>
            <input type="file" accept=".pc">
            <button onclick="fakeUpload()">загрузить</button>
            <button onclick="closeModals()" style="background:var(--hover-bg)">отмена</button>
        </div>
    </div>

    <script>
        let currentUser = { name: '', icon: 'fa-user', bg: '' };

        window.onload = () => {
            const saved = localStorage.getItem('meswyUser');
            if (saved) {
                currentUser = JSON.parse(saved);
                updateProfilePanel(currentUser.name, currentUser.icon, currentUser.bg);
            } else {
                document.getElementById('setupModal').style.display = 'flex';
            }
        };

        function saveInitialName() {
            const name = document.getElementById('setupNameInput').value;
            if (!name) return;
            currentUser.name = name;
            localStorage.setItem('meswyUser', JSON.stringify(currentUser));
            document.getElementById('setupModal').style.display = 'none';
            updateProfilePanel(currentUser.name, currentUser.icon, currentUser.bg);
        }

        function updateProfilePanel(name, icon, bg) {
            document.getElementById('profileNameDisplay').innerText = name;
            document.getElementById('profileIcon').className = 'fa-solid ' + icon + ' profile-icon';
            if (bg) {
                document.getElementById('profilePanel').style.backgroundImage = 'url(' + bg + ')';
            } else {
                document.getElementById('profilePanel').style.backgroundImage = 'none';
            }
        }

        function showMyProfile() {
            updateProfilePanel(currentUser.name, currentUser.icon, currentUser.bg);
        }

        function viewUserProfile(name, icon, bg) {
            updateProfilePanel(name, icon, bg);
        }

        function openEditModal() {
            document.getElementById('editNameInput').value = currentUser.name;
            document.getElementById('editBgInput').value = currentUser.bg || '';
            document.getElementById('editIconSelect').value = currentUser.icon;
            document.getElementById('editModal').style.display = 'flex';
        }

        function saveProfileChanges() {
            currentUser.name = document.getElementById('editNameInput').value || currentUser.name;
            currentUser.bg = document.getElementById('editBgInput').value;
            currentUser.icon = document.getElementById('editIconSelect').value;
            localStorage.setItem('meswyUser', JSON.stringify(currentUser));
            updateProfilePanel(currentUser.name, currentUser.icon, currentUser.bg);
            closeModals();
        }

        function openUploadModal() {
            document.getElementById('uploadModal').style.display = 'flex';
        }

        function fakeUpload() {
            alert('сохранение добавлено в ленту');
            closeModals();
        }

        function closeModals() {
            document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
        }

        function changeTheme() {
            const body = document.body;
            if (body.getAttribute('data-theme') === 'light') {
                body.removeAttribute('data-theme');
            } else {
                body.setAttribute('data-theme', 'light');
            }
        }
    </script>
</body>
</html>
