<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MesWy - Social Network</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#121212',
                        darkPanel: '#1e1e1e'
                    }
                }
            }
        }
        // Восстановление темы при загрузке
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Скрытие скроллбара для эстетики */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
    </style>
</head>
<body class="bg-gray-100 text-gray-900 dark:bg-darkBg dark:text-gray-100 flex h-screen overflow-hidden transition-colors duration-300">

    <!-- Auth Modal (Окно входа/регистрации) -->
    <div id="authModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-70 backdrop-blur-sm">
        <div class="bg-white dark:bg-darkPanel p-8 rounded-xl shadow-2xl w-96 transform transition-all">
            <h2 id="authTitle" class="text-2xl font-bold mb-6 text-center">Вход в MesWy</h2>
            <form id="authForm" class="space-y-4">
                <input type="email" id="authEmail" placeholder="Email" required class="w-full p-3 rounded bg-gray-100 dark:bg-gray-800 border-none focus:ring-2 focus:ring-blue-500 outline-none">
                <input type="password" id="authPassword" placeholder="Пароль" required class="w-full p-3 rounded bg-gray-100 dark:bg-gray-800 border-none focus:ring-2 focus:ring-blue-500 outline-none">
                <button type="submit" id="authSubmitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded transition-colors">Войти</button>
            </form>
            <div class="mt-4 flex items-center justify-between">
                <hr class="w-full border-gray-300 dark:border-gray-700">
                <span class="px-2 text-sm text-gray-500">ИЛИ</span>
                <hr class="w-full border-gray-300 dark:border-gray-700">
            </div>
            <button id="googleLoginBtn" class="mt-4 w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded transition-colors flex justify-center items-center gap-2">
                <i class="fab fa-google"></i> Вход через Google
            </button>
            <p class="mt-6 text-center text-sm text-gray-500 cursor-pointer hover:text-blue-500" id="authToggleBtn">Нет аккаунта? Зарегистрироваться</p>
        </div>
    </div>

    <!-- Sidebar (Боковое меню) -->
    <aside class="group w-16 hover:w-64 bg-white dark:bg-darkPanel border-r border-gray-200 dark:border-gray-800 transition-all duration-300 flex flex-col justify-between fixed h-full z-40 overflow-hidden whitespace-nowrap shadow-lg">
        <div class="flex flex-col w-full mt-4 space-y-2">
            <!-- Логотип -->
            <div class="flex items-center w-full p-4 mb-4">
                <i class="fas fa-infinity text-2xl text-blue-500 min-w-[2rem] text-center"></i>
                <span class="ml-4 text-xl font-bold opacity-0 group-hover:opacity-100 transition-opacity">MesWy</span>
            </div>
            
            <button id="navCreatePost" class="flex items-center w-full p-4 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors cursor-pointer text-left">
                <i class="fas fa-plus-square text-xl min-w-[2rem] text-center"></i>
                <span class="ml-4 font-medium opacity-0 group-hover:opacity-100 transition-opacity">Создать пост</span>
            </button>
            
            <button id="navProfile" class="flex items-center w-full p-4 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors cursor-pointer text-left">
                <i class="fas fa-user text-xl min-w-[2rem] text-center"></i>
                <span class="ml-4 font-medium opacity-0 group-hover:opacity-100 transition-opacity">Профиль</span>
            </button>
        </div>

        <div class="flex flex-col w-full mb-4">
            <button id="navThemeToggle" class="flex items-center w-full p-4 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors cursor-pointer text-left">
                <i class="fas fa-moon text-xl min-w-[2rem] text-center" id="themeIcon"></i>
                <span class="ml-4 font-medium opacity-0 group-hover:opacity-100 transition-opacity" id="themeText">Светлая тема</span>
            </button>
            <button id="navLogout" class="flex items-center w-full p-4 hover:bg-red-50 dark:hover:bg-red-900/20 text-red-500 transition-colors cursor-pointer text-left">
                <i class="fas fa-sign-out-alt text-xl min-w-[2rem] text-center"></i>
                <span class="ml-4 font-medium opacity-0 group-hover:opacity-100 transition-opacity">Выйти</span>
            </button>
        </div>
    </aside>

    <!-- Main Content (Лента) -->
    <main class="ml-16 flex-1 h-full overflow-y-auto p-8 flex justify-center">
        <div class="max-w-2xl w-full space-y-8 pb-20" id="postsFeed">
            <!-- Посты будут генерироваться здесь -->
            <div class="text-center text-gray-500 mt-10" id="loadingPosts">Загрузка ленты...</div>
        </div>
    </main>

    <!-- Sliding Profile Panel -->
    <div id="profilePanel" class="fixed top-0 right-0 h-full w-full max-w-md bg-white dark:bg-darkPanel shadow-2xl z-50 transform translate-x-full transition-transform duration-300 flex flex-col">
        <!-- Обложка -->
        <div id="profileCover" class="h-48 bg-gray-300 dark:bg-gray-700 bg-cover bg-center relative">
            <button id="closeProfileBtn" class="absolute top-4 right-4 bg-black/50 text-white p-2 rounded-full hover:bg-black/70 transition">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <!-- Инфо -->
        <div class="px-6 pb-6 relative flex-1 overflow-y-auto">
            <img id="profileAvatar" src="https://via.placeholder.com/150" alt="Avatar" class="w-24 h-24 rounded-full border-4 border-white dark:border-darkPanel absolute -top-12 object-cover">
            
            <div class="mt-14 flex justify-between items-start">
                <div>
                    <h2 id="profileName" class="text-2xl font-bold">User Name</h2>
                    <p id="profileBio" class="text-gray-500 mt-1">Здесь пока нет описания...</p>
                </div>
                <button id="editProfileBtn" class="hidden bg-gray-200 dark:bg-gray-800 hover:bg-gray-300 dark:hover:bg-gray-700 px-4 py-2 rounded font-medium transition">
                    Изменить
                </button>
            </div>
            
            <div class="flex gap-6 mt-6">
                <div><span class="font-bold text-lg" id="profileFollowing">0</span> <span class="text-gray-500">Подписок</span></div>
                <div><span class="font-bold text-lg" id="profileLikes">0</span> <span class="text-gray-500">Лайков</span></div>
            </div>
        </div>
    </div>

    <!-- Create Post Modal -->
    <div id="createPostModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-70 backdrop-blur-sm">
        <div class="bg-white dark:bg-darkPanel p-6 rounded-xl shadow-2xl w-full max-w-lg relative">
            <button id="closeCreatePostBtn" class="absolute top-4 right-4 text-gray-500 hover:text-gray-900 dark:hover:text-white">
                <i class="fas fa-times text-xl"></i>
            </button>
            <h2 class="text-2xl font-bold mb-4">Создать пост</h2>
            <form id="createPostForm" class="space-y-4">
                <input type="text" id="postTitle" placeholder="Название поста" required class="w-full p-3 rounded bg-gray-100 dark:bg-gray-800 border-none focus:ring-2 focus:ring-blue-500 outline-none">
                <textarea id="postDesc" placeholder="Описание" rows="4" class="w-full p-3 rounded bg-gray-100 dark:bg-gray-800 border-none focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
                <div>
                    <label class="block mb-2 font-medium">Фотографии (можно несколько)</label>
                    <input type="file" id="postImages" multiple accept="image/*" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 dark:file:bg-gray-800 dark:file:text-white">
                </div>
                <button type="submit" id="postSubmitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded transition-colors flex justify-center items-center gap-2">
                    Опубликовать
                </button>
            </form>
        </div>
    </div>

    <!-- Edit Profile Modal -->
    <div id="editProfileModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-70 backdrop-blur-sm">
        <div class="bg-white dark:bg-darkPanel p-6 rounded-xl shadow-2xl w-full max-w-lg relative">
            <button id="closeEditProfileBtn" class="absolute top-4 right-4 text-gray-500 hover:text-gray-900 dark:hover:text-white">
                <i class="fas fa-times text-xl"></i>
            </button>
            <h2 class="text-2xl font-bold mb-4">Редактировать профиль</h2>
            <form id="editProfileForm" class="space-y-4">
                <input type="text" id="editName" placeholder="Имя пользователя" required class="w-full p-3 rounded bg-gray-100 dark:bg-gray-800 border-none focus:ring-2 focus:ring-blue-500 outline-none">
                <textarea id="editBio" placeholder="О себе" rows="3" class="w-full p-3 rounded bg-gray-100 dark:bg-gray-800 border-none focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
                <div>
                    <label class="block mb-1 text-sm text-gray-500">Новая аватарка</label>
                    <input type="file" id="editAvatar" accept="image/*" class="w-full text-sm">
                </div>
                <div>
                    <label class="block mb-1 text-sm text-gray-500">Новый фон (обложка)</label>
                    <input type="file" id="editCover" accept="image/*" class="w-full text-sm">
                </div>
                <button type="submit" id="editProfileSubmitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded transition-colors">
                    Сохранить изменения
                </button>
            </form>
        </div>
    </div>

    <!-- Основная логика приложения -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, doc, setDoc, updateDoc, getDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

        // ==========================================
        // 1. КОНФИГУРАЦИЯ БАЗЫ ДАННЫХ И API
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyCBSWHaooqAwJTUjDhwjXKDN1z5locXCcM",
            authDomain: "meswy-web.firebaseapp.com",
            projectId: "meswy-web",
            storageBucket: "meswy-web.firebasestorage.app",
            messagingSenderId: "802423553668",
            appId: "1:802423553668:web:64be6aae3f34b2d0f88cd1",
            measurementId: "G-PYS9ELGKDE"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const IMGBB_API_KEY = "cfedaeb5c6bb179902b44ba10cb396cb";

        let currentUser = null;

        // ==========================================
        // 2. ВСПОМОГАТЕЛЬНАЯ ФУНКЦИЯ ДЛЯ IMGBB
        // ==========================================
        async function uploadToImgBB(file) {
            const formData = new FormData();
            formData.append('image', file);
            try {
                const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                return data.data.url; // Возвращаем прямую ссылку
            } catch (error) {
                console.error("Ошибка загрузки в ImgBB:", error);
                return null;
            }
        }

        // ==========================================
        // 3. УПРАВЛЕНИЕ ТЕМАМИ (Dark/Light Mode)
        // ==========================================
        const navThemeToggle = document.getElementById('navThemeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const themeText = document.getElementById('themeText');

        function updateThemeUI() {
            const isDark = document.documentElement.classList.contains('dark');
            themeIcon.className = isDark ? 'fas fa-sun text-xl min-w-[2rem] text-center' : 'fas fa-moon text-xl min-w-[2rem] text-center';
            themeText.textContent = isDark ? 'Светлая тема' : 'Темная тема';
        }
        
        navThemeToggle.addEventListener('click', () => {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeUI();
        });
        updateThemeUI(); // Инициализация

        // ==========================================
        // 4. АВТОРИЗАЦИЯ И РЕГИСТРАЦИЯ
        // ==========================================
        let isLoginMode = true;
        const authModal = document.getElementById('authModal');
        const authForm = document.getElementById('authForm');
        const authToggleBtn = document.getElementById('authToggleBtn');
        const authTitle = document.getElementById('authTitle');
        const authSubmitBtn = document.getElementById('authSubmitBtn');
        const googleLoginBtn = document.getElementById('googleLoginBtn');
        const navLogout = document.getElementById('navLogout');

        authToggleBtn.addEventListener('click', () => {
            isLoginMode = !isLoginMode;
            authTitle.textContent = isLoginMode ? "Вход в MesWy" : "Регистрация";
            authSubmitBtn.textContent = isLoginMode ? "Войти" : "Создать аккаунт";
            authToggleBtn.textContent = isLoginMode ? "Нет аккаунта? Зарегистрироваться" : "Уже есть аккаунт? Войти";
        });

        // Создание или обновление профиля в Firestore
        async function ensureUserProfile(user, additionalData = {}) {
            const userRef = doc(db, "users", user.uid);
            const userSnap = await getDoc(userRef);
            if (!userSnap.exists()) {
                await setDoc(userRef, {
                    displayName: user.displayName || additionalData.displayName || "Новый пользователь",
                    bio: "",
                    photoURL: user.photoURL || "https://via.placeholder.com/150",
                    coverURL: "https://via.placeholder.com/600x200",
                    followersCount: 0,
                    followingCount: 0,
                    likesCount: 0,
                    createdAt: new Date()
                });
            }
        }

        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('authEmail').value;
            const password = document.getElementById('authPassword').value;
            authSubmitBtn.disabled = true;
            authSubmitBtn.textContent = "Загрузка...";

            try {
                if (isLoginMode) {
                    await signInWithEmailAndPassword(auth, email, password);
                } else {
                    const userCred = await createUserWithEmailAndPassword(auth, email, password);
                    await ensureUserProfile(userCred.user, { displayName: email.split('@')[0] });
                }
            } catch (error) {
                alert("Ошибка авторизации: " + error.message);
            } finally {
                authSubmitBtn.disabled = false;
                authSubmitBtn.textContent = isLoginMode ? "Войти" : "Создать аккаунт";
            }
        });

        googleLoginBtn.addEventListener('click', async () => {
            try {
                const provider = new GoogleAuthProvider();
                const userCred = await signInWithPopup(auth, provider);
                await ensureUserProfile(userCred.user);
            } catch (error) {
                alert("Ошибка Google входа: " + error.message);
            }
        });

        navLogout.addEventListener('click', () => signOut(auth));

        // ==========================================
        // 5. ОТСЛЕЖИВАНИЕ СОСТОЯНИЯ ПОЛЬЗОВАТЕЛЯ
        // ==========================================
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                authModal.classList.add('hidden');
                loadPosts(); // Загружаем ленту
            } else {
                currentUser = null;
                authModal.classList.remove('hidden');
                document.getElementById('postsFeed').innerHTML = ''; // Очистка при выходе
            }
        });

        // ==========================================
        // 6. ЛОГИКА ПРОФИЛЯ
        // ==========================================
        const navProfile = document.getElementById('navProfile');
        const profilePanel = document.getElementById('profilePanel');
        const closeProfileBtn = document.getElementById('closeProfileBtn');
        const editProfileBtn = document.getElementById('editProfileBtn');
        
        async function openProfile(uid) {
            const userRef = doc(db, "users", uid);
            const userSnap = await getDoc(userRef);
            
            if (userSnap.exists()) {
                const data = userSnap.data();
                document.getElementById('profileName').textContent = data.displayName;
                document.getElementById('profileBio').textContent = data.bio || "Нет описания.";
                document.getElementById('profileAvatar').src = data.photoURL;
                document.getElementById('profileCover').style.backgroundImage = `url(${data.coverURL})`;
                document.getElementById('profileFollowing').textContent = data.followingCount || 0;
                document.getElementById('profileLikes').textContent = data.likesCount || 0;
                
                // Показываем кнопку редактирования только для своего профиля
                if (uid === currentUser.uid) {
                    editProfileBtn.classList.remove('hidden');
                    // Предзаполняем форму
                    document.getElementById('editName').value = data.displayName;
                    document.getElementById('editBio').value = data.bio;
                } else {
                    editProfileBtn.classList.add('hidden');
                }
                
                profilePanel.classList.remove('translate-x-full');
            }
        }

        navProfile.addEventListener('click', () => { if(currentUser) openProfile(currentUser.uid); });
        closeProfileBtn.addEventListener('click', () => profilePanel.classList.add('translate-x-full'));

        // ==========================================
        // 7. РЕДАКТИРОВАНИЕ ПРОФИЛЯ
        // ==========================================
        const editProfileModal = document.getElementById('editProfileModal');
        const closeEditProfileBtn = document.getElementById('closeEditProfileBtn');
        const editProfileForm = document.getElementById('editProfileForm');
        const editProfileSubmitBtn = document.getElementById('editProfileSubmitBtn');

        editProfileBtn.addEventListener('click', () => editProfileModal.classList.remove('hidden'));
        closeEditProfileBtn.addEventListener('click', () => editProfileModal.classList.add('hidden'));

        editProfileForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            editProfileSubmitBtn.disabled = true;
            editProfileSubmitBtn.textContent = "Сохранение...";

            try {
                const newName = document.getElementById('editName').value;
                const newBio = document.getElementById('editBio').value;
                const avatarFile = document.getElementById('editAvatar').files[0];
                const coverFile = document.getElementById('editCover').files[0];

                const updates = { displayName: newName, bio: newBio };

                // Загружаем картинки в ImgBB если они выбраны
                if (avatarFile) updates.photoURL = await uploadToImgBB(avatarFile);
                if (coverFile) updates.coverURL = await uploadToImgBB(coverFile);

                await updateDoc(doc(db, "users", currentUser.uid), updates);
                
                editProfileModal.classList.add('hidden');
                openProfile(currentUser.uid); // Обновляем UI профиля
                loadPosts(); // Обновляем ленту, чтобы аватарки обновились
            } catch (error) {
                alert("Ошибка обновления: " + error.message);
            } finally {
                editProfileSubmitBtn.disabled = false;
                editProfileSubmitBtn.textContent = "Сохранить изменения";
            }
        });

        // ==========================================
        // 8. СОЗДАНИЕ ПОСТА И ЛЕНТА
        // ==========================================
        const navCreatePost = document.getElementById('navCreatePost');
        const createPostModal = document.getElementById('createPostModal');
        const closeCreatePostBtn = document.getElementById('closeCreatePostBtn');
        const createPostForm = document.getElementById('createPostForm');
        const postSubmitBtn = document.getElementById('postSubmitBtn');
        const postsFeed = document.getElementById('postsFeed');

        navCreatePost.addEventListener('click', () => createPostModal.classList.remove('hidden'));
        closeCreatePostBtn.addEventListener('click', () => createPostModal.classList.add('hidden'));

        createPostForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            postSubmitBtn.disabled = true;
            postSubmitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Публикация...';

            try {
                const title = document.getElementById('postTitle').value;
                const desc = document.getElementById('postDesc').value;
                const files = document.getElementById('postImages').files;
                
                // Загружаем все картинки паралелльно
                const uploadPromises = Array.from(files).map(file => uploadToImgBB(file));
                const imageUrls = (await Promise.all(uploadPromises)).filter(url => url !== null);

                // Получаем актуальные данные автора
                const userSnap = await getDoc(doc(db, "users", currentUser.uid));
                const userData = userSnap.data();

                await addDoc(collection(db, "posts"), {
                    title,
                    description: desc,
                    images: imageUrls,
                    authorId: currentUser.uid,
                    authorName: userData.displayName,
                    authorPhoto: userData.photoURL,
                    createdAt: new Date().toISOString(),
                    likes: 0
                });

                createPostModal.classList.add('hidden');
                createPostForm.reset();
                loadPosts(); // Перезагрузка ленты
            } catch (error) {
                alert("Ошибка публикации: " + error.message);
            } finally {
                postSubmitBtn.disabled = false;
                postSubmitBtn.innerHTML = 'Опубликовать';
            }
        });

        // Функция загрузки и рендера ленты
        async function loadPosts() {
            postsFeed.innerHTML = '<div class="text-center text-gray-500 mt-10"><i class="fas fa-spinner fa-spin text-2xl"></i> Загрузка ленты...</div>';
            try {
                const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
                const querySnapshot = await getDocs(q);
                postsFeed.innerHTML = '';

                if (querySnapshot.empty) {
                    postsFeed.innerHTML = '<div class="text-center text-gray-500 mt-10">Пока нет постов. Создайте первый!</div>';
                    return;
                }

                querySnapshot.forEach((docSnap) => {
                    const post = docSnap.data();
                    
                    // Генерация HTML для картинок
                    let imagesHtml = '';
                    if (post.images && post.images.length > 0) {
                        const gridClass = post.images.length === 1 ? 'grid-cols-1' : 'grid-cols-2';
                        imagesHtml = `<div class="grid ${gridClass} gap-2 mt-4 rounded-xl overflow-hidden">`;
                        post.images.forEach(url => {
                            imagesHtml += `<img src="${url}" class="w-full h-64 object-cover" alt="Post Image">`;
                        });
                        imagesHtml += `</div>`;
                    }

                    // Карточка поста
                    const postElement = document.createElement('article');
                    postElement.className = "bg-white dark:bg-darkPanel rounded-2xl shadow-sm border border-gray-200 dark:border-gray-800 p-6";
                    postElement.innerHTML = `
                        <div class="flex items-center justify-between mb-4">
                            <div class="flex items-center space-x-3 cursor-pointer user-trigger" data-uid="${post.authorId}">
                                <img src="${post.authorPhoto}" class="w-12 h-12 rounded-full object-cover">
                                <div>
                                    <h3 class="font-bold hover:underline">${post.authorName}</h3>
                                    <span class="text-xs text-gray-500">${new Date(post.createdAt).toLocaleDateString()}</span>
                                </div>
                            </div>
                        </div>
                        <h2 class="text-xl font-bold mb-2">${post.title}</h2>
                        <p class="text-gray-700 dark:text-gray-300 whitespace-pre-wrap">${post.description}</p>
                        ${imagesHtml}
                        <div class="mt-6 flex items-center space-x-6 border-t border-gray-100 dark:border-gray-800 pt-4">
                            <button class="flex items-center space-x-2 text-gray-500 hover:text-red-500 transition-colors">
                                <i class="far fa-heart text-xl"></i>
                                <span>${post.likes || 0}</span>
                            </button>
                            <button class="flex items-center space-x-2 text-gray-500 hover:text-blue-500 transition-colors">
                                <i class="far fa-comment text-xl"></i>
                                <span>0</span>
                            </button>
                        </div>
                    `;
                    postsFeed.appendChild(postElement);
                });

                // Делаем аватарки и имена в ленте кликабельными для открытия профиля
                document.querySelectorAll('.user-trigger').forEach(trigger => {
                    trigger.addEventListener('click', (e) => {
                        const uid = e.currentTarget.getAttribute('data-uid');
                        openProfile(uid);
                    });
                });

            } catch (error) {
                console.error("Ошибка загрузки постов:", error);
                postsFeed.innerHTML = '<div class="text-center text-red-500 mt-10">Ошибка загрузки ленты. Проверьте правила Firestore.</div>';
            }
        }
    </script>
</body>
</html>
