<!DOCTYPE html>
<html>
<body>

    <input type="file" id="fileInput" />
    <button onclick="uploadToPuter()">Загрузить на сервер</button>

    <!-- подключаем библиотеку puter -->
    <script src="https://js.puter.com/v2/"></script>

    <script>
        // Используй этот метод для анонимной работы
async function uploadToPuter() {
    const fileInput = document.getElementById('fileInput');
    const file = fileInput.files[0];

    if (!file) {
        alert('выбери файл');
        return;
    }

    try {
        // Проверяем, авторизован ли пользователь
        const user = await puter.auth.getUser().catch(() => null);
        
        // Если пользователя нет, мы работаем в гостевой сессии
        // Путь 'uploads/' будет создан автоматически в виртуальном диске сессии
        const uploadedFile = await puter.fs.write('uploads/' + file.name, file);
        
        // Получаем ссылку
        const url = await puter.fs.urlFor(uploadedFile);
        
        console.log('ссылка:', url);
        alert('файл готов: ' + url);
    } catch (err) {
        console.error('Ошибка:', err);
        // Если ошибка связана с авторизацией, она здесь отобразится
        alert('ошибка: ' + err.message);
    }
}
    </script>
</body>
</html>
