<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MesWy - Social Network</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { darkBg: '#121212', darkPanel: '#1f1f22', darkHover: '#2a2a2e', primary: 'var(--accent-color)' },
                    borderRadius: { 'custom': '16px' }
                }
            }
        }
    </script>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        :root { --accent-color: #2563eb; }
        body { background-color: #121212; color: #e5e7eb; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 20px; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .toast-enter { animation: slideIn 0.3s ease-out forwards; }
        @media (max-width: 640px) { .mobile-nav-text { display: none; } }
    </style>
</head>
<body class="flex h-screen overflow-hidden font-sans text-gray-200 selection:bg-primary selection:text-white">

    <div id="toastContainer" class="fixed bottom-20 sm:bottom-4 right-4 z-[9999] flex flex-col gap-2"></div>

    <!-- экран бана -->
    <div id="banScreen" class="hidden fixed inset-0 z-[10000] bg-red-600 flex flex-col items-center justify-center p-6 text-center">
        <i class='bx bx-block text-8xl text-white mb-6'></i>
        <h1 class="text-4xl font-bold text-white mb-4">ваш аккаунт заблокирован</h1>
        <p id="banReason" class="text-xl text-white mb-2"></p>
        <p id="banUntil" class="text-lg text-white/80"></p>
    </div>

    <!-- авторизация -->
    <div id="authModal" class="fixed inset-0 z-[100] flex items-center justify-center bg-black/90 backdrop-blur-md p-4">
        <div class="bg-darkPanel p-6 rounded-custom shadow-2xl w-full max-w-sm border border-gray-800">
            <div class="flex justify-center mb-4"><i class='bx bx-infinite text-5xl text-primary'></i></div>
            <h2 id="authTitle" class="text-2xl font-bold mb-4 text-center">Вход в MesWy</h2>
            <form id="authForm" class="space-y-3">
                <input type="email" id="authEmail" placeholder="Email" required class="w-full p-3 rounded-custom bg-[#121212] border border-gray-800 outline-none">
                <input type="password" id="authPassword" placeholder="Пароль" required class="w-full p-3 rounded-custom bg-[#121212] border border-gray-800 outline-none">
                <button type="submit" id="authSubmitBtn" class="w-full bg-primary text-white font-bold py-3 rounded-custom">Войти</button>
            </form>
            <p class="mt-4 text-center text-gray-400 text-sm cursor-pointer" id="authToggleBtn">Нет аккаунта? Создать</p>
        </div>
    </div>

    <!-- навигация -->
    <aside class="group fixed bottom-0 w-full h-16 sm:h-full sm:w-20 sm:hover:w-60 bg-darkPanel border-t sm:border-t-0 sm:border-r border-gray-800 transition-all duration-300 flex flex-row sm:flex-col justify-between z-40 shadow-xl overflow-x-auto sm:overflow-y-auto hide-scroll">
        <div class="flex flex-row sm:flex-col w-max sm:w-full items-center sm:items-stretch h-full sm:h-auto px-2 sm:px-0 gap-2 sm:gap-0">
            <div class="hidden sm:flex items-center w-full p-3 mb-2">
                <i class='bx bx-infinite text-3xl text-primary min-w-[3rem] text-center'></i>
                <span class="ml-2 text-xl font-bold opacity-0 group-hover:opacity-100 transition-opacity">MesWy</span>
            </div>
            
            <button onclick="loadPosts(true)" class="flex items-center p-3 sm:w-full hover:bg-darkHover cursor-pointer sm:rounded-r-custom">
                <i class='bx bx-home-alt-2 text-2xl sm:text-3xl text-gray-300'></i>
                <span class="ml-2 opacity-0 group-hover:opacity-100 mobile-nav-text">Лента</span>
            </button>

            <button id="navSearch" class="flex items-center p-3 sm:w-full hover:bg-darkHover cursor-pointer sm:rounded-r-custom">
                <i class='bx bx-search text-2xl sm:text-3xl text-gray-300'></i>
                <span class="ml-2 opacity-0 group-hover:opacity-100 mobile-nav-text">Поиск</span>
            </button>

            <button onclick="loadRecs()" class="flex items-center p-3 sm:w-full hover:bg-darkHover cursor-pointer sm:rounded-r-custom">
                <i class='bx bx-trending-up text-2xl sm:text-3xl text-gray-300'></i>
                <span class="ml-2 opacity-0 group-hover:opacity-100 mobile-nav-text">Рекомендации</span>
            </button>

            <button id="navCreatePost" class="flex items-center p-3 sm:w-full hover:bg-darkHover cursor-pointer sm:rounded-r-custom">
                <i class='bx bx-plus-circle text-2xl sm:text-3xl text-primary'></i>
                <span class="ml-2 opacity-0 group-hover:opacity-100 mobile-nav-text text-primary">Создать</span>
            </button>

            <button onclick="toggleNotifications()" class="flex items-center p-3 sm:w-full hover:bg-darkHover cursor-pointer sm:rounded-r-custom relative">
                <i class='bx bx-bell text-2xl sm:text-3xl text-gray-300'></i>
                <span class="ml-2 opacity-0 group-hover:opacity-100 mobile-nav-text">Уведомления</span>
                <span id="notifBadge" class="hidden absolute top-2 right-2 sm:left-10 w-2.5 h-2.5 bg-red-500 rounded-full"></span>
            </button>

            <button onclick="if(currentUser) openProfile(currentUser.uid)" class="flex items-center p-3 sm:w-full hover:bg-darkHover cursor-pointer sm:rounded-r-custom">
                <i class='bx bx-user text-2xl sm:text-3xl text-gray-300'></i>
                <span class="ml-2 opacity-0 group-hover:opacity-100 mobile-nav-text">Профиль</span>
            </button>
        </div>
        <div class="hidden sm:flex flex-col w-full mb-2">
            <button id="navLogout" class="flex items-center w-full p-3 hover:bg-red-500/10 text-red-500 rounded-r-custom">
                <i class='bx bx-log-out text-3xl min-w-[3rem] text-center'></i>
                <span class="ml-2 font-medium opacity-0 group-hover:opacity-100">Выйти</span>
            </button>
        </div>
    </aside>

    <main class="w-full sm:ml-20 flex-1 h-full overflow-y-auto p-3 sm:p-6 flex justify-center bg-[#121212] pb-24 sm:pb-6">
        <div class="max-w-xl w-full flex flex-col gap-4" id="postsFeed"></div>
    </main>

    <!-- панель профиля -->
    <div id="profilePanel" class="fixed top-0 right-0 h-full w-full sm:w-[480px] bg-darkPanel shadow-2xl z-50 transform translate-x-full transition-transform duration-300 flex flex-col border-l border-gray-800">
        <div class="flex-1 overflow-y-auto hide-scroll pb-20 sm:pb-4">
            <div id="profileCover" class="h-40 sm:h-48 bg-gray-800 bg-cover bg-center relative">
                <button onclick="document.getElementById('profilePanel').classList.add('translate-x-full')" class="absolute top-3 right-3 bg-black/60 text-white w-10 h-10 rounded-full flex items-center justify-center">
                    <i class='bx bx-x text-2xl'></i>
                </button>
            </div>
            <div class="px-5 relative flex flex-col">
                <div class="flex justify-between items-end -mt-12 sm:-mt-14 relative z-20 mb-3">
                    <img id="profileAvatar" src="" class="w-24 h-24 rounded-full border-4 border-darkPanel object-cover">
                    <div class="flex gap-2">
                        <button id="adminPanelBtn" onclick="document.getElementById('adminModal').classList.remove('hidden')" class="hidden bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-custom font-bold text-sm mb-1 shadow-lg shadow-red-600/20">Админ</button>
                        <button id="editProfileBtn" onclick="document.getElementById('editProfileModal').classList.remove('hidden')" class="hidden bg-[#121212] hover:bg-gray-800 text-white px-5 py-2 rounded-custom font-bold border border-gray-700 text-sm mb-1">Редактировать</button>
                    </div>
                </div>
                <h2 id="profileName" class="text-2xl font-bold"></h2>
                <p id="profileBio" class="text-gray-400 mt-2 text-sm whitespace-pre-wrap"></p>
                <div class="mt-6 border-t border-gray-800 pt-5">
                    <h3 class="text-lg font-bold mb-4">Публикации</h3>
                    <div id="profilePostsFeed" class="flex flex-col gap-4"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- панель уведомлений -->
    <div id="notificationsPanel" class="fixed top-0 right-0 h-full w-full sm:w-[400px] bg-darkPanel shadow-2xl z-50 transform translate-x-full transition-transform duration-300 flex flex-col border-l border-gray-800">
        <div class="p-4 border-b border-gray-800 flex justify-between items-center bg-[#1f1f22] sticky top-0 z-10">
            <h2 class="text-xl font-bold">Уведомления</h2>
            <button onclick="toggleNotifications()" class="text-gray-400 hover:text-white"><i class='bx bx-x text-3xl'></i></button>
        </div>
        <div id="notificationsList" class="flex-1 overflow-y-auto p-4 flex flex-col gap-3"></div>
    </div>

    <!-- админ панель -->
    <div id="adminModal" class="hidden fixed inset-0 z-[90] flex items-center justify-center bg-black/90 backdrop-blur-md p-4">
        <div class="bg-darkPanel p-6 rounded-custom shadow-2xl w-full max-w-md border border-red-900/50">
            <button onclick="this.parentElement.parentElement.classList.add('hidden')" class="absolute top-4 right-4 text-gray-500 hover:text-white"><i class='bx bx-x text-2xl'></i></button>
            <h2 class="text-2xl font-bold mb-4 text-red-500 flex items-center gap-2"><i class='bx bx-shield-quarter'></i> Админ-Панель</h2>
            <div class="space-y-4">
                <input type="text" id="banUid" placeholder="UID пользователя" class="w-full p-3 rounded-custom bg-[#121212] border border-gray-800 outline-none text-sm">
                <input type="text" id="banReasonInput" placeholder="Причина бана" class="w-full p-3 rounded-custom bg-[#121212] border border-gray-800 outline-none text-sm">
                <input type="number" id="banDays" placeholder="Срок бана (дни)" class="w-full p-3 rounded-custom bg-[#121212] border border-gray-800 outline-none text-sm">
                <button onclick="banUser()" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-custom">Забанить пользователя</button>
            </div>
        </div>
    </div>

    <div id="createPostModal" class="hidden fixed inset-0 z-[70] flex items-center justify-center bg-black/90 p-4">
        <div class="bg-darkPanel p-5 rounded-custom shadow-2xl w-full max-w-lg relative border border-gray-800">
            <button onclick="this.parentElement.parentElement.classList.add('hidden')" class="absolute top-4 right-4 text-gray-500"><i class='bx bx-x text-xl'></i></button>
            <h2 class="text-2xl font-bold mb-4">Новый пост</h2>
            <form id="createPostForm" class="space-y-4">
                <input type="text" id="postTitle" placeholder="Заголовок" required class="w-full p-3 rounded-custom bg-[#121212] border border-gray-800 outline-none">
                <textarea id="postDesc" placeholder="Что нового?" rows="4" class="w-full p-3 rounded-custom bg-[#121212] border border-gray-800 outline-none resize-none"></textarea>
                <div class="bg-[#121212] p-4 rounded-custom border border-gray-800">
                    <label class="flex flex-col items-center justify-center cursor-pointer">
                        <i class='bx bx-images text-4xl text-gray-500 mb-2'></i>
                        <span class="text-sm text-gray-400">Фото</span>
                        <input type="file" id="postImages" multiple accept="image/*" class="hidden">
                    </label>
                    <div id="imagePreview" class="mt-3 flex gap-2 overflow-x-auto hide-scroll"></div>
                </div>
                <button type="submit" id="postSubmitBtn" class="w-full bg-primary text-white font-bold py-3 rounded-custom">Опубликовать</button>
            </form>
        </div>
    </div>

    <!-- зум картинок -->
    <div id="imageViewerModal" class="hidden fixed inset-0 z-[999] bg-black/95 flex items-center justify-center p-4">
        <button onclick="closeImage()" class="absolute top-4 right-4 text-white w-10 h-10 bg-gray-900/50 rounded-full flex items-center justify-center z-50">
            <i class='bx bx-x text-2xl'></i>
        </button>
        <div class="w-full h-full flex items-center justify-center overflow-hidden" id="imageZoomContainer">
            <img id="viewerImage" src="" class="max-w-full max-h-full object-contain transition-transform duration-200 cursor-grab">
        </div>
    </div>

    <div id="editProfileModal" class="hidden fixed inset-0 z-[90] flex items-center justify-center bg-black/90 p-4">
        <div class="bg-darkPanel p-5 rounded-custom shadow-2xl w-full max-w-md border border-gray-800">
            <button onclick="this.parentElement.parentElement.classList.add('hidden')" class="absolute top-4 right-4 text-gray-500"><i class='bx bx-x text-xl'></i></button>
            <h2 class="text-2xl font-bold mb-4">Редактирование</h2>
            <form id="editProfileForm" class="space-y-4">
                <input type="text" id="editName" placeholder="Имя" required class="w-full p-3 rounded-custom bg-[#121212] border border-gray-800 outline-none">
                <textarea id="editBio" placeholder="О себе" class="w-full p-3 rounded-custom bg-[#121212] border border-gray-800 outline-none resize-none"></textarea>
                <input type="file" id="editAvatar" accept="image/*" class="w-full text-xs text-gray-400">
                <button type="submit" id="editProfileSubmitBtn" class="w-full bg-white text-black font-bold py-3 rounded-custom">Сохранить</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, doc, setDoc, updateDoc, getDoc, query, orderBy, limit, arrayUnion, where } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

        const app = initializeApp({
            apiKey: "AIzaSyCBSWHaooqAwJTUjDhwjXKDN1z5locXCcM",
            authDomain: "meswy-web.firebaseapp.com",
            projectId: "meswy-web"
        });
        const auth = getAuth(app);
        const db = getFirestore(app);
        const IMGBB_KEY = "cfedaeb5c6bb179902b44ba10cb396cb";

        window.currentUser = null;
        window.userDataCache = null; 
        const userCache = {}; // глобальный кэш для обновления аватарок

        window.showToast = (msg) => {
            const toast = document.createElement('div');
            toast.className = `toast-enter p-4 rounded-custom bg-darkPanel border border-gray-700 text-white shadow-xl mb-2 text-sm z-[9999]`;
            toast.innerText = msg;
            document.getElementById('toastContainer').appendChild(toast);
            setTimeout(() => { toast.remove(); }, 3000);
        };

        async function getUserData(uid) {
            if(userCache[uid]) return userCache[uid];
            const snap = await getDoc(doc(db, "users", uid));
            if(snap.exists()) {
                userCache[uid] = snap.data();
                return userCache[uid];
            }
            return { displayName: 'User', photoURL: 'https://i.ibb.co/30Zc4Fq/default-avatar.png' };
        }

        async function ensureUserProfile(user) {
            const userRef = doc(db, "users", user.uid);
            const snap = await getDoc(userRef);
            if (!snap.exists()) {
                await setDoc(userRef, {
                    email: user.email,
                    displayName: user.email.split('@')[0],
                    bio: "",
                    photoURL: "https://i.ibb.co/30Zc4Fq/default-avatar.png",
                    notifications: []
                });
            }
            return (await getDoc(userRef)).data();
        }

        document.getElementById('authForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const em = document.getElementById('authEmail').value;
            const pw = document.getElementById('authPassword').value;
            try {
                try { await signInWithEmailAndPassword(auth, em, pw); } 
                catch(e) { 
                    const cr = await createUserWithEmailAndPassword(auth, em, pw);
                    await ensureUserProfile(cr.user);
                }
            } catch(e) { showToast(e.message); }
        });

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const data = await ensureUserProfile(user);
                if(data.banned && new Date(data.banned.until) > new Date()) {
                    document.getElementById('banScreen').classList.remove('hidden');
                    document.getElementById('banReason').innerText = "Причина: " + data.banned.reason;
                    document.getElementById('banUntil').innerText = "До: " + new Date(data.banned.until).toLocaleString();
                    return;
                }
                window.currentUser = user; window.userDataCache = data;
                document.getElementById('authModal').classList.add('hidden');
                
                if(user.email === 'ryzik3489@gmail.com') {
                    document.getElementById('adminPanelBtn').classList.remove('hidden');
                }
                loadPosts();
                checkNotifications();
            } else {
                document.getElementById('authModal').classList.remove('hidden');
            }
        });

        window.banUser = async () => {
            const uid = document.getElementById('banUid').value;
            const reason = document.getElementById('banReasonInput').value;
            const days = parseInt(document.getElementById('banDays').value || 1);
            if(!uid) return;
            const until = new Date(); until.setDate(until.getDate() + days);
            await updateDoc(doc(db, "users", uid), { banned: { reason, until: until.toISOString() } });
            showToast("пользователь забанен");
            document.getElementById('adminModal').classList.add('hidden');
        };

        window.sendNotification = async (targetUid, type, postId) => {
            if(targetUid === currentUser.uid) return;
            await updateDoc(doc(db, "users", targetUid), {
                notifications: arrayUnion({ type, from: currentUser.uid, postId, date: new Date().toISOString() })
            });
        };

        window.toggleNotifications = async () => {
            const panel = document.getElementById('notificationsPanel');
            const list = document.getElementById('notificationsList');
            if(panel.classList.contains('translate-x-full')) {
                panel.classList.remove('translate-x-full');
                document.getElementById('notifBadge').classList.add('hidden');
                const data = await getUserData(currentUser.uid);
                list.innerHTML = '';
                if(!data.notifications || data.notifications.length===0) list.innerHTML = '<p class="text-gray-500 text-center mt-5">нет уведомлений</p>';
                else {
                    const notifs = data.notifications.sort((a,b)=>new Date(b.date)-new Date(a.date)).reverse();
                    for(const n of notifs) {
                        const u = await getUserData(n.from);
                        const txt = n.type === 'like' ? 'лайкнул ваш пост' : 'оставил комментарий';
                        const el = document.createElement('div');
                        el.className = "bg-[#121212] p-3 rounded-custom flex gap-3 items-center border border-gray-800 transform hover:scale-105 transition duration-300";
                        el.innerHTML = `
                            <img src="${u.photoURL}" class="w-10 h-10 rounded-full object-cover">
                            <div class="text-sm"><span class="font-bold">${u.displayName}</span> ${txt}</div>
                        `;
                        list.prepend(el);
                    }
                }
            } else { panel.classList.add('translate-x-full'); }
        };

        async function checkNotifications() {
            const data = await getUserData(currentUser.uid);
            if(data.notifications && data.notifications.length > 0) {
                document.getElementById('notifBadge').classList.remove('hidden');
            }
        }

        window.openProfile = async (uid) => {
            const d = await getUserData(uid);
            document.getElementById('profileName').innerText = d.displayName;
            document.getElementById('profileBio').innerText = d.bio || '';
            document.getElementById('profileAvatar').src = d.photoURL;
            if(uid === currentUser.uid) document.getElementById('editProfileBtn').classList.remove('hidden');
            else document.getElementById('editProfileBtn').classList.add('hidden');
            document.getElementById('profilePanel').classList.remove('translate-x-full');
            
            const pFeed = document.getElementById('profilePostsFeed');
            pFeed.innerHTML = 'загрузка...';
            const s = await getDocs(query(collection(db, "posts"), where("authorId", "==", uid)));
            pFeed.innerHTML = '';
            for(const d of s.docs) await renderPost(d, pFeed, true);
        };

        window.toggleLike = async (postId, authorId, btn) => {
            const ref = doc(db, "posts", postId);
            const s = await getDoc(ref);
            const likes = s.data().likes || [];
            const isLiked = likes.includes(currentUser.uid);
            const nl = isLiked ? likes.filter(i=>i!==currentUser.uid) : [...likes, currentUser.uid];
            await updateDoc(ref, { likes: nl });
            if(!isLiked) sendNotification(authorId, 'like', postId);
            btn.innerHTML = `<i class='bx ${isLiked ? 'bx-heart' : 'bxs-heart text-red-500'} text-2xl'></i> <span>${nl.length}</span>`;
        };

        window.submitComment = async (postId, authorId, inputId) => {
            const i = document.getElementById(inputId);
            if(!i.value.trim()) return;
            await updateDoc(doc(db, "posts", postId), {
                comments: arrayUnion({ uid: currentUser.uid, text: i.value, date: new Date().toISOString() })
            });
            sendNotification(authorId, 'comment', postId);
            i.value = ''; showToast('отправлено');
            loadPosts();
        };

        async function renderPost(docSnap, container, compact=false) {
            const p = docSnap.data();
            const u = await getUserData(p.authorId);
            let imgs = '';
            if(p.images) p.images.forEach(url => imgs += `<img src="${url}" onclick="openImage('${url}')" class="w-full h-48 object-cover rounded-custom mt-2">`);
            
            let coms = '';
            if(p.comments && !compact) {
                for(let c of p.comments.slice(-3)) {
                    const cu = await getUserData(c.uid); // глобальное обновление имени/авы
                    coms += `<div class="flex gap-2 mt-2"><img src="${cu.photoURL}" class="w-6 h-6 rounded-full"><div class="text-sm"><span class="font-bold">${cu.displayName}</span> ${c.text}</div></div>`;
                }
            }

            const el = document.createElement('div');
            el.className = "bg-darkPanel p-4 rounded-custom border border-gray-800";
            el.innerHTML = `
                <div class="flex items-center gap-3 mb-2 cursor-pointer" onclick="openProfile('${p.authorId}')">
                    <img src="${u.photoURL}" class="w-10 h-10 rounded-full object-cover">
                    <h3 class="font-bold">${u.displayName}</h3>
                </div>
                <p class="text-base">${p.description}</p>
                ${imgs}
                <div class="flex gap-4 mt-3 pt-3 border-t border-gray-800">
                    <button onclick="toggleLike('${docSnap.id}', '${p.authorId}', this)" class="flex gap-1 items-center">
                        <i class='bx ${p.likes?.includes(currentUser.uid) ? 'bxs-heart text-red-500' : 'bx-heart'} text-2xl'></i> <span>${p.likes?.length||0}</span>
                    </button>
                </div>
                ${!compact ? `
                <div class="mt-2">${coms}</div>
                <div class="flex gap-2 mt-3">
                    <input id="c-${docSnap.id}" placeholder="комментарий..." class="flex-1 bg-[#121212] rounded-custom px-3 text-sm outline-none border border-gray-800">
                    <button onclick="submitComment('${docSnap.id}', '${p.authorId}', 'c-${docSnap.id}')" class="bg-primary px-3 rounded-custom"><i class='bx bx-send'></i></button>
                </div>` : ''}
            `;
            container.appendChild(el);
        }

        window.loadPosts = async (reset=true) => {
            if(reset) document.getElementById('postsFeed').innerHTML = '';
            const s = await getDocs(query(collection(db, "posts"), orderBy("createdAt", "desc"), limit(10)));
            for(const d of s.docs) await renderPost(d, document.getElementById('postsFeed'));
        };

        window.loadRecs = async () => {
            document.getElementById('postsFeed').innerHTML = '<div class="text-center p-5">загрузка реков...</div>';
            const s = await getDocs(query(collection(db, "posts"), limit(20))); // симуляция реков
            document.getElementById('postsFeed').innerHTML = '<h2 class="font-bold text-xl mb-2 text-primary">Рекомендации</h2>';
            const docs = s.docs.sort(() => 0.5 - Math.random()).slice(0,5);
            for(const d of docs) await renderPost(d, document.getElementById('postsFeed'));
        };

        let zoomScale = 1;
        const vImg = document.getElementById('viewerImage');
        window.openImage = (url) => {
            zoomScale = 1; vImg.style.transform = `scale(1)`;
            vImg.src = url; document.getElementById('imageViewerModal').classList.remove('hidden');
        };
        window.closeImage = () => { document.getElementById('imageViewerModal').classList.add('hidden'); };
        
        vImg.addEventListener('wheel', (e) => {
            e.preventDefault();
            zoomScale += e.deltaY * -0.002;
            zoomScale = Math.min(Math.max(0.5, zoomScale), 5);
            vImg.style.transform = `scale(${zoomScale})`;
        });

        document.getElementById('navCreatePost').addEventListener('click', () => document.getElementById('createPostModal').classList.remove('hidden'));
        document.getElementById('createPostForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const url = document.getElementById('postImages').files[0] ? await upload(document.getElementById('postImages').files[0]) : null;
            await addDoc(collection(db, "posts"), {
                title: document.getElementById('postTitle').value,
                description: document.getElementById('postDesc').value,
                images: url ? [url] : [], authorId: currentUser.uid, createdAt: new Date().toISOString(), likes: [], comments: []
            });
            document.getElementById('createPostModal').classList.add('hidden'); loadPosts();
        });

        async function upload(f) {
            const fd = new FormData(); fd.append('image', f);
            const r = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, {method:'POST',body:fd});
            return (await r.json()).data.url;
        }

        document.getElementById('editProfileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const n = document.getElementById('editName').value;
            const b = document.getElementById('editBio').value;
            const f = document.getElementById('editAvatar').files[0];
            const updates = { displayName: n, bio: b };
            if(f) updates.photoURL = await upload(f);
            await updateDoc(doc(db, "users", currentUser.uid), updates);
            userCache[currentUser.uid] = { ...userCache[currentUser.uid], ...updates };
            document.getElementById('editProfileModal').classList.add('hidden');
            openProfile(currentUser.uid); loadPosts();
        });
    </script>
</body>
</html>
