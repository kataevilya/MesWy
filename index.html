<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MesWy — Лучшее хранение ваших сохранений</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #121212;
            --text-color: #ffffff;
            --panel-bg: #1e1e1e;
            --accent: #bb86fc;
            --hover-bg: #333333;
        }
        [data-theme="light"] {
            --bg-color: #f5f5f5;
            --text-color: #000000;
            --panel-bg: #ffffff;
            --accent: #6200ee;
            --hover-bg: #e0e0e0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; outline: none; }
        body { background: var(--bg-color); color: var(--text-color); display: flex; height: 100vh; overflow: hidden; transition: 0.3s; flex-direction: row; }
        
        /* Адаптивная левая панель */
        .sidebar-left {
            width: 70px;
            background: var(--panel-bg);
            transition: width 0.3s ease;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--hover-bg);
            z-index: 10;
        }
        .sidebar-left:hover { width: 280px; }
        .nav-item {
            display: flex;
            align-items: center;
            padding: 20px;
            color: var(--text-color);
            text-decoration: none;
            cursor: pointer;
            white-space: nowrap;
            transition: 0.2s;
        }
        .nav-item:hover { background: var(--hover-bg); }
        .nav-item i { min-width: 30px; text-align: center; font-size: 22px; }
        .nav-item span { margin-left: 15px; opacity: 0; transition: opacity 0.3s; font-size: 16px; font-weight: bold; }
        .sidebar-left:hover .nav-item span { opacity: 1; }
        
        /* Главная лента */
        .feed {
            flex-grow: 1;
            padding: 30px;
            overflow-y: auto;
            background: var(--bg-color);
            position: relative;
            height: 100%;
        }
        .feed h2 { margin-bottom: 20px; font-size: 28px; }
        
        .post {
            background: var(--panel-bg);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 25px;
            border: 1px solid var(--hover-bg);
            max-width: 800px;
            width: 100%;
        }
        .post-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; cursor: pointer; }
        .post-avatar { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; background: var(--hover-bg); }
        .post-author { font-size: 18px; font-weight: bold; }
        .post-title { font-size: 22px; font-weight: bold; margin-bottom: 10px; color: var(--accent); }
        .post-desc { font-size: 16px; margin-bottom: 15px; line-height: 1.5; word-break: break-word; }
        .post-img { width: 100%; max-height: 450px; object-fit: cover; border-radius: 15px; margin-bottom: 15px; border: 1px solid var(--hover-bg); }
        .post-actions { display: flex; gap: 15px; flex-wrap: wrap; align-items: center; }
        
        .like-container { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 18px; font-weight: bold; transition: 0.2s; user-select: none; }
        .like-container:hover { color: #ff4444; }
        .like-container.liked { color: #ff4444; }

        .btn {
            padding: 12px 25px;
            border-radius: 30px;
            background: var(--accent);
            color: #fff;
            border: none;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            text-align: center;
            font-weight: bold;
            font-size: 16px;
            transition: 0.2s;
        }
        .btn:hover { opacity: 0.8; transform: scale(0.98); }
        .btn-danger { background: #ff4444; }
        .btn-secondary { background: var(--hover-bg); color: var(--text-color); }
        .btn-google { background: #fff; color: #000; display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; }
        
        /* Адаптивная боковая панель профиля */
        .sidebar-right {
            width: 420px;
            background: var(--panel-bg);
            padding: 0;
            border-left: 1px solid var(--hover-bg);
            display: flex;
            flex-direction: column;
            position: fixed;
            right: -460px;
            top: 0;
            height: 100%;
            z-index: 20;
            overflow-y: auto;
            box-shadow: -5px 0 25px rgba(0,0,0,0.5);
            transition: right 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .sidebar-right.active { right: 0; }
        .profile-banner { width: 100%; height: 160px; background: linear-gradient(45deg, #6200ee, #bb86fc); background-size: cover; background-position: center; position: relative; }
        
        .close-profile {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 28px;
            cursor: pointer;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.6);
            transition: 0.2s;
            z-index: 5;
        }
        .close-profile:hover { color: var(--accent); }
        .profile-content { padding: 0 20px 30px 20px; display: flex; flex-direction: column; align-items: center; }
        .profile-avatar-large { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; margin-top: -60px; background: var(--hover-bg); border: 4px solid var(--panel-bg); z-index: 2; }
        .profile-name { font-size: 26px; font-weight: bold; margin: 15px 0 25px 0; text-align: center; }
        .profile-posts-container { width: 100%; }
        .profile-posts-container h3 { font-size: 20px; margin-bottom: 20px; border-bottom: 2px solid var(--hover-bg); padding-bottom: 10px; }
        
        /* Модальные окна */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 15px;
        }
        .modal-content {
            background: var(--panel-bg);
            padding: 30px;
            border-radius: 25px;
            width: 500px;
            max-width: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-content h3 { font-size: 24px; text-align: center; margin-bottom: 5px; }
        .modal-content input[type="text"], .modal-content textarea {
            padding: 15px;
            background: var(--bg-color);
            border: 2px solid var(--hover-bg);
            color: var(--text-color);
            border-radius: 15px;
            width: 100%;
            font-size: 16px;
        }
        .modal-content input[type="text"]:focus, .modal-content textarea:focus { border-color: var(--accent); }
        
        .file-upload-wrapper { position: relative; width: 100%; text-align: center; }
        .file-upload-wrapper input[type="file"] { display: none; }
        .file-upload-label {
            display: block;
            padding: 15px;
            background: var(--bg-color);
            border: 2px dashed var(--accent);
            color: var(--text-color);
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }
        .file-upload-label:hover { background: rgba(187, 134, 252, 0.1); transform: translateY(-2px); }
        .file-upload-label i { font-size: 24px; margin-bottom: 8px; display: block; color: var(--accent); }
        .file-name-display { margin-top: 8px; font-size: 14px; color: var(--accent); word-break: break-all; }

        /* Встроенный кастомный интерфейс уведомлений (Toast) */
        #toastContainer {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 350px;
            width: 100%;
        }
        .toast {
            background: #ff4444;
            color: #fff;
            padding: 15px 20px;
            border-radius: 15px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.3s ease forwards;
        }
        .toast.success { background: #00c851; }
        @keyframes slideIn { from { transform: translateX(120%); } to { transform: translateX(0); } }

        #loadingOverlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 999;
            color: white;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            flex-direction: column;
            font-weight: bold;
        }
        .spinner { border: 6px solid var(--hover-bg); border-top: 6px solid var(--accent); border-radius: 50%; width: 60px; height: 60px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Адаптивность под мобильные устройства (Экраны меньше 768px) */
        @media (max-width: 768px) {
            body { flex-direction: column-reverse; } /* Меню падает вниз */
            .sidebar-left {
                width: 100%;
                height: 60px;
                flex-direction: row;
                justify-content: space-around;
                border-right: none;
                border-top: 1px solid var(--hover-bg);
                position: relative;
            }
            .sidebar-left:hover { width: 100%; }
            .nav-item { padding: 10px; flex-direction: column; justify-content: center; width: auto; flex-grow: 1; }
            .nav-item i { font-size: 20px; }
            .nav-item span { display: none !important; } /* Скрываем текст на телефонах */
            .nav-item[style*="margin-top: auto;"] { margin-top: 0 !important; }
            
            .feed { padding: 15px; height: calc(100vh - 60px); }
            .feed h2 { font-size: 22px; }
            .post { padding: 15px; border-radius: 15px; }
            .post-title { font-size: 18px; }
            .post-desc { font-size: 14px; }
            .post-img { max-height: 250px; }
            .btn { padding: 10px 18px; font-size: 14px; width: 100%; }
            .post-actions { flex-direction: column; align-items: flex-start; gap: 10px; }
            .post-actions .btn-danger { margin-left: 0 !important; }
            
            .sidebar-right { width: 100%; right: -100%; } /* На весь экран смартфона */
            #toastContainer { bottom: 80px; right: 10px; left: 10px; max-width: calc(100% - 20px); }
        }
    </style>
</head>
<body>

    <div id="toastContainer"></div>

    <div id="loadingOverlay">
        <div class="spinner"></div>
        <span id="loadingText">Загрузка...</span>
    </div>

    <!-- Кастомное окно подтверждения (Замена confirm) -->
    <div id="confirmModal" class="modal">
        <div class="modal-content" style="width: 350px; text-align: center;">
            <h3 id="confirmTitle">Подтверждение</h3>
            <p id="confirmMessage" style="color: #ccc; font-size: 16px; margin-bottom: 10px;"></p>
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-danger" id="confirmYesBtn" style="flex: 1;">Удалить</button>
                <button class="btn btn-secondary" onclick="closeConfirmModal()" style="flex: 1;">Отмена</button>
            </div>
        </div>
    </div>

    <nav class="sidebar-left">
        <div class="nav-item" onclick="openUploadModal()">
            <i class="fa-solid fa-cloud-arrow-up"></i>
            <span>Загрузить сохранение</span>
        </div>
        <div class="nav-item" onclick="openMyProfile()">
            <i class="fa-solid fa-user-circle"></i>
            <span>Мой профиль</span>
        </div>
        <div class="nav-item" onclick="openEditProfileModal()">
            <i class="fa-solid fa-user-pen"></i>
            <span>Настроить профиль</span>
        </div>
        <div class="nav-item" onclick="changeTheme()">
            <i class="fa-solid fa-palette"></i>
            <span>Смена темы</span>
        </div>
        <a class="nav-item" href="https://t.me/ryzik348" target="_blank">
            <i class="fa-brands fa-telegram"></i>
            <span>Поддержка</span>
        </a>
        <div class="nav-item" onclick="logout()" style="margin-top: auto; color: #ff4444;">
            <i class="fa-solid fa-right-from-bracket"></i>
            <span>Выйти</span>
        </div>
    </nav>

    <main class="feed">
        <h2>Лента сохранений</h2>
        <div id="feedContainer"></div>
    </main>

    <aside class="sidebar-right" id="profilePanel">
        <div id="profileBanner" class="profile-banner">
            <i class="fa-solid fa-xmark close-profile" onclick="closeProfile()"></i>
        </div>
        <div class="profile-content">
            <img src="" id="profileAvatar" class="profile-avatar-large" alt="Аватар" onerror="this.src='https://via.placeholder.com/120?text=U'">
            <div class="profile-name" id="profileName">Имя пользователя</div>
            <div class="profile-posts-container">
                <h3>Посты пользователя</h3>
                <div id="profilePostsList"></div>
            </div>
        </div>
    </aside>

    <div id="authModal" class="modal" style="display: flex;">
        <div class="modal-content">
            <h3>Добро пожаловать в MesWy</h3>
            <p style="text-align: center; color: #ccc;">Войдите, чтобы сохранять файлы</p>
            <button class="btn btn-google" onclick="loginGoogle()">
                <i class="fa-brands fa-google" style="font-size: 20px;"></i> Войти через Google
            </button>
        </div>
    </div>

    <div id="editProfileModal" class="modal">
        <div class="modal-content">
            <h3>Настройки профиля</h3>
            <input type="text" id="editProfileName" placeholder="Ваше имя">
            
            <div class="file-upload-wrapper">
                <label for="editProfileAvatarInput" class="file-upload-label">
                    <i class="fa-solid fa-user-image"></i> Выберите файл аватарки
                </label>
                <input type="file" id="editProfileAvatarInput" accept="image/*" onchange="updateFileName('editProfileAvatarInput', 'avatarFileName')">
                <div id="avatarFileName" class="file-name-display"></div>
            </div>

            <div class="file-upload-wrapper">
                <label for="editProfileBannerInput" class="file-upload-label">
                    <i class="fa-solid fa-images"></i> Выберите файл фона профиля
                </label>
                <input type="file" id="editProfileBannerInput" accept="image/*" onchange="updateFileName('editProfileBannerInput', 'bannerFileName')">
                <div id="bannerFileName" class="file-name-display"></div>
            </div>

            <button class="btn" onclick="saveProfileChanges()">Сохранить профиль</button>
            <button class="btn" onclick="closeModals()" style="background: var(--hover-bg);">Отмена</button>
        </div>
    </div>

    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <h3>Новое сохранение</h3>
            <input type="text" id="postTitleInput" placeholder="Название игры / сохранения">
            <textarea id="postDescInput" placeholder="Описание вашего сохранения" rows="3"></textarea>
            
            <div class="file-upload-wrapper">
                <label for="postImageInput" class="file-upload-label">
                    <i class="fa-solid fa-image"></i>
                    Скриншот игры (необязательно)
                </label>
                <input type="file" id="postImageInput" accept="image/*" onchange="updateFileName('postImageInput', 'imgFileName')">
                <div id="imgFileName" class="file-name-display"></div>
            </div>

            <div class="file-upload-wrapper">
                <label for="postFileInput" class="file-upload-label">
                    <i class="fa-solid fa-file-zipper"></i>
                    Файл сохранения (Только .pc)
                </label>
                <input type="file" id="postFileInput" accept=".pc" onchange="updateFileName('postFileInput', 'fileFileName')">
                <div id="fileFileName" class="file-name-display"></div>
            </div>

            <button class="btn" onclick="uploadPost()">Опубликовать</button>
            <button class="btn" onclick="closeModals()" style="background: var(--hover-bg);">Отмена</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, deleteDoc, doc, serverTimestamp, updateDoc, arrayUnion, arrayRemove, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCBSWHaooqAwJTUjDhwjXKDN1z5locXCcM",
            authDomain: "meswy-web.firebaseapp.com",
            projectId: "meswy-web",
            appId: "1:802423553668:web:64be6aae3f34b2d0f88cd1"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let allPosts = [];
        let deleteTargetId = null;
        const IMGBB_API_KEY = "cfedaeb5c6bb179902b44ba10cb396cb";

        // Кастомная функция вывода уведомлений прямо на сайте
        window.showToast = (message, type = 'error') => {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type === 'success' ? 'success' : ''}`;
            toast.innerHTML = `<i class="fa-solid ${type === 'success' ? 'fa-circle-check' : 'fa-circle-exclamation'}"></i> <span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => { toast.remove(); }, 4000);
        }

        window.closeConfirmModal = () => { document.getElementById('confirmModal').style.display = 'none'; deleteTargetId = null; }

        window.updateFileName = (inputId, displayId) => {
            const input = document.getElementById(inputId);
            const display = document.getElementById(displayId);
            if(input.files.length > 0) {
                display.innerText = "Выбран файл: " + input.files[0].name;
            } else { display.innerText = ""; }
        }

        const showLoading = (text) => {
            document.getElementById('loadingText').innerText = text;
            document.getElementById('loadingOverlay').style.display = 'flex';
        }
        const hideLoading = () => { document.getElementById('loadingOverlay').style.display = 'none'; }

        window.loginGoogle = async () => {
            try {
                const provider = new GoogleAuthProvider();
                await signInWithPopup(auth, provider);
                showToast("Успешный вход!", "success");
            } catch (error) { showToast("Ошибка входа: " + error.message); }
        }

        window.logout = async () => {
            await signOut(auth);
            window.location.reload();
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('authModal').style.display = 'none';
                loadFeed();
            } else { document.getElementById('authModal').style.display = 'flex'; }
        });

        async function uploadToImgBB(file) {
            const formData = new FormData();
            formData.append('image', file);
            const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: 'POST', body: formData });
            const data = await response.json();
            if (data.success) return data.data.url;
            throw new Error("Не удалось загрузить изображение.");
        }

        async function uploadToGofile(file) {
            const serverReq = await fetch('https://api.gofile.io/servers');
            const serverData = await serverReq.json();
            const server = serverData.data.servers[0].name;

            const formData = new FormData();
            formData.append('file', file);
            
            const uploadReq = await fetch(`https://${server}.gofile.io/uploadFile`, { method: 'POST', body: formData });
            const uploadData = await uploadReq.json();
            if (uploadData.status === 'ok') return uploadData.data.downloadPage;
            throw new Error('Ошибка сервера GoFile');
        }

        async function loadFeed() {
            showLoading('Загрузка ленты...');
            try {
                const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
                const querySnapshot = await getDocs(q);
                allPosts = [];
                querySnapshot.forEach((doc) => { allPosts.push({ id: doc.id, ...doc.data() }); });
                renderPosts(allPosts, 'feedContainer');
            } catch (e) { showToast("Ошибка загрузки ленты: " + e.message); }
            hideLoading();
        }

        function renderPosts(postsArray, containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            if(postsArray.length === 0) {
                container.innerHTML = '<p style="color:#aaa; padding: 10px;">Здесь пока пусто.</p>';
                return;
            }
            postsArray.forEach(post => {
                const isAuthor = currentUser && post.authorId === currentUser.uid;
                const likesCount = post.likedBy ? post.likedBy.length : 0;
                const hasLiked = currentUser && post.likedBy && post.likedBy.includes(currentUser.uid);

                const postEl = document.createElement('div');
                postEl.className = 'post';
                postEl.innerHTML = `
                    <div class="post-header" onclick="openProfile('${post.authorId}', '${post.authorName}', '${post.authorAvatar}')">
                        <img src="${post.authorAvatar || 'https://via.placeholder.com/50?text=U'}" class="post-avatar" onerror="this.src='https://via.placeholder.com/50?text=U'">
                        <div class="post-author">${post.authorName}</div>
                    </div>
                    <div class="post-title">${post.title}</div>
                    <div class="post-desc">${post.desc}</div>
                    ${post.imgUrl ? `<img src="${post.imgUrl}" class="post-img" alt="Скриншот">` : ''}
                    <div class="post-actions">
                        ${post.fileUrl ? `<a href="${post.fileUrl}" target="_blank" class="btn"><i class="fa-solid fa-download"></i> Скачать файл (.pc)</a>` : `<button class="btn" disabled style="background:#555;">Файл отсутствует</button>`}
                        <div class="like-container ${hasLiked ? 'liked' : ''}" onclick="toggleLike('${post.id}')">
                            <i class="${hasLiked ? 'fa-solid' : 'fa-regular'} fa-heart"></i>
                            <span>${likesCount}</span>
                        </div>
                        ${isAuthor ? `<button class="btn btn-danger" style="margin-left:auto;" onclick="askDeletePost('${post.id}')"><i class="fa-solid fa-trash"></i></button>` : ''}
                    </div>
                `;
                container.appendChild(postEl);
            });
        }

        window.toggleLike = async (postId) => {
            if (!currentUser) return;
            const post = allPosts.find(p => p.id === postId);
            if (!post) return;
            const postRef = doc(db, "posts", postId);
            const hasLiked = post.likedBy && post.likedBy.includes(currentUser.uid);
            try {
                if (hasLiked) { await updateDoc(postRef, { likedBy: arrayRemove(currentUser.uid) }); }
                else { await updateDoc(postRef, { likedBy: arrayUnion(currentUser.uid) }); }
                loadFeed();
            } catch (e) { console.error(e); }
        }

        window.uploadPost = async () => {
            const title = document.getElementById('postTitleInput').value.trim();
            const desc = document.getElementById('postDescInput').value.trim();
            const imageFile = document.getElementById('postImageInput').files[0];
            const saveFile = document.getElementById('postFileInput').files[0];

            if(!title || !saveFile) {
                showToast("Ошибка сохранения: Укажите название и выберите файл!");
                return;
            }
            if (!saveFile.name.toLowerCase().endsWith('.pc')) {
                showToast("Ошибка сохранения: Разрешены только файлы .pc!");
                return;
            }

            showLoading('Публикация сохранения...');
            try {
                let imgUrl = "";
                if (imageFile) imgUrl = await uploadToImgBB(imageFile);
                const fileUrl = await uploadToGofile(saveFile);

                if (!fileUrl) throw new Error("Сервер хранения не вернул ссылку.");

                await addDoc(collection(db, "posts"), {
                    title: title,
                    desc: desc,
                    imgUrl: imgUrl,
                    fileUrl: fileUrl,
                    authorId: currentUser.uid,
                    authorName: currentUser.displayName || "Без имени",
                    authorAvatar: currentUser.photoURL || "",
                    likedBy: [],
                    createdAt: serverTimestamp()
                });
                closeModals();
                loadFeed();
                showToast("Сохранение успешно опубликовано!", "success");
            } catch(e) { showToast("Ошибка сохранения: " + e.message); }
            finally { hideLoading(); }
        }

        window.askDeletePost = (postId) => {
            deleteTargetId = postId;
            document.getElementById('confirmMessage').innerText = "Вы действительно хотите удалить это сохранение?";
            document.getElementById('confirmModal').style.display = 'flex';
        }

        document.getElementById('confirmYesBtn').onclick = async () => {
            if(!deleteTargetId) return;
            showLoading("Удаление...");
            try {
                await deleteDoc(doc(db, "posts", deleteTargetId));
                loadFeed();
                closeProfile();
                closeConfirmModal();
                showToast("Пост успешно удален.", "success");
            } catch(e) { showToast("Ошибка удаления: " + e.message); }
            hideLoading();
        }

        window.openProfile = async (uid, name, avatar) => {
            document.getElementById('profileName').innerText = name || "Пользователь";
            document.getElementById('profileAvatar').src = avatar || "https://via.placeholder.com/120?text=U";
            const bannerEl = document.getElementById('profileBanner');
            bannerEl.style.backgroundImage = "linear-gradient(45deg, #6200ee, #bb86fc)";
            try {
                const userDoc = await getDoc(doc(db, "users", uid));
                if (userDoc.exists() && userDoc.data().bannerUrl) { bannerEl.style.backgroundImage = `url('${userDoc.data().bannerUrl}')`; }
            } catch (e) { console.error(e); }
            const userPosts = allPosts.filter(p => p.authorId === uid);
            renderPosts(userPosts, 'profilePostsList');
            document.getElementById('profilePanel').classList.add('active');
        }

        window.openMyProfile = () => { if(currentUser) openProfile(currentUser.uid, currentUser.displayName, currentUser.photoURL); }
        window.closeProfile = () => { document.getElementById('profilePanel').classList.remove('active'); }
        window.openEditProfileModal = () => {
            document.getElementById('editProfileName').value = currentUser.displayName || "";
            document.getElementById('avatarFileName').innerText = "";
            document.getElementById('bannerFileName').innerText = "";
            document.getElementById('editProfileModal').style.display = 'flex';
        }

        window.saveProfileChanges = async () => {
            const newName = document.getElementById('editProfileName').value.trim();
            const avatarFile = document.getElementById('editProfileAvatarInput').files[0];
            const bannerFile = document.getElementById('editProfileBannerInput').files[0];
            if(!newName) return showToast("Введите имя!");
            
            showLoading("Обновление профиля...");
            try {
                let newAvatarUrl = currentUser.photoURL || "";
                if (avatarFile) newAvatarUrl = await uploadToImgBB(avatarFile);
                let newBannerUrl = "";
                if (bannerFile) { newBannerUrl = await uploadToImgBB(bannerFile); }
                else {
                    const userDoc = await getDoc(doc(db, "users", currentUser.uid));
                    if (userDoc.exists() && userDoc.data().bannerUrl) newBannerUrl = userDoc.data().bannerUrl;
                }
                await updateProfile(currentUser, { displayName: newName, photoURL: newAvatarUrl });
                await setDoc(doc(db, "users", currentUser.uid), { bannerUrl: newBannerUrl, displayName: newName, photoURL: newAvatarUrl }, { merge: true });
                closeModals();
                loadFeed();
                showToast("Профиль успешно изменен!", "success");
            } catch(e) { showToast("Ошибка профиля: " + e.message); }
            finally { hideLoading(); }
        }

        window.openUploadModal = () => {
            document.getElementById('postTitleInput').value = '';
            document.getElementById('postDescInput').value = '';
            document.getElementById('postImageInput').value = '';
            document.getElementById('postFileInput').value = '';
            document.getElementById('imgFileName').innerText = '';
            document.getElementById('fileFileName').innerText = '';
            document.getElementById('uploadModal').style.display = 'flex';
        }

        window.closeModals = () => {
            document.querySelectorAll('.modal').forEach(m => {
                if(m.id !== 'authModal' && m.id !== 'confirmModal' || currentUser) m.style.display = 'none';
            });
        }

        window.changeTheme = () => {
            const body = document.body;
            if (body.getAttribute('data-theme') === 'light') { body.removeAttribute('data-theme'); }
            else { body.setAttribute('data-theme', 'light'); }
        }
    </script>
</body>
</html>
