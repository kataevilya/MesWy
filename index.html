<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MesWy — Социальная сеть</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#121212',
                        darkPanel: '#1f1f22',
                        darkHover: '#2a2a2e',
                        primary: 'var(--accent-color)'
                    },
                    borderRadius: { 'custom': '16px' }
                }
            }
        }
    </script>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        :root { --accent-color: #2563eb; }
        body { background-color: #121212; color: #e5e7eb; font-family: 'Segoe UI', system-ui, sans-serif; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 20px; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .toast-enter { animation: slideIn 0.3s ease-out forwards; }
        .nav-btn.active i { color: #2563eb !important; }
        .nav-btn.active .nav-label { color: #2563eb !important; }
        .nav-btn { transition: all 0.2s; }
        @media (max-width: 640px) {
            .nav-label { display: none; }
            .nav-btn { justify-content: center; }
        }
        .follow-btn-post {
            position: absolute;
            top: 12px;
            right: 12px;
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 34px;
            height: 34px;
            font-size: 22px;
            line-height: 1;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
            z-index: 10;
        }
        .follow-btn-post:hover { transform: scale(1.1); background: #1d4ed8; }
        .follow-btn-post.following { background: #1f1f22; color: #888; box-shadow: none; }
    </style>
</head>
<body class="flex h-screen overflow-hidden font-sans text-gray-200 selection:bg-primary selection:text-white">

    <!-- Toasts -->
    <div id="toastContainer" class="fixed bottom-20 sm:bottom-4 right-4 z-[9999] flex flex-col gap-2"></div>

    <!-- Бан -->
    <div id="banScreen" class="hidden fixed inset-0 z-[10000] bg-red-600 flex flex-col items-center justify-center p-6 text-center">
        <i class='bx bx-block text-8xl text-white mb-6'></i>
        <h1 class="text-4xl font-bold text-white mb-4">Аккаунт заблокирован</h1>
        <p id="banReason" class="text-xl text-white mb-2 font-medium"></p>
        <p id="banUntil" class="text-lg text-white/80"></p>
    </div>

    <!-- Авторизация -->
    <div id="authModal" class="fixed inset-0 z-[100] flex items-center justify-center bg-black/90 backdrop-blur-md p-4">
        <div class="bg-darkPanel p-6 rounded-custom shadow-2xl w-full max-w-sm border border-gray-800">
            <div class="flex justify-center mb-4"><i class='bx bx-infinite text-5xl text-primary'></i></div>
            <h2 id="authTitle" class="text-2xl font-bold mb-4 text-center">Вход в MesWy</h2>
            <form id="authForm" class="space-y-3">
                <input type="email" id="authEmail" placeholder="Email" required class="w-full p-3 rounded-custom bg-[#121212] border border-gray-800 focus:border-primary outline-none transition text-base">
                <input type="password" id="authPassword" placeholder="Пароль" required class="w-full p-3 rounded-custom bg-[#121212] border border-gray-800 focus:border-primary outline-none transition text-base">
                <button type="submit" id="authSubmitBtn" class="w-full bg-primary hover:opacity-90 text-white font-bold py-3 rounded-custom transition-all text-base">Войти</button>
            </form>
            <p class="mt-4 text-center text-gray-400 text-sm cursor-pointer hover:text-white transition" id="authToggleBtn">Нет аккаунта? Создать</p>
        </div>
    </div>

    <!-- Боковое меню (ПК) / Нижнее меню (Мобайл) -->
    <aside class="group fixed bottom-0 w-full h-14 sm:h-full sm:w-20 sm:hover:w-60 bg-darkPanel border-t sm:border-t-0 sm:border-r border-gray-800 transition-all duration-300 flex flex-row sm:flex-col justify-around sm:justify-between z-40 shadow-xl overflow-y-auto hide-scroll">
        <div class="flex flex-row sm:flex-col w-full sm:mt-2 items-center sm:items-stretch h-full sm:h-auto gap-1 sm:gap-0">
            <div class="hidden sm:flex items-center w-full p-3 mb-2">
                <i class='bx bx-infinite text-3xl text-primary min-w-[3rem] text-center'></i>
                <span class="ml-2 text-xl font-bold opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap">MesWy</span>
            </div>
            
            <button onclick="loadPosts(true); setActiveNav(this)" class="nav-btn flex items-center sm:w-full p-2 sm:p-3 hover:bg-darkHover transition-colors cursor-pointer sm:text-left sm:rounded-r-custom active">
                <i class='bx bx-home-alt-2 text-2xl sm:text-3xl sm:min-w-[3rem] text-center text-gray-300 hover:text-primary transition-colors'></i>
                <span class="nav-label ml-2 font-medium text-base opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap">Лента</span>
            </button>

            <button id="navSearch" onclick="openSearch(); setActiveNav(this)" class="nav-btn flex items-center sm:w-full p-2 sm:p-3 hover:bg-darkHover transition-colors cursor-pointer sm:text-left sm:rounded-r-custom">
                <i class='bx bx-search text-2xl sm:text-3xl sm:min-w-[3rem] text-center text-gray-300 hover:text-primary transition-colors'></i>
                <span class="nav-label ml-2 font-medium text-base opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap">Поиск</span>
            </button>

            <button onclick="loadRecs(); setActiveNav(this)" class="nav-btn flex items-center sm:w-full p-2 sm:p-3 hover:bg-darkHover transition-colors cursor-pointer sm:text-left sm:rounded-r-custom">
                <i class='bx bx-trending-up text-2xl sm:text-3xl sm:min-w-[3rem] text-center text-gray-300 hover:text-primary transition-colors'></i>
                <span class="nav-label ml-2 font-medium text-base opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap">Рекомендации</span>
            </button>

            <button onclick="document.getElementById('createPostModal').classList.remove('hidden'); setActiveNav(this)" id="navCreatePost" class="nav-btn flex items-center sm:w-full p-2 sm:p-3 hover:bg-darkHover transition-colors cursor-pointer sm:text-left sm:rounded-r-custom">
                <i class='bx bx-plus-circle text-2xl sm:text-3xl sm:min-w-[3rem] text-center text-primary transition-colors'></i>
                <span class="nav-label ml-2 font-medium text-base opacity-0 group-hover:opacity-100 transition-opacity text-primary whitespace-nowrap">Создать</span>
            </button>

            <button onclick="toggleNotifications(); setActiveNav(this)" class="nav-btn flex items-center sm:w-full p-2 sm:p-3 hover:bg-darkHover transition-colors cursor-pointer sm:text-left sm:rounded-r-custom relative">
                <i class='bx bx-bell text-2xl sm:text-3xl sm:min-w-[3rem] text-center text-gray-300 hover:text-primary transition-colors'></i>
                <span class="nav-label ml-2 font-medium text-base opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap">Уведомления</span>
                <span id="notifBadge" class="hidden absolute top-2 sm:top-3 left-6 sm:left-10 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-darkPanel"></span>
            </button>

            <button onclick="if(currentUser) openProfile(currentUser.uid); setActiveNav(this)" class="nav-btn flex items-center sm:w-full p-2 sm:p-3 hover:bg-darkHover transition-colors cursor-pointer sm:text-left sm:rounded-r-custom">
                <i class='bx bx-user text-2xl sm:text-3xl sm:min-w-[3rem] text-center text-gray-300 hover:text-primary transition-colors'></i>
                <span class="nav-label ml-2 font-medium text-base opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap">Профиль</span>
            </button>

            <!-- НОВОЕ: Настройки (мобилка) -->
            <button onclick="openSettings(); setActiveNav(this)" class="nav-btn flex items-center sm:w-full p-2 sm:p-3 hover:bg-darkHover transition-colors cursor-pointer sm:text-left sm:rounded-r-custom">
                <i class='bx bx-cog text-2xl sm:text-3xl sm:min-w-[3rem] text-center text-gray-300 hover:text-primary transition-colors'></i>
                <span class="nav-label ml-2 font-medium text-base opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap">Настройки</span>
            </button>

            <!-- НОВОЕ: Выход (мобилка) -->
            <button id="navLogoutMobile" class="nav-btn flex items-center sm:w-full p-2 sm:p-3 hover:bg-red-500/10 text-red-500 transition-colors cursor-pointer sm:text-left sm:rounded-r-custom">
                <i class='bx bx-log-out text-2xl sm:text-3xl sm:min-w-[3rem] text-center'></i>
                <span class="nav-label ml-2 font-medium text-base opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap">Выйти</span>
            </button>
        </div>

        <!-- Выход (ПК) -->
        <div class="hidden sm:flex flex-col w-full mb-2">
            <button id="navLogout" class="flex items-center w-full p-3 hover:bg-red-500/10 text-red-500 transition-colors cursor-pointer text-left rounded-r-custom">
                <i class='bx bx-log-out text-3xl min-w-[3rem] text-center'></i>
                <span class="ml-2 font-medium text-base opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap">Выйти</span>
            </button>
        </div>
    </aside>

    <!-- Основная лента -->
    <main class="w-full sm:ml-20 flex-1 h-full overflow-y-auto p-3 sm:p-6 flex justify-center bg-[#121212] pb-20 sm:pb-6">
        <div class="max-w-xl w-full flex flex-col gap-4" id="postsFeed">
            <!-- посты рендерятся тут -->
        </div>
    </main>

    <!-- Профиль (панель) -->
    <div id="profilePanel" class="fixed top-0 right-0 h-full w-full sm:w-[480px] bg-darkPanel shadow-2xl z-50 transform translate-x-full transition-transform duration-300 flex flex-col border-l border-gray-800">
        <div class="flex-1 overflow-y-auto hide-scroll pb-20 sm:pb-4">
            <div id="profileCover" class="h-40 sm:h-48 bg-gray-800 bg-cover bg-center relative">
                <button onclick="document.getElementById('profilePanel').classList.add('translate-x-full')" class="absolute top-3 right-3 bg-black/60 text-white w-10 h-10 rounded-full hover:bg-black/80 flex items-center justify-center transition backdrop-blur-sm z-50">
                    <i class='bx bx-x text-2xl'></i>
                </button>
            </div>
            <div class="px-5 relative flex flex-col">
                <div class="flex justify-between items-end -mt-12 sm:-mt-14 relative z-20 mb-3">
                    <img id="profileAvatar" src="" class="w-24 h-24 sm:w-28 sm:h-28 rounded-full border-4 border-darkPanel object-cover bg-darkPanel shadow-lg">
                    <div class="flex gap-2 mb-1">
                        <button id="adminPanelBtn" onclick="document.getElementById('adminModal').classList.remove('hidden')" class="hidden bg-red-600 hover:bg-red-700 text-white px-5 py-2 rounded-custom font-bold transition shadow-lg shadow-red-600/20 text-sm">
                            <i class='bx bx-shield-quarter'></i> Админ
                        </button>
                        <button id="editProfileBtn" onclick="document.getElementById('editProfileModal').classList.remove('hidden')" class="hidden bg-[#121212] hover:bg-gray-800 text-white px-5 py-2 rounded-custom font-bold transition border border-gray-700 text-sm">
                            Редактировать
                        </button>
                    </div>
                </div>
                <div class="mt-1">
                    <h2 id="profileName" class="text-2xl font-bold"></h2>
                    <p id="profileEmail" class="text-primary text-sm font-medium mt-1"></p>
                    <p id="profileBio" class="text-gray-400 mt-2 text-sm leading-relaxed whitespace-pre-wrap"></p>
                </div>
                <div class="mt-6 border-t border-gray-800 pt-5">
                    <h3 class="text-lg font-bold mb-4 flex items-center gap-2"><i class='bx bx-grid-alt text-primary'></i> Публикации</h3>
                    <div id="profilePostsFeed" class="flex flex-col gap-4"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Уведомления (панель) -->
    <div id="notificationsPanel" class="fixed top-0 right-0 h-full w-full sm:w-[400px] bg-darkPanel shadow-2xl z-[60] transform translate-x-full transition-transform duration-300 flex flex-col border-l border-gray-800">
        <div class="p-5 border-b border-gray-800 flex justify-between items-center bg-darkPanel sticky top-0 z-10 backdrop-blur-sm bg-opacity-90">
            <h2 class="text-xl font-bold flex items-center gap-2"><i class='bx bx-bell text-primary'></i> Уведомления</h2>
            <button onclick="toggleNotifications()" class="text-gray-400 hover:text-white transition bg-[#121212] w-8 h-8 rounded-full flex items-center justify-center border border-gray-800">
                <i class='bx bx-x text-xl'></i>
            </button>
        </div>
        <div id="notificationsList" class="flex-1 overflow-y-auto p-4 flex flex-col gap-3 hide-scroll pb-20 sm:pb-4">
            <!-- Уведомления -->
        </div>
    </div>

    <!-- Поиск (полноэкранный) -->
    <div id="searchModal" class="hidden fixed inset-0 z-[60] bg-[#121212] flex flex-col p-4 overflow-y-auto hide-scroll pb-20">
        <button onclick="document.getElementById('searchModal').classList.add('hidden')" class="fixed top-4 right-4 text-gray-400 hover:text-white w-10 h-10 flex items-center justify-center rounded-full bg-darkPanel border border-gray-800 z-50 transition">
            <i class='bx bx-x text-2xl'></i>
        </button>
        <div class="max-w-2xl w-full mx-auto mt-8 sm:mt-6">
            <h2 class="text-2xl font-bold mb-4 text-center">Поиск по MesWy</h2>
            <div class="relative mb-6">
                <i class='bx bx-search absolute left-4 top-1/2 -translate-y-1/2 text-xl text-gray-500'></i>
                <input type="text" id="searchInput" placeholder="Введите текст для поиска постов..." class="w-full pl-12 p-4 rounded-custom bg-darkPanel border border-gray-800 focus:border-primary outline-none transition text-base shadow-xl">
            </div>
            <div id="searchResults" class="flex flex-col gap-4">
                <div class="text-center text-gray-500 mt-8"><i class='bx bx-search text-5xl opacity-20 mb-3'></i><br>Начните вводить запрос</div>
            </div>
        </div>
    </div>

    <!-- Создание поста -->
    <div id="createPostModal" class="hidden fixed inset-0 z-[70] flex items-center justify-center bg-black/90 backdrop-blur-md p-4">
        <div class="bg-darkPanel p-5 sm:p-6 rounded-custom shadow-2xl w-full max-w-lg relative border border-gray-800">
            <button onclick="document.getElementById('createPostModal').classList.add('hidden')" class="absolute top-4 right-4 text-gray-500 hover:text-white w-8 h-8 flex items-center justify-center rounded-full bg-[#121212] transition">
                <i class='bx bx-x text-xl'></i>
            </button>
            <h2 class="text-2xl font-bold mb-4">Новый пост</h2>
            <form id="createPostForm" class="space-y-4">
                <input type="text" id="postTitle" placeholder="Заголовок поста..." required class="w-full p-3 rounded-custom bg-[#121212] border border-gray-800 focus:border-primary outline-none transition text-base">
                <textarea id="postDesc" placeholder="Расскажите, что происходит?" rows="4" class="w-full p-3 rounded-custom bg-[#121212] border border-gray-800 focus:border-primary outline-none transition resize-none text-base"></textarea>
                <div class="bg-[#121212] p-4 rounded-custom border border-gray-800 cursor-pointer hover:border-gray-600 transition group">
                    <label class="flex flex-col items-center justify-center w-full h-full cursor-pointer">
                        <i class='bx bx-images text-4xl text-gray-500 group-hover:text-primary transition-colors mb-2'></i>
                        <span class="text-sm text-gray-400 font-medium">Прикрепить фото (до 10 шт)</span>
                        <input type="file" id="postImages" multiple accept="image/*" class="hidden">
                    </label>
                    <div id="imagePreview" class="mt-3 flex gap-2 overflow-x-auto hide-scroll"></div>
                </div>
                <button type="submit" id="postSubmitBtn" class="w-full bg-primary hover:opacity-90 text-white font-bold py-3 rounded-custom transition-all text-base">Опубликовать</button>
            </form>
        </div>
    </div>

    <!-- Админка -->
    <div id="adminModal" class="hidden fixed inset-0 z-[90] flex items-center justify-center bg-black/90 backdrop-blur-md p-4">
        <div class="bg-darkPanel p-6 rounded-custom shadow-2xl w-full max-w-md border border-red-900/50 relative">
            <button onclick="document.getElementById('adminModal').classList.add('hidden')" class="absolute top-4 right-4 text-gray-500 hover:text-white w-8 h-8 flex items-center justify-center rounded-full bg-[#121212] transition">
                <i class='bx bx-x text-xl'></i>
            </button>
            <h2 class="text-2xl font-bold mb-6 text-red-500 flex items-center gap-2"><i class='bx bx-shield-quarter'></i> Админ-Панель</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">Email пользователя</label>
                    <input type="email" id="banEmail" placeholder="Введите email" class="w-full p-3 rounded-custom bg-[#121212] border border-gray-800 focus:border-red-500 outline-none transition text-base">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">Причина блокировки</label>
                    <input type="text" id="banReasonInput" placeholder="Например: Спам" class="w-full p-3 rounded-custom bg-[#121212] border border-gray-800 focus:border-red-500 outline-none transition text-base">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">Срок (в днях)</label>
                    <input type="number" id="banDays" placeholder="Дней" value="1" min="1" class="w-full p-3 rounded-custom bg-[#121212] border border-gray-800 focus:border-red-500 outline-none transition text-base">
                </div>
                <button onclick="banUser()" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-custom transition-all text-base mt-2">Выдать блокировку</button>
            </div>
        </div>
    </div>

    <!-- Редактирование профиля + настройки -->
    <div id="editProfileModal" class="hidden fixed inset-0 z-[90] flex items-center justify-center bg-black/90 backdrop-blur-md p-4">
        <div class="bg-darkPanel p-5 sm:p-6 rounded-custom shadow-2xl w-full max-w-md relative border border-gray-800 overflow-y-auto max-h-[90vh] hide-scroll">
            <button onclick="document.getElementById('editProfileModal').classList.add('hidden')" class="absolute top-4 right-4 text-gray-500 hover:text-white w-8 h-8 flex items-center justify-center rounded-full bg-[#121212] transition">
                <i class='bx bx-x text-xl'></i>
            </button>
            <h2 class="text-2xl font-bold mb-4">Редактирование профиля</h2>
            <form id="editProfileForm" class="space-y-4">
                <input type="text" id="editName" placeholder="Имя пользователя" required class="w-full p-3 rounded-custom bg-[#121212] border border-gray-800 focus:border-primary outline-none transition text-base">
                <textarea id="editBio" placeholder="О себе" rows="3" class="w-full p-3 rounded-custom bg-[#121212] border border-gray-800 focus:border-primary outline-none transition resize-none text-base"></textarea>
                <div class="bg-[#121212] p-4 rounded-custom border border-gray-800">
                    <label class="block text-sm font-medium text-gray-400 mb-2">Сменить аватарку</label>
                    <input type="file" id="editAvatar" accept="image/*" class="w-full text-xs file:bg-darkHover file:text-white file:border-0 file:rounded-custom file:px-3 file:py-1.5 file:cursor-pointer">
                </div>
                <!-- НОВОЕ: настройка фона -->
                <div class="bg-[#121212] p-4 rounded-custom border border-gray-800">
                    <label class="block text-sm font-medium text-gray-400 mb-2">Цвет фона</label>
                    <div class="flex items-center gap-4">
                        <input type="color" id="bgColorInput" value="#121212" class="w-12 h-12 rounded border-0 cursor-pointer bg-transparent">
                        <button type="button" id="applyBgBtn" class="bg-primary hover:bg-blue-600 text-white px-4 py-2 rounded-custom text-sm">Применить</button>
                    </div>
                </div>
                <button type="submit" id="editProfileSubmitBtn" class="w-full bg-white text-black hover:bg-gray-200 font-bold py-3 rounded-custom transition-all text-base mt-2">Сохранить</button>
            </form>
        </div>
    </div>

    <!-- Зум изображений -->
    <div id="imageViewerModal" class="hidden fixed inset-0 z-[999] bg-black/95 flex items-center justify-center p-4 backdrop-blur-sm">
        <button onclick="closeImage()" class="absolute top-4 right-4 text-white w-10 h-10 bg-gray-900/50 hover:bg-gray-800 rounded-full flex items-center justify-center transition z-50">
            <i class='bx bx-x text-2xl'></i>
        </button>
        <div class="w-full h-full flex items-center justify-center overflow-hidden" id="imageZoomContainer">
            <img id="viewerImage" src="" class="max-w-full max-h-full object-contain transition-transform duration-200 cursor-grab rounded-custom shadow-2xl">
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, doc, setDoc, updateDoc, getDoc, query, orderBy, limit, startAfter, arrayUnion, where } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

        const app = initializeApp({
            apiKey: "AIzaSyCBSWHaooqAwJTUjDhwjXKDN1z5locXCcM",
            authDomain: "meswy-web.firebaseapp.com",
            projectId: "meswy-web"
        });
        const auth = getAuth(app);
        const db = getFirestore(app);
        const IMGBB_KEY = "cfedaeb5c6bb179902b44ba10cb396cb";

        window.currentUser = null;
        window.userDataCache = null;
        const userCache = {};

        // --- Вспомогательные ---
        window.showToast = (msg, type = 'info') => {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            const bg = type === 'error' ? 'bg-red-900/90 border-red-700' : 'bg-darkPanel border-gray-700';
            const icon = type === 'error' ? 'bx-error-circle text-red-500' : 'bx-check-circle text-primary';
            toast.className = `toast-enter flex items-center gap-3 p-4 rounded-custom border ${bg} text-white shadow-2xl min-w-[250px] mb-2 text-sm`;
            toast.innerHTML = `<i class='bx ${icon} text-xl'></i> <span class="font-bold">${msg}</span>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        };

        async function getUserData(uid) {
            if(userCache[uid]) return userCache[uid];
            const snap = await getDoc(doc(db, "users", uid));

        // --- Авторизация ---

                    background: '#121212'
                });

        document.getElementById('authForm').addEventListener('submit', async (e) => {

        // --- Состояние пользователя ---

        // --- Админка ---
        window.banUser = async () => {
            const email = document.getElementById('banEmail').value.trim();
            const reason = document.getElementById('banReasonInput').value;
            const days = parseInt(document.getElementById('banDays').value || 1);
            if(!email) return showToast("Введите email", "error");
            try {
                const q = query(collection(db, "users"), where("email", "==", email));
                const snap = await getDocs(q);
                if(snap.empty) return showToast("Пользователь не найден", "error");
                const targetUid = snap.docs[0].id;
                const until = new Date(); until.setDate(until.getDate() + days);
                await updateDoc(doc(db, "users", targetUid), { banned: { reason, until: until.toISOString() } });
                showToast("Пользователь забанен");
                document.getElementById('adminModal').classList.add('hidden');

        // --- Уведомления ---
        window.sendNotification = async (targetUid, type, postId) => {
            if(targetUid === currentUser.uid) return;
            try {
                const fromData = await getUserData(currentUser.uid);
                const notif = { 
                    type, 
                    from: currentUser.uid, 
                    postId, 
                    date: new Date().toISOString(),
                    fromName: fromData.displayName,
                    fromAvatar: fromData.photoURL
                };
                await updateDoc(doc(db, "users", targetUid), {
                    notifications: arrayUnion(notif)
                });
            } catch(e) {}
        };

        window.toggleNotifications = async () => {
            const panel = document.getElementById('notificationsPanel');
            const list = document.getElementById('notificationsList');
            if(panel.classList.contains('translate-x-full')) {
                panel.classList.remove('translate-x-full');
                document.getElementById('notifBadge').classList.add('hidden');
                const data = await getUserData(currentUser.uid);
                list.innerHTML = '<div class="text-center py-6"><i class="bx bx-loader-alt bx-spin text-3xl text-primary"></i></div>';

                    list.innerHTML = '<p class="text-gray-500 text-center mt-5 bg-[#121212] p-4 rounded-custom text-sm border border-gray-800">У вас пока нет уведомлений</p>';
                } else {
                    list.innerHTML = '';
                    const notifs = data.notifications.slice().reverse();
                    for(const n of notifs) {
                        const u = await getUserData(n.from);
                        const txt = n.type === 'like' ? 'оценил(а) ваш пост' : 'прокомментировал(а) ваш пост';
                        const icon = n.type === 'like' ? 'bxs-heart text-red-500' : 'bx-message-rounded text-primary';

                        el.className = "bg-[#121212] p-4 rounded-custom flex gap-3 items-center border border-gray-800 hover:border-gray-600 transition duration-300 cursor-pointer shadow-lg";
                        el.innerHTML = `
                            <img src="${n.fromAvatar || u.photoURL}" class="w-12 h-12 rounded-full object-cover shadow-md" onclick="openProfile('${n.from}')">

                                <div class="text-gray-400 mt-0.5 flex items-center gap-1"><i class='bx ${icon}'></i> ${txt}</div>
                            </div>
                        `;
                        list.prepend(el);
                    }
                }
            } else { panel.classList.add('translate-x-full'); }

        async function checkNotifications() {

        // --- Открытие профиля ---

            try {
                const s = await getDocs(query(collection(db, "posts"), where("authorId", "==", uid), orderBy("createdAt", "desc")));

                if(s.empty) pFeed.innerHTML = '<div class="text-center text-gray-500 py-6 bg-[#121212] rounded-custom text-sm">Нет публикаций</div>';

            } catch(e) { pFeed.innerHTML = '<div class="text-center text-red-500 text-sm py-4">Ошибка загрузки</div>'; }
        };

        // --- Лайк ---
        window.toggleLike = async (postId, authorId, btn) => {
            try {
                const ref = doc(db, "posts", postId);
                const s = await getDoc(ref);
                const likes = s.data().likes || [];
                const isLiked = likes.includes(currentUser.uid);
                const nl = isLiked ? likes.filter(i=>i!==currentUser.uid) : [...likes, currentUser.uid];
                await updateDoc(ref, { likes: nl });
                if(!isLiked) sendNotification(authorId, 'like', postId);
                btn.innerHTML = `<i class='bx ${isLiked ? 'bx-heart' : 'bxs-heart text-red-500 drop-shadow-md'} text-2xl'></i> <span class="font-bold text-base">${nl.length}</span>`;
            } catch(e) { showToast("Ошибка", "error"); }
        };

        // --- Комментарий (без перезагрузки ленты) ---
        window.submitComment = async (postId, authorId, inputId) => {
            const i = document.getElementById(inputId);
            const text = i.value.trim();
            if(!text) return;
            try {
                i.disabled = true;
                const postRef = doc(db, "posts", postId);
                const snap = await getDoc(postRef);
                const comments = snap.data().comments || [];
                const newComment = { uid: currentUser.uid, text: text, date: new Date().toISOString() };
                await updateDoc(postRef, { comments: arrayUnion(newComment) });
                sendNotification(authorId, 'comment', postId);
                i.value = '';
                showToast("Комментарий отправлен");
                // Локально добавим комментарий в DOM
                const commentContainer = document.getElementById(`comments-${postId}`);
                if(commentContainer) {
                    const u = await getUserData(currentUser.uid);
                    const div = document.createElement('div');
                    div.className = "flex gap-3 mb-3";
                    div.innerHTML = `
                        <img src="${u.photoURL}" class="w-8 h-8 rounded-full object-cover cursor-pointer shadow-md" onclick="openProfile('${currentUser.uid}')">
                        <div class="bg-[#121212] p-3 rounded-custom rounded-tl-none flex-1 border border-gray-800">
                            <span class="font-bold text-sm cursor-pointer hover:text-primary transition" onclick="openProfile('${currentUser.uid}')">${u.displayName}</span>
                            <p class="text-gray-300 mt-1 text-sm">${text}</p>
                        </div>
                    `;
                    commentContainer.prepend(div);
                    // Обновить счётчик комментариев
                    const commentCount = document.getElementById(`comment-count-${postId}`);
                    if(commentCount) {
                        const current = parseInt(commentCount.textContent) || 0;
                        commentCount.textContent = current + 1;
                    }
                }
            } catch(e) { showToast("Ошибка", "error"); }
            finally { i.disabled = false; }
        };

        // --- Подписка с поста ---
        window.toggleFollow = async (targetUid, btn) => {
            if(targetUid === currentUser.uid) return;
            try {
                const userRef = doc(db, "users", currentUser.uid);
                const snap = await getDoc(userRef);
                const following = snap.data()?.following || [];
                const isFollowing = following.includes(targetUid);
                if(isFollowing) {
                    await updateDoc(userRef, { following: arrayRemove(targetUid) });
                    btn.textContent = '+';
                    btn.classList.remove('following');
                } else {
                    await updateDoc(userRef, { following: arrayUnion(targetUid) });
                    btn.textContent = '✓';
                    btn.classList.add('following');
                    sendNotification(targetUid, 'follow', null);
                }
            } catch(e) { showToast("Ошибка", "error"); }
        };

        // --- Рендер одного поста ---
        async function renderPost(docSnap, container, compact = false) {
            const p = docSnap.data();
            const u = await getUserData(p.authorId);
            const isOwn = p.authorId === currentUser.uid;
            
            let imgs = '';
            if(p.images && p.images.length > 0) {
                const gridClass = p.images.length === 1 ? 'grid-cols-1' : 'grid-cols-2';
                imgs = `<div class="grid ${gridClass} gap-2 mt-4 rounded-custom overflow-hidden">`;
                p.images.forEach(url => {
                    imgs += `<img src="${url}" onclick="openImage('${url}')" class="w-full ${compact ? 'h-36' : 'h-48 sm:h-64'} object-cover cursor-pointer hover:scale-105 transition duration-500 shadow-sm" alt="post">`;
                });
                imgs += `</div>`;
            }

            let coms = '';
            if(p.comments && !compact && p.comments.length > 0) {
                const sorted = p.comments.slice(-3);
                for(let c of sorted) {
                    const cu = await getUserData(c.uid);
                    coms += `
                        <div class="flex gap-3 mb-3">
                            <img src="${cu.photoURL}" class="w-8 h-8 rounded-full object-cover cursor-pointer shadow-md" onclick="openProfile('${c.uid}')">
                            <div class="bg-[#121212] p-3 rounded-custom rounded-tl-none flex-1 border border-gray-800">
                                <span class="font-bold text-sm cursor-pointer hover:text-primary transition" onclick="openProfile('${c.uid}')">${cu.displayName}</span>
                                <p class="text-gray-300 mt-1 text-sm">${c.text}</p>
                            </div>
                        </div>`;
                }
            }

            const isLiked = p.likes && p.likes.includes(currentUser.uid);
            const commentCount = p.comments?.length || 0;

            const el = document.createElement('article');
            el.className = "bg-darkPanel rounded-custom border border-gray-800 p-4 sm:p-5 shadow-xl hover:border-gray-700 transition relative";
            el.innerHTML = `
                <div class="flex items-center space-x-3 mb-4 cursor-pointer" onclick="openProfile('${p.authorId}')">
                    <img src="${u.photoURL}" class="w-10 h-10 rounded-full object-cover border-2 border-transparent hover:border-primary transition shadow-md">
                    <div>
                        <h3 class="text-base font-bold hover:text-primary transition">${u.displayName}</h3>
                        <span class="text-xs text-gray-500">${new Date(p.createdAt).toLocaleDateString()}</span>
                    </div>
                </div>
                ${p.title ? `<h2 class="text-xl font-bold mb-2">${p.title}</h2>` : ''}
                <p class="text-gray-300 text-base whitespace-pre-wrap leading-relaxed">${p.description}</p>
                ${imgs}
                
                <div class="mt-4 flex items-center gap-6 border-t border-gray-800 pt-4">
                    <button onclick="toggleLike('${docSnap.id}', '${p.authorId}', this)" class="flex items-center gap-2 text-gray-400 hover:text-white transition">
                        <i class='bx ${isLiked ? 'bxs-heart text-red-500 drop-shadow-md' : 'bx-heart'} text-2xl'></i> 
                        <span class="font-bold text-base">${p.likes?.length || 0}</span>
                    </button>
                    <div class="flex items-center gap-2 text-gray-400">
                        <i class='bx bx-message-rounded text-2xl'></i> 
                        <span class="font-bold text-base" id="comment-count-${docSnap.id}">${commentCount}</span>
                    </div>
                </div>
                ${!compact ? `
                <div class="mt-4 border-t border-gray-800 pt-4" id="comments-${docSnap.id}">
                    <div class="mb-2">${coms}</div>
                    <div class="flex gap-3 mt-4 items-center">
                        <img src="${userDataCache?.photoURL || 'https://i.ibb.co/30Zc4Fq/default-avatar.png'}" class="w-10 h-10 rounded-full object-cover shadow-md">
                        <input type="text" id="c-${docSnap.id}" placeholder="Оставить комментарий..." class="flex-1 bg-[#121212] border border-gray-800 rounded-custom px-4 py-2.5 text-sm outline-none focus:border-primary transition" onkeypress="if(event.key === 'Enter') submitComment('${docSnap.id}', '${p.authorId}', 'c-${docSnap.id}')">
                        <button onclick="submitComment('${docSnap.id}', '${p.authorId}', 'c-${docSnap.id}')" class="bg-primary text-white w-10 h-10 rounded-full flex items-center justify-center hover:opacity-90 transition shadow-lg shrink-0">
                            <i class='bx bx-send text-xl'></i>
                        </button>
                    </div>
                </div>` : ''}
            `;

            // Кнопка подписки на посте (если не свой пост)
            if(!isOwn) {
                const followBtn = document.createElement('button');
                followBtn.className = 'follow-btn-post';
                followBtn.textContent = '+';
                // Проверим, подписан ли уже
                (async () => {
                    const userData = await getUserData(currentUser.uid);
                    const following = userData?.following || [];
                    if(following.includes(p.authorId)) {
                        followBtn.textContent = '✓';
                        followBtn.classList.add('following');
                    }
                })();
                followBtn.onclick = (e) => {
                    e.stopPropagation();
                    toggleFollow(p.authorId, followBtn);
                };
                el.appendChild(followBtn);
            }

            container.appendChild(el);
        }

        // --- Лента с пагинацией ---
        let lastVisiblePost = null;
        window.loadPosts = async (reset = false) => {
            const feed = document.getElementById('postsFeed');
            if(reset) { feed.innerHTML = ''; lastVisiblePost = null; }
            const oldBtn = document.getElementById('loadMoreBtn');
            if(oldBtn) oldBtn.remove();

            let q = lastVisiblePost 
                ? query(collection(db, "posts"), orderBy("createdAt", "desc"), startAfter(lastVisiblePost), limit(15))
                : query(collection(db, "posts"), orderBy("createdAt", "desc"), limit(15));

            try {
                const s = await getDocs(q);
                if (s.empty && reset) {
                    feed.innerHTML = '<div class="text-center text-gray-500 mt-8 p-6 bg-darkPanel rounded-custom border border-gray-800 text-base">Пока ничего нет. Напиши первый пост!</div>';
                    return;
                }
                for(const d of s.docs) await renderPost(d, feed);
                if (s.docs.length === 15) {
                    lastVisiblePost = s.docs[s.docs.length - 1];
                    const btn = document.createElement('button');
                    btn.id = 'loadMoreBtn';
                    btn.className = "w-full py-4 bg-darkPanel border border-gray-800 rounded-custom font-bold text-gray-400 hover:text-white hover:border-gray-600 transition mt-4 text-base";
                    btn.textContent = "Загрузить еще";
                    btn.onclick = () => loadPosts(false);
                    feed.appendChild(btn);
                }
            } catch(e) { showToast("Ошибка загрузки", "error"); }
        };

        window.loadRecs = async () => {
            const feed = document.getElementById('postsFeed');
            feed.innerHTML = '<div class="text-center py-10"><i class="bx bx-loader-alt bx-spin text-4xl text-primary"></i></div>';
            try {
                const s = await getDocs(query(collection(db, "posts"), limit(30))); 
                feed.innerHTML = '<div class="bg-primary/10 border border-primary/20 text-primary p-4 rounded-custom mb-4 font-bold flex items-center gap-2"><i class="bx bx-trending-up text-xl"></i> Рекомендации для вас</div>';
                const docs = s.docs.sort(() => 0.5 - Math.random()).slice(0, 10);
                for(const d of docs) await renderPost(d, feed);
            } catch(e) { showToast("Ошибка", "error"); }
        };

        // --- Поиск ---
        window.openSearch = () => {
            document.getElementById('searchModal').classList.remove('hidden');
            document.getElementById('searchInput').focus();
        };

        document.getElementById('searchInput').addEventListener('input', async (e) => {
            const val = e.target.value.toLowerCase();
            const results = document.getElementById('searchResults');
            if(val.length < 2) { results.innerHTML = '<div class="text-center text-gray-500 mt-8"><i class="bx bx-search text-5xl opacity-20 mb-3"></i><br>Введите запрос</div>'; return; }
            results.innerHTML = '<div class="text-center text-primary mt-8"><i class="bx bx-loader-alt bx-spin text-4xl"></i></div>';
            try {
                const snap = await getDocs(query(collection(db, "posts"), orderBy("createdAt", "desc"), limit(50)));
                results.innerHTML = '';
                let found = 0;
                for(const docSnap of snap.docs) {
                    const data = docSnap.data();
                    if (data.title?.toLowerCase().includes(val) || data.description?.toLowerCase().includes(val)) {
                        found++;
                        await renderPost(docSnap, results, true);
                    }
                }
                if(found === 0) results.innerHTML = '<div class="text-center text-gray-500 mt-8 text-base bg-[#121212] p-4 rounded-custom border border-gray-800">Ничего не найдено</div>';
            } catch(err) { results.innerHTML = '<div class="text-center text-red-500">Ошибка поиска</div>'; }

        // --- Создание поста ---
        document.getElementById('postImages').addEventListener('change', function() {
            const preview = document.getElementById('imagePreview');
            preview.innerHTML = '';

                const img = document.createElement('img');
                img.src = URL.createObjectURL(file);
                img.className = "w-16 h-16 object-cover rounded-xl border border-gray-700 shadow-md";
                preview.appendChild(img);

        document.getElementById('createPostForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('postSubmitBtn');
            btn.disabled = true; btn.innerHTML = "<i class='bx bx-loader-alt bx-spin'></i> Публикуем...";
            try {
                const files = document.getElementById('postImages').files;

                await addDoc(collection(db, "posts"), {
                    title: document.getElementById('postTitle').value,
                    description: document.getElementById('postDesc').value,
                    images: imageUrls,
                    authorId: currentUser.uid,

                });

                document.getElementById('imagePreview').innerHTML = '';
                showToast("Пост опубликован");

            finally { btn.disabled = false; btn.innerHTML = "Опубликовать"; }
        });

        async function uploadToImgBB(file) {
            const fd = new FormData(); fd.append('image', file);
            try {
                const r = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, {method:'POST',body:fd});
                return (await r.json()).data.url;
            } catch(e) { return null; }
        }

        // --- Редактирование профиля + настройка фона ---
        document.getElementById('editProfileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('editProfileSubmitBtn');

            try {
                const updates = { 
                    displayName: document.getElementById('editName').value, 
                    bio: document.getElementById('editBio').value 
                };
                const f = document.getElementById('editAvatar').files[0];
                if(f) updates.photoURL = await uploadToImgBB(f);
                await updateDoc(doc(db, "users", currentUser.uid), updates);

                document.getElementById('editProfileModal').classList.add('hidden');
                openProfile(currentUser.uid); 
                loadPosts(true); 
                showToast("Профиль обновлен");
            } catch(e) { showToast("Ошибка", "error"); }
            finally { btn.disabled = false; btn.textContent = "Сохранить"; }
        });

        // Применить фон
        document.getElementById('applyBgBtn').addEventListener('click', async () => {
            const color = document.getElementById('bgColorInput').value;
            document.body.style.backgroundColor = color;
            await updateDoc(doc(db, "users", currentUser.uid), { background: color });
            showToast("Фон изменён");

        // Открыть настройки (показываем модалку редактирования)
        window.openSettings = () => {
            document.getElementById('editProfileModal').classList.remove('hidden');
            // Заполним поля текущими данными
            if(currentUserData) {
                document.getElementById('editName').value = currentUserData.displayName || '';
                document.getElementById('editBio').value = currentUserData.bio || '';
                document.getElementById('bgColorInput').value = currentUserData.background || '#121212';
            }
        };

        // --- Зум изображений ---
        let zoomScale = 1;
        const vImg = document.getElementById('viewerImage');
        const imgZoomContainer = document.getElementById('imageZoomContainer');
        window.openImage = (url) => {
            zoomScale = 1; 
            vImg.style.transform = `scale(1)`;
            vImg.src = url; 
            document.getElementById('imageViewerModal').classList.remove('hidden');
        };
        window.closeImage = () => { document.getElementById('imageViewerModal').classList.add('hidden'); };
        imgZoomContainer.addEventListener('wheel', (e) => {
            e.preventDefault();
            zoomScale += e.deltaY * -0.002;
            zoomScale = Math.min(Math.max(0.5, zoomScale), 5);
            vImg.style.transform = `scale(${zoomScale})`;
        });
    </script>
</body>
</html>
