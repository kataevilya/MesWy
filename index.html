<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>MesWy - Лучшее хранение ваших сохранений</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #121212;
            --text-color: #ffffff;
            --panel-bg: #1e1e1e;
            --accent: #bb86fc;
            --hover-bg: #333333;
        }
        [data-theme="light"] {
            --bg-color: #f5f5f5;
            --text-color: #000000;
            --panel-bg: #ffffff;
            --accent: #6200ee;
            --hover-bg: #e0e0e0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; outline: none; }
        body { background: var(--bg-color); color: var(--text-color); display: flex; height: 100vh; overflow: hidden; transition: 0.3s; }
        
        .sidebar-left {
            width: 70px;
            background: var(--panel-bg);
            transition: width 0.3s ease;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--hover-bg);
            z-index: 10;
        }
        .sidebar-left:hover { width: 280px; }
        .nav-item {
            display: flex;
            align-items: center;
            padding: 20px;
            color: var(--text-color);
            text-decoration: none;
            cursor: pointer;
            white-space: nowrap;
            transition: 0.2s;
        }
        .nav-item:hover { background: var(--hover-bg); }
        .nav-item i { min-width: 30px; text-align: center; font-size: 22px; }
        .nav-item span { margin-left: 15px; opacity: 0; transition: opacity 0.3s; font-size: 16px; font-weight: bold; }
        .sidebar-left:hover .nav-item span { opacity: 1; }
        
        .feed {
            flex-grow: 1;
            padding: 30px;
            overflow-y: auto;
            background: var(--bg-color);
            position: relative;
        }
        .feed h2 { margin-bottom: 20px; font-size: 28px; }
        
        .post {
            background: var(--panel-bg);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 25px;
            border: 1px solid var(--hover-bg);
            max-width: 800px;
        }
        .post-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; cursor: pointer; }
        .post-avatar { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; background: var(--hover-bg); }
        .post-author { font-size: 18px; font-weight: bold; }
        .post-title { font-size: 22px; font-weight: bold; margin-bottom: 10px; color: var(--accent); }
        .post-desc { font-size: 16px; margin-bottom: 15px; line-height: 1.5; }
        .post-actions { display: flex; gap: 10px; flex-wrap: wrap; }
        
        .btn {
            padding: 12px 25px;
            border-radius: 30px;
            background: var(--accent);
            color: #fff;
            border: none;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            text-align: center;
            font-weight: bold;
            font-size: 16px;
            transition: 0.2s;
        }
        .btn:hover { opacity: 0.8; transform: scale(0.98); }
        .btn-danger { background: #ff4444; }
        .btn-secondary { background: var(--hover-bg); color: var(--text-color); }
        .btn-google { background: #fff; color: #000; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        .sidebar-right {
            width: 400px;
            background: var(--panel-bg);
            padding: 30px;
            border-left: 1px solid var(--hover-bg);
            display: none;
            flex-direction: column;
            align-items: center;
            position: absolute;
            right: 0;
            top: 0;
            height: 100%;
            z-index: 20;
            overflow-y: auto;
            box-shadow: -5px 0 25px rgba(0,0,0,0.5);
        }
        .close-profile {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 28px;
            cursor: pointer;
            color: var(--text-color);
            transition: 0.2s;
        }
        .close-profile:hover { color: var(--accent); }
        .profile-avatar-large {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
            background: var(--hover-bg);
            border: 4px solid var(--accent);
        }
        .profile-name { font-size: 28px; font-weight: bold; margin-bottom: 30px; text-align: center; }
        .profile-posts-container { width: 100%; }
        .profile-posts-container h3 { font-size: 20px; margin-bottom: 20px; border-bottom: 2px solid var(--hover-bg); padding-bottom: 10px; }
        
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .modal-content {
            background: var(--panel-bg);
            padding: 40px;
            border-radius: 25px;
            width: 500px;
            max-width: 90%;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .modal-content h3 { font-size: 26px; text-align: center; margin-bottom: 10px; }
        .modal-content input[type="text"], .modal-content textarea {
            padding: 15px;
            background: var(--bg-color);
            border: 2px solid var(--hover-bg);
            color: var(--text-color);
            border-radius: 15px;
            width: 100%;
            font-size: 16px;
        }
        .modal-content input[type="text"]:focus, .modal-content textarea:focus { border-color: var(--accent); }
        
        .file-upload-wrapper { position: relative; width: 100%; text-align: center; }
        .file-upload-wrapper input[type="file"] { display: none; }
        .file-upload-label {
            display: block;
            padding: 20px;
            background: var(--bg-color);
            border: 2px dashed var(--accent);
            color: var(--text-color);
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }
        .file-upload-label:hover { background: rgba(187, 134, 252, 0.1); transform: translateY(-2px); }
        .file-upload-label i { font-size: 28px; margin-bottom: 10px; display: block; color: var(--accent); }
        .file-name-display { margin-top: 10px; font-size: 14px; color: var(--accent); }

        #loadingOverlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 999;
            color: white;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            flex-direction: column;
            font-weight: bold;
        }
        .spinner {
            border: 6px solid var(--hover-bg);
            border-top: 6px solid var(--accent);
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loadingOverlay">
        <div class="spinner"></div>
        <span id="loadingText">загрузка...</span>
    </div>

    <nav class="sidebar-left">
        <div class="nav-item" onclick="openUploadModal()">
            <i class="fa-solid fa-cloud-arrow-up"></i>
            <span>загрузить сохранение</span>
        </div>
        <div class="nav-item" onclick="openMyProfile()">
            <i class="fa-solid fa-user-circle"></i>
            <span>мой профиль</span>
        </div>
        <div class="nav-item" onclick="openEditProfileModal()">
            <i class="fa-solid fa-user-pen"></i>
            <span>настроить профиль</span>
        </div>
        <div class="nav-item" onclick="changeTheme()">
            <i class="fa-solid fa-palette"></i>
            <span>смена темы</span>
        </div>
        <a class="nav-item" href="https://t.me/ryzik348" target="_blank">
            <i class="fa-brands fa-telegram"></i>
            <span>поддержка</span>
        </a>
        <div class="nav-item" onclick="logout()" style="margin-top: auto; color: #ff4444;">
            <i class="fa-solid fa-right-from-bracket"></i>
            <span>выйти</span>
        </div>
    </nav>

    <main class="feed">
        <h2>лента сохранений</h2>
        <div id="feedContainer"></div>
    </main>

    <aside class="sidebar-right" id="profilePanel">
        <i class="fa-solid fa-xmark close-profile" onclick="closeProfile()"></i>
        <img src="" id="profileAvatar" class="profile-avatar-large" alt="Аватар" onerror="this.src='https://via.placeholder.com/120?text=U'">
        <div class="profile-name" id="profileName">имя пользователя</div>
        <div class="profile-posts-container">
            <h3>посты пользователя</h3>
            <div id="profilePostsList"></div>
        </div>
    </aside>

    <div id="authModal" class="modal" style="display: flex;">
        <div class="modal-content">
            <h3>добро пожаловать в meswy</h3>
            <p style="text-align: center; color: #ccc;">войдите чтобы сохранять файлы</p>
            <button class="btn btn-google" onclick="loginGoogle()">
                <i class="fa-brands fa-google" style="font-size: 20px;"></i> войти через google
            </button>
        </div>
    </div>

    <div id="editProfileModal" class="modal">
        <div class="modal-content">
            <h3>настройки профиля</h3>
            <input type="text" id="editProfileName" placeholder="ваше имя">
            <input type="text" id="editProfileAvatarInput" placeholder="вставьте прямую ссылку на картинку аватарки">
            <button class="btn" onclick="saveProfileChanges()">сохранить профиль</button>
            <button class="btn" onclick="closeModals()" style="background: var(--hover-bg);">отмена</button>
        </div>
    </div>

    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <h3>новое сохранение</h3>
            <input type="text" id="postTitleInput" placeholder="название игры / сохранения">
            <textarea id="postDescInput" placeholder="описание вашего сохранения" rows="3"></textarea>
            
            <div class="file-upload-wrapper">
                <label for="postImageInput" class="file-upload-label">
                    <i class="fa-solid fa-image"></i>
                    скриншот игры (необязательно)
                </label>
                <input type="file" id="postImageInput" accept="image/*" onchange="updateFileName('postImageInput', 'imgFileName')">
                <div id="imgFileName" class="file-name-display"></div>
            </div>

            <div class="file-upload-wrapper">
                <label for="postFileInput" class="file-upload-label">
                    <i class="fa-solid fa-file-zipper"></i>
                    файл сохранения (.pc, .zip)
                </label>
                <input type="file" id="postFileInput" onchange="updateFileName('postFileInput', 'fileFileName')">
                <div id="fileFileName" class="file-name-display"></div>
            </div>

            <button class="btn" onclick="uploadPost()">опубликовать</button>
            <button class="btn" onclick="closeModals()" style="background: var(--hover-bg);">отмена</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // конфиг фаербейз без стораджа
        const firebaseConfig = {
            apiKey: "AIzaSyCBSWHaooqAwJTUjDhwjXKDN1z5locXCcM",
            authDomain: "meswy-web.firebaseapp.com",
            projectId: "meswy-web",
            appId: "1:802423553668:web:64be6aae3f34b2d0f88cd1"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let allPosts = [];

        window.updateFileName = (inputId, displayId) => {
            const input = document.getElementById(inputId);
            const display = document.getElementById(displayId);
            if(input.files.length > 0) {
                display.innerText = "выбран файл: " + input.files[0].name;
            } else {
                display.innerText = "";
            }
        }

        const showLoading = (text) => {
            document.getElementById('loadingText').innerText = text;
            document.getElementById('loadingOverlay').style.display = 'flex';
        }
        const hideLoading = () => { document.getElementById('loadingOverlay').style.display = 'none'; }

        window.loginGoogle = async () => {
            try {
                const provider = new GoogleAuthProvider();
                await signInWithPopup(auth, provider);
            } catch (error) {
                alert("ошибка входа: " + error.message);
            }
        }

        window.logout = async () => {
            await signOut(auth);
            window.location.reload();
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('authModal').style.display = 'none';
                loadFeed();
            } else {
                document.getElementById('authModal').style.display = 'flex';
            }
        });

        // функция загрузки файлов на бесплатный gofile
        async function uploadToGofile(file) {
            try {
                const serverReq = await fetch('https://api.gofile.io/servers');
                const serverData = await serverReq.json();
                const server = serverData.data.servers[0].name;

                const formData = new FormData();
                formData.append('file', file);
                
                const uploadReq = await fetch(`https://${server}.gofile.io/uploadFile`, {
                    method: 'POST',
                    body: formData
                });
                
                const uploadData = await uploadReq.json();
                if (uploadData.status === 'ok') {
                    return uploadData.data.downloadPage;
                } else {
                    throw new Error('ошибка сервера gofile');
                }
            } catch (e) {
                throw new Error('не удалось загрузить файл на сервер');
            }
        }

        async function loadFeed() {
            showLoading('загрузка ленты...');
            try {
                const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
                const querySnapshot = await getDocs(q);
                allPosts = [];
                querySnapshot.forEach((doc) => {
                    allPosts.push({ id: doc.id, ...doc.data() });
                });
                renderPosts(allPosts, 'feedContainer');
            } catch (e) {
                console.error("ошибка загрузки:", e);
            }
            hideLoading();
        }

        function renderPosts(postsArray, containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            
            if(postsArray.length === 0) {
                container.innerHTML = '<p style="color:#aaa;">здесь пока пусто</p>';
                return;
            }

            postsArray.forEach(post => {
                const isAuthor = currentUser && post.authorId === currentUser.uid;
                const postEl = document.createElement('div');
                postEl.className = 'post';
                postEl.innerHTML = `
                    <div class="post-header" onclick="openProfile('${post.authorId}', '${post.authorName}', '${post.authorAvatar}')">
                        <img src="${post.authorAvatar || 'https://via.placeholder.com/50?text=U'}" class="post-avatar" onerror="this.src='https://via.placeholder.com/50?text=U'">
                        <div class="post-author">${post.authorName}</div>
                    </div>
                    <div class="post-title">${post.title}</div>
                    <div class="post-desc">${post.desc}</div>
                    <div class="post-actions" style="margin-top: 15px;">
                        <a href="${post.fileUrl}" target="_blank" class="btn"><i class="fa-solid fa-download"></i> скачать файл</a>
                        ${post.imgUrl ? `<a href="${post.imgUrl}" target="_blank" class="btn btn-secondary"><i class="fa-solid fa-image"></i> скриншот</a>` : ''}
                        ${isAuthor ? `<button class="btn btn-danger" onclick="deletePost('${post.id}')"><i class="fa-solid fa-trash"></i></button>` : ''}
                    </div>
                `;
                container.appendChild(postEl);
            });
        }

        window.uploadPost = async () => {
            const title = document.getElementById('postTitleInput').value.trim();
            const desc = document.getElementById('postDescInput').value.trim();
            const imageFile = document.getElementById('postImageInput').files[0];
            const saveFile = document.getElementById('postFileInput').files[0];

            if(!title || !saveFile) {
                alert("укажите название и выберите файл сохранения");
                return;
            }

            showLoading('отправка файлов на сервер...');
            try {
                let imgUrl = "";
                if (imageFile) {
                    imgUrl = await uploadToGofile(imageFile);
                }

                const fileUrl = await uploadToGofile(saveFile);

                await addDoc(collection(db, "posts"), {
                    title: title,
                    desc: desc,
                    imgUrl: imgUrl,
                    fileUrl: fileUrl,
                    authorId: currentUser.uid,
                    authorName: currentUser.displayName || "без имени",
                    authorAvatar: currentUser.photoURL || "",
                    createdAt: serverTimestamp()
                });

                closeModals();
                loadFeed();
            } catch(e) {
                alert("ошибка публикации: " + e.message);
                hideLoading();
            }
        }

        window.deletePost = async (postId) => {
            if(confirm("удалить пост?")) {
                showLoading("удаление...");
                try {
                    await deleteDoc(doc(db, "posts", postId));
                    loadFeed();
                    if(document.getElementById('profilePanel').style.display === 'flex') {
                        closeProfile();
                    }
                } catch(e) {
                    alert("ошибка: " + e.message);
                }
                hideLoading();
            }
        }

        window.openProfile = (uid, name, avatar) => {
            document.getElementById('profileName').innerText = name || "пользователь";
            document.getElementById('profileAvatar').src = avatar || "https://via.placeholder.com/120?text=U";
            
            const userPosts = allPosts.filter(p => p.authorId === uid);
            renderPosts(userPosts, 'profilePostsList');
            
            document.getElementById('profilePanel').style.display = 'flex';
        }

        window.openMyProfile = () => {
            if(!currentUser) return;
            openProfile(currentUser.uid, currentUser.displayName, currentUser.photoURL);
        }

        window.closeProfile = () => {
            document.getElementById('profilePanel').style.display = 'none';
        }

        window.openEditProfileModal = () => {
            document.getElementById('editProfileName').value = currentUser.displayName || "";
            document.getElementById('editProfileAvatarInput').value = currentUser.photoURL || "";
            document.getElementById('editProfileModal').style.display = 'flex';
        }

        window.saveProfileChanges = async () => {
            const newName = document.getElementById('editProfileName').value.trim();
            const photoURL = document.getElementById('editProfileAvatarInput').value.trim();
            
            if(!newName) return alert("введите имя");
            
            showLoading("сохранение...");
            try {
                await updateProfile(currentUser, {
                    displayName: newName,
                    photoURL: photoURL
                });

                closeModals();
                loadFeed(); 
            } catch(e) {
                alert("ошибка: " + e.message);
            }
            hideLoading();
        }

        window.openUploadModal = () => {
            document.getElementById('postTitleInput').value = '';
            document.getElementById('postDescInput').value = '';
            document.getElementById('postImageInput').value = '';
            document.getElementById('postFileInput').value = '';
            document.getElementById('imgFileName').innerText = '';
            document.getElementById('fileFileName').innerText = '';
            document.getElementById('uploadModal').style.display = 'flex';
        }

        window.closeModals = () => {
            document.querySelectorAll('.modal').forEach(m => {
                if(m.id !== 'authModal' || currentUser) m.style.display = 'none';
            });
        }

        window.changeTheme = () => {
            const body = document.body;
            if (body.getAttribute('data-theme') === 'light') {
                body.removeAttribute('data-theme');
            } else {
                body.setAttribute('data-theme', 'light');
            }
        }
    </script>
</body>
</html>
