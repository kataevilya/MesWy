<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maksimka</title>
    <link rel="icon" href="icon.ico" type="image/x-icon">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- PWA Manifest (inline) -->
    <link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiTWFrc2lta2EiLCJzaG9ydF9uYW1lIjoiTWFrc2lta2EiLCJzdGFydF91cmwiOiIvIiwiaWNvbnMiOlt7InNyYyI6Imljb24uaWNvIiwic2l6ZXMiOiI2NHg2NCIsInR5cGUiOiJpbWFnZS94LWljb24ifV0sImRpc3BsYXkiOiJzdGFuZGFsb25lIn0=">
    <style>
        /* ===== Глобальные стили ===== */
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', system-ui, sans-serif; }
        body { background:#1e1e1e; color:#e0e0e0; height:100vh; display:flex; overflow:hidden; }

        /* Левая панель */
        .sidebar {
            width:280px; background:#2d2d2d; border-right:1px solid #3a3a3a;
            display:flex; flex-direction:column; flex-shrink:0; overflow:hidden;
            transition:transform 0.3s ease;
        }
        .sidebar-header {
            display:flex; align-items:center; padding:16px 12px; gap:12px;
            border-bottom:1px solid #3a3a3a;
        }
        .sidebar-header img { width:36px; height:36px; border-radius:50%; }
        .sidebar-header span { font-size:20px; font-weight:600; color:#fff; }
        .sidebar-nav { flex:1; overflow-y:auto; padding:8px 0; }
        .nav-item {
            display:flex; align-items:center; gap:14px; padding:10px 20px;
            cursor:pointer; transition:background 0.15s; border-radius:8px;
            margin:2px 8px; color:#b0b0b0;
        }
        .nav-item:hover, .nav-item.active { background:#3a3a3a; color:#fff; }
        .nav-item i { width:24px; text-align:center; font-size:18px; }
        .nav-item .label { font-size:15px; flex:1; }
        .sidebar-footer { border-top:1px solid #3a3a3a; padding:8px 12px; }
        .sidebar-footer .nav-item { margin:0; border-radius:8px; }

        /* Основная область */
        .main { flex:1; display:flex; flex-direction:column; background:#1e1e1e; }
        .chat-header {
            padding:10px 16px; background:#2d2d2d; border-bottom:1px solid #3a3a3a;
            display:flex; align-items:center; gap:12px; flex-wrap:wrap;
            min-height:60px;
        }
        .chat-header .avatar { width:40px; height:40px; border-radius:50%; background:#555; display:flex; align-items:center; justify-content:center; font-size:18px; color:#fff; flex-shrink:0; }
        .chat-header .info { flex:1; min-width:80px; }
        .chat-header .info .name { font-weight:600; font-size:16px; color:#fff; }
        .chat-header .info .status { font-size:13px; color:#8e8e8e; }
        .chat-header .actions { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
        .chat-header .actions button {
            background:none; border:none; color:#b0b0b0; font-size:18px; cursor:pointer;
            padding:4px 8px; border-radius:6px; transition:background 0.2s;
        }
        .chat-header .actions button:hover { background:#3a3a3a; color:#fff; }
        .greeting-btn { background:#3a6b8c; border:none; color:#fff; padding:4px 14px; border-radius:16px; font-size:13px; cursor:pointer; }
        .greeting-btn:hover { background:#4a7b9c; }

        /* Сообщения */
        .messages {
            flex:1; overflow-y:auto; padding:16px; background:#1e1e1e;
            display:flex; flex-direction:column; gap:6px; background-size:cover; background-position:center;
        }
        .message {
            max-width:70%; padding:8px 14px; border-radius:16px; background:#2d2d2d;
            align-self:flex-start; word-wrap:break-word; position:relative; cursor:default;
        }
        .message.own { align-self:flex-end; background:#3a6b8c; }
        .message .time { font-size:11px; color:#888; margin-top:4px; text-align:right; }
        .message .file-attach { display:block; margin:4px 0; background:#1e1e1e; padding:4px 8px; border-radius:8px; font-size:13px; color:#b0b0b0; text-decoration:none; word-break:break-all; }
        .message .file-attach img, .message .file-attach video { max-width:100%; max-height:300px; border-radius:8px; }
        .message .reactions { display:flex; gap:4px; margin-top:4px; flex-wrap:wrap; }
        .message .reactions span { background:#3a3a3a; padding:0 6px; border-radius:12px; font-size:14px; }

        /* Контекстное меню */
        .context-menu {
            display:none; position:fixed; background:#2d2d2d; border:1px solid #3a3a3a;
            border-radius:8px; padding:6px 0; min-width:160px; z-index:1000;
            box-shadow:0 8px 16px rgba(0,0,0,0.6);
        }
        .context-menu .item { padding:8px 16px; cursor:pointer; font-size:14px; color:#e0e0e0; transition:background 0.1s; display:flex; align-items:center; gap:8px; }
        .context-menu .item:hover { background:#3a3a3a; }
        .context-menu .item i { width:20px; }

        /* Поле ввода */
        .input-area {
            padding:10px 16px; background:#2d2d2d; border-top:1px solid #3a3a3a;
            display:flex; gap:10px; align-items:flex-end;
        }
        .input-area .attach-btn { background:none; border:none; color:#b0b0b0; font-size:22px; cursor:pointer; padding:4px 8px; }
        .input-area .attach-btn:hover { color:#fff; }
        .input-area .message-input {
            flex:1; background:#1e1e1e; border:1px solid #3a3a3a; border-radius:20px;
            padding:8px 16px; color:#e0e0e0; font-size:15px; outline:none; resize:none; max-height:120px;
        }
        .input-area .message-input:focus { border-color:#5a7a9a; }
        .input-area .send-btn { background:#3a6b8c; border:none; color:#fff; font-size:18px; padding:6px 16px; border-radius:20px; cursor:pointer; }
        .input-area .send-btn:hover { background:#4a7b9c; }

        /* Список чатов */
        .chat-list { padding:8px 12px; overflow-y:auto; flex:1; }
        .chat-item {
            display:flex; align-items:center; gap:12px; padding:8px 10px;
            border-radius:8px; cursor:pointer; transition:background 0.15s; margin-bottom:2px;
        }
        .chat-item:hover { background:#3a3a3a; }
        .chat-item.active { background:#3a3a3a; }
        .chat-item .avatar { width:40px; height:40px; border-radius:50%; background:#555; display:flex; align-items:center; justify-content:center; font-size:18px; color:#fff; flex-shrink:0; }
        .chat-item .details { flex:1; min-width:0; }
        .chat-item .details .name { font-weight:500; color:#fff; }
        .chat-item .details .last-msg { font-size:13px; color:#8e8e8e; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .chat-item .details .time { font-size:11px; color:#6e6e6e; float:right; }

        /* Пустое состояние */
        .empty-state { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#6e6e6e; gap:12px; }
        .empty-state i { font-size:64px; }
        .empty-state .text { font-size:20px; }
        .empty-state .sub { font-size:14px; }

        /* Модалка настроек */
        .modal {
            display:none; position:fixed; top:0; left:0; width:100%; height:100%;
            background:rgba(0,0,0,0.7); justify-content:center; align-items:center; z-index:999;
        }
        .modal.active { display:flex; }
        .modal-content {
            background:#2d2d2d; border-radius:16px; padding:24px 28px; width:400px; max-width:90%;
            color:#e0e0e0;
        }
        .modal-content h2 { margin-bottom:16px; font-weight:400; }
        .modal-content label { display:block; margin-top:12px; font-size:14px; color:#b0b0b0; }
        .modal-content input, .modal-content textarea {
            width:100%; background:#1e1e1e; border:1px solid #3a3a3a; border-radius:8px;
            padding:8px 12px; color:#e0e0e0; margin-top:4px;
        }
        .modal-content .avatar-preview {
            width:80px; height:80px; border-radius:50%; background:#555;
            display:flex; align-items:center; justify-content:center; font-size:32px;
            margin:8px auto; cursor:pointer; overflow:hidden;
        }
        .modal-content .avatar-preview img { width:100%; height:100%; object-fit:cover; }
        .modal-content .btn-row { display:flex; gap:12px; margin-top:20px; justify-content:flex-end; }
        .modal-content .btn-row button { padding:8px 20px; border:none; border-radius:8px; background:#3a6b8c; color:#fff; cursor:pointer; }
        .modal-content .btn-row button:hover { background:#4a7b9c; }
        .modal-content .btn-row button.cancel { background:#555; }
        .modal-content .btn-row button.cancel:hover { background:#666; }

        /* Мобильный адаптив */
        @media (max-width:600px) {
            .sidebar { position:fixed; top:0; left:0; bottom:0; width:260px; transform:translateX(-100%); z-index:100; }
            .sidebar.open { transform:translateX(0); }
            .hamburger { display:block !important; }
        }
        .hamburger { display:none; background:none; border:none; color:#fff; font-size:24px; cursor:pointer; padding:0 8px; }
        /* Стили для вкладок (панель контента) */
        .tab-content { display:none; flex:1; flex-direction:column; }
        .tab-content.active { display:flex; }
        /* Список звонков, каналов, групп (заглушки) */
        .tab-placeholder { flex:1; display:flex; align-items:center; justify-content:center; color:#6e6e6e; flex-direction:column; gap:12px; }
        .tab-placeholder i { font-size:48px; }
    </style>
</head>
<body>

<!-- Левая панель -->
<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <img src="icon.ico" alt="logo" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect fill=%22%23333%22 width=%22100%22 height=%22100%22/%3E%3Ctext x=%2220%22 y=%2265%22 font-size=%2240%22 fill=%22%23fff%22%3EM%3C/text%3E%3C/svg%3E'">
        <span>Maksimka</span>

    <div class="sidebar-nav">
        <div class="nav-item active" data-tab="chats">

        </div>
        <div class="nav-item" data-tab="channels">
            <i class="fas fa-bullhorn"></i><span class="label">Каналы</span>
        </div>
        <div class="nav-item" data-tab="groups">
            <i class="fas fa-users"></i><span class="label">Группы</span>
        </div>
    </div>

        <div class="nav-item" id="settingsBtn">
            <i class="fas fa-cog"></i><span class="label">Настройки</span>

        <div class="nav-item" id="myIdBtn">
            <i class="fas fa-id-card"></i><span class="label">Мой ID</span>
        </div>
    </div>
</div>

<!-- Основная область -->
<div class="main">
    <!-- Шапка чата (скрыта, пока нет чата) -->
    <div class="chat-header" id="chatHeader" style="display:none;">
        <button class="hamburger" id="hamburgerBtn"><i class="fas fa-bars"></i></button>
        <div class="avatar" id="chatAvatar">😀</div>
        <div class="info">
            <div class="name" id="chatName">Имя</div>
            <div class="status" id="chatStatus">онлайн</div>
        </div>

            <button id="callBtn" title="Позвонить"><i class="fas fa-phone"></i></button>

    <!-- Контейнер для вкладок -->
    <div style="flex:1; display:flex; flex-direction:column; overflow:hidden;">

                <i class="fas fa-phone"></i>
                <div>История звонков появится здесь</div>
                <div style="font-size:13px; color:#8e8e8e;">(в разработке)</div>
            </div>
        </div>
        <!-- Вкладка "Каналы" -->
        <div class="tab-content" id="tab-channels">
            <div class="tab-placeholder">
                <i class="fas fa-bullhorn"></i>
                <div>Ваши каналы</div>
                <div style="font-size:13px; color:#8e8e8e;">(в разработке)</div>
            </div>

        <!-- Вкладка "Группы" -->
        <div class="tab-content" id="tab-groups">

                <i class="fas fa-users"></i>

            </div>

</div>

<!-- Модалка настроек -->
<div class="modal" id="settingsModal">
    <div class="modal-content">
        <h2><i class="fas fa-user-cog"></i> Настройки</h2>
        <label>Аватар</label>
        <div class="avatar-preview" id="avatarPreview" onclick="document.getElementById('avatarInput').click()">
            <span id="avatarEmoji">😀</span>
        </div>
        <input type="file" id="avatarInput" accept="image/*" style="display:none">

        <input type="text" id="profileName" placeholder="Ваше имя" value="Пользователь">

        <textarea id="profileBio" placeholder="О себе" rows="2"></textarea>

        <input type="text" id="backgroundUrl" placeholder="https://...">

        </div>
    </div>
</div>

<!-- Контекстное меню -->
<div class="context-menu" id="contextMenu">
    <div class="item" data-action="react"><i class="fas fa-smile"></i> Реакция 😊</div>
    <div class="item" data-action="edit"><i class="fas fa-edit"></i> Изменить</div>
    <div class="item" data-action="delete"><i class="fas fa-trash"></i> Удалить</div>
</div>

<!-- Подключение библиотек -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gun/0.9.99/gun.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/simple-peer/9.11.1/simplepeer.min.js"></script>

<script>
// ================================================================
// Инициализация Gun (децентрализованная БД)
// ================================================================
const gun = Gun(['https://gun-manhattan.herokuapp.com/gun']); // публичный relay

// ================================================================
// Пользователь
// ================================================================
let MY_ID = localStorage.getItem('maksimka_id');
if (!MY_ID) {
    MY_ID = 'user_' + Date.now().toString(36) + Math.random().toString(36).substr(2, 6);
    localStorage.setItem('maksimka_id', MY_ID);
}
let myName = localStorage.getItem('maksimka_name') || 'Пользователь';
let myAvatar = localStorage.getItem('maksimka_avatar') || '😀';
let myBio = localStorage.getItem('maksimka_bio') || '';
let myBackground = localStorage.getItem('maksimka_background') || '';

// Сохраняем профиль в Gun
const userProfile = gun.get('profiles').get(MY_ID);
userProfile.put({ name: myName, avatar: myAvatar, bio: myBio, background: myBackground });

// ================================================================
// Состояние приложения
// ================================================================
let currentChatId = null;
let allChats = {}; // chatId -> { id, participant, name, avatar, lastMsg, lastMsgTime }
let allMessages = {}; // chatId -> [msg, ...]
let currentPeer = null;
let callActive = false;

// DOM элементы
const sidebar = document.getElementById('sidebar');
const messagesContainer = document.getElementById('messagesContainer');
const emptyState = document.getElementById('emptyState');
const chatHeader = document.getElementById('chatHeader');
const inputArea = document.getElementById('inputArea');
const chatName = document.getElementById('chatName');
const chatAvatar = document.getElementById('chatAvatar');
const chatStatus = document.getElementById('chatStatus');
const messageInput = document.getElementById('messageInput');
const sendBtn = document.getElementById('sendBtn');
const attachBtn = document.getElementById('attachBtn');
const greetingBtn = document.getElementById('greetingBtn');
const callBtn = document.getElementById('callBtn');
const settingsBtn = document.getElementById('settingsBtn');
const contextMenu = document.getElementById('contextMenu');

// ================================================================
// Работа с чатами через Gun
// ================================================================
function getChatsRef() { return gun.get('chats'); }
function getMessagesRef(chatId) { return gun.get('messages').get(chatId); }

// Подписка на обновления чатов (всех, где участвует пользователь)
gun.get('chats').map().on((data, chatId) => {
    if (!data) return;
    // Проверяем, участвует ли пользователь
    if (data.participant1 === MY_ID || data.participant2 === MY_ID) {
        // Обновить локальный кэш
        const other = data.participant1 === MY_ID ? data.participant2 : data.participant1;
        // Получаем профиль собеседника
        gun.get('profiles').get(other).once((profile) => {
            const chat = {
                id: chatId,
                participant: other,
                name: profile ? profile.name : 'Неизвестный',
                avatar: profile ? profile.avatar : '😀',
                lastMsg: data.lastMsg || '',
                lastMsgTime: data.lastMsgTime || 0
            };
            allChats[chatId] = chat;
            renderChatList();
            // Если текущий чат открыт, обновить шапку
            if (currentChatId === chatId) {
                chatName.textContent = chat.name;
                chatAvatar.textContent = chat.avatar;
            }
        });
    }
});

// Подписка на новые сообщения в чатах, где участвуем
gun.get('messages').map().on((msgs, chatId) => {
    if (!msgs) return;
    // Если это наш чат, то msgs - это объект сообщений (ключ - id сообщения)
    // Проверим, есть ли у нас этот чат в allChats
    if (allChats[chatId]) {
        // Обновим список сообщений
        const messages = [];
        for (let msgId in msgs) {
            const m = msgs[msgId];
            if (m) {
                messages.push({
                    id: msgId,
                    sender: m.sender,
                    text: m.text,
                    type: m.type || 'text',
                    file_path: m.file_path || '',
                    timestamp: m.timestamp || 0,
                    reactions: m.reactions || []
                });
            }
        }
        messages.sort((a,b) => a.timestamp - b.timestamp);
        allMessages[chatId] = messages;
        if (currentChatId === chatId) {
            renderMessages(chatId);
            // Показать уведомление, если сообщение не от нас
            const last = messages[messages.length-1];
            if (last && last.sender !== MY_ID) {
                showNotification(`${allChats[chatId].name}`, last.text);
            }
        }
    }
});

// ================================================================
// Функции чатов
// ================================================================
function getOrCreateChat(otherUserId) {
    // Поиск существующего чата
    for (let id in allChats) {
        const chat = allChats[id];
        if (chat.participant === otherUserId) return id;
    }
    // Создаём новый чат
    const chatId = 'chat_' + Date.now().toString(36) + Math.random().toString(36).substr(2, 4);
    const chatData = {
        participant1: MY_ID,
        participant2: otherUserId,
        lastMsg: '',
        lastMsgTime: Date.now()
    };
    getChatsRef().get(chatId).put(chatData);
    return chatId;
}

function sendMessageToGun(chatId, text, type = 'text', filePath = null) {
    const msgId = 'msg_' + Date.now().toString(36) + Math.random().toString(36).substr(2, 4);
    const msgData = {
        sender: MY_ID,
        text: text || '',
        type: type,
        file_path: filePath || '',
        timestamp: Date.now(),
        reactions: []
    };
    getMessagesRef(chatId).get(msgId).put(msgData);
    // Обновить lastMsg в чате
    const chatRef = getChatsRef().get(chatId);
    chatRef.get('lastMsg').put(text || (type === 'photo' ? '📷 Фото' : type === 'video' ? '🎥 Видео' : '📎 Файл'));
    chatRef.get('lastMsgTime').put(Date.now());
    // Оптимистичное добавление в локальный кэш
    if (!allMessages[chatId]) allMessages[chatId] = [];
    allMessages[chatId].push({
        id: msgId,
        sender: MY_ID,
        text: text,
        type: type,
        file_path: filePath,
        timestamp: Date.now(),
        reactions: []
    });
    if (currentChatId === chatId) renderMessages(chatId);
}

// ================================================================
// Рендеринг
// ================================================================
function renderChatList() {
    const list = document.querySelector('.chat-list');
    if (!list) return;
    list.innerHTML = '';
    // Сортировка по времени
    const sorted = Object.values(allChats).sort((a,b) => b.lastMsgTime - a.lastMsgTime);
    sorted.forEach(chat => {
        const item = document.createElement('div');
        item.className = 'chat-item';
        if (chat.id === currentChatId) item.classList.add('active');
        item.dataset.chatId = chat.id;
        const time = chat.lastMsgTime ? new Date(chat.lastMsgTime).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '';
        item.innerHTML = `
            <div class="avatar">${chat.avatar || '😀'}</div>
            <div class="details">
                <div class="name">${chat.name}</div>
                <div class="last-msg">${chat.lastMsg || 'Нет сообщений'}</div>
                <div class="time">${time}</div>
            </div>
        `;
        item.addEventListener('click', () => openChat(chat.id));
        list.appendChild(item);
    });
}

function renderMessages(chatId) {
    const container = messagesContainer;
    container.innerHTML = '';
    const msgs = allMessages[chatId] || [];
    if (msgs.length === 0) {
        container.appendChild(emptyState);
        emptyState.style.display = 'flex';
        return;
    }
    emptyState.style.display = 'none';
    msgs.forEach(msg => {
        const div = document.createElement('div');
        div.className = `message ${msg.sender === MY_ID ? 'own' : ''}`;
        div.dataset.msgId = msg.id;
        let content = '';
        if (msg.type === 'text') {
            content = `<div>${msg.text}</div>`;
        } else if (msg.type === 'photo' || msg.type === 'video' || msg.type === 'file') {
            const filePath = msg.file_path;
            if (filePath && filePath.startsWith('data:')) {
                // base64
                if (msg.type === 'photo') {
                    content = `<img src="${filePath}" alt="photo" style="max-width:100%;max-height:300px;border-radius:8px;">`;
                } else if (msg.type === 'video') {
                    content = `<video controls style="max-width:100%;max-height:300px;border-radius:8px;"><source src="${filePath}"></video>`;
                } else {
                    content = `<a href="${filePath}" download class="file-attach">📎 ${msg.text || 'Файл'}</a>`;
                }
            } else {
                content = `<div>${msg.text || 'Файл'}</div>`;
            }
        }
        div.innerHTML = content;
        // Время
        const timeDiv = document.createElement('div');
        timeDiv.className = 'time';
        timeDiv.textContent = new Date(msg.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        div.appendChild(timeDiv);
        // Реакции
        if (msg.reactions && msg.reactions.length > 0) {
            const reactDiv = document.createElement('div');
            reactDiv.className = 'reactions';
            msg.reactions.forEach(r => {
                const span = document.createElement('span');
                span.textContent = r.emoji;
                reactDiv.appendChild(span);
            });
            div.appendChild(reactDiv);
        }
        // Долгое нажатие
        let timer;
        div.addEventListener('mousedown', (e) => {
            timer = setTimeout(() => showContextMenu(e.clientX, e.clientY, msg.id), 600);
        });
        div.addEventListener('mouseup', () => clearTimeout(timer));
        div.addEventListener('mouseleave', () => clearTimeout(timer));
        div.addEventListener('touchstart', (e) => {
            timer = setTimeout(() => showContextMenu(e.touches[0].clientX, e.touches[0].clientY, msg.id), 600);
        });
        div.addEventListener('touchend', () => clearTimeout(timer));
        div.addEventListener('touchmove', () => clearTimeout(timer));

        container.appendChild(div);
    });
    container.scrollTop = container.scrollHeight;
}

// ================================================================
// Открытие чата
// ================================================================
function openChat(chatId) {
    currentChatId = chatId;
    const chat = allChats[chatId];
    if (!chat) return;
    chatHeader.style.display = 'flex';
    inputArea.style.display = 'flex';
    chatName.textContent = chat.name;
    chatAvatar.textContent = chat.avatar || '😀';
    chatStatus.textContent = 'онлайн';
    // Загрузить сообщения из Gun (они уже подписаны)
    renderMessages(chatId);
    document.querySelectorAll('.chat-item').forEach(el => {
        el.classList.toggle('active', el.dataset.chatId === chatId);
    });
    sidebar.classList.remove('open');
    hideContextMenu();
}

// ================================================================
// Отправка сообщения
// ================================================================
async function sendMessage(text, type = 'text', fileData = null) {
    if (!currentChatId) {
        // Если чата нет, создаём нового собеседника? Но мы не знаем кому.
        // В этом случае мы должны выбрать чат.
        alert('Сначала выберите чат.');
        return;
    }
    if (!text && !fileData) return;
    let filePath = fileData;
    if (fileData && typeof fileData === 'object' && fileData instanceof File) {
        // Преобразуем в base64
        filePath = await fileToBase64(fileData);
    }
    sendMessageToGun(currentChatId, text, type, filePath);
    // Очистка поля
    messageInput.value = '';
    messageInput.style.height = 'auto';
}

function fileToBase64(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
    });
}

// ================================================================
// Файлы через attach
// ================================================================
attachBtn.addEventListener('click', () => {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*,video/*,.pdf,.doc,.docx,.txt,.zip,.rar';
    input.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        let type = 'file';
        if (file.type.startsWith('image/')) type = 'photo';
        else if (file.type.startsWith('video/')) type = 'video';
        await sendMessage(file.name, type, file);
    };
    input.click();
});

// ================================================================
// Контекстное меню
// ================================================================
let contextMsgId = null;
function showContextMenu(x, y, msgId) {
    contextMenu.style.display = 'block';
    contextMenu.style.left = x + 'px';
    contextMenu.style.top = y + 'px';
    contextMsgId = msgId;
}
function hideContextMenu() {
    contextMenu.style.display = 'none';
    contextMsgId = null;
}
document.addEventListener('click', hideContextMenu);

document.querySelectorAll('#contextMenu .item').forEach(el => {
    el.addEventListener('click', () => {
        const action = el.dataset.action;
        if (!contextMsgId || !currentChatId) return;
        if (action === 'react') {
            // Добавить реакцию в Gun
            const msgRef = getMessagesRef(currentChatId).get(contextMsgId);
            msgRef.once((data) => {
                if (data) {
                    const reactions = data.reactions || [];
                    // Проверим, есть ли уже реакция от этого пользователя
                    const existing = reactions.find(r => r.userId === MY_ID);
                    if (existing) {
                        existing.emoji = '😊';
                    } else {
                        reactions.push({ userId: MY_ID, emoji: '😊' });
                    }
                    msgRef.get('reactions').put(reactions);
                }
            });
        } else if (action === 'edit') {
            const newText = prompt('Изменить сообщение:');
            if (newText !== null && newText.trim()) {
                getMessagesRef(currentChatId).get(contextMsgId).get('text').put(newText.trim());
                // Локально обновим
                const msgs = allMessages[currentChatId] || [];
                const m = msgs.find(m => m.id === contextMsgId);
                if (m) m.text = newText.trim();
                renderMessages(currentChatId);
            }
        } else if (action === 'delete') {
            if (confirm('Удалить сообщение?')) {
                getMessagesRef(currentChatId).get(contextMsgId).put(null);
                // Локально удалим
                allMessages[currentChatId] = (allMessages[currentChatId] || []).filter(m => m.id !== contextMsgId);
                renderMessages(currentChatId);
                // Обновить lastMsg в чате
                const msgs = allMessages[currentChatId] || [];
                const last = msgs[msgs.length-1];
                const chatRef = getChatsRef().get(currentChatId);
                chatRef.get('lastMsg').put(last ? last.text : '');
                chatRef.get('lastMsgTime').put(last ? last.timestamp : Date.now());
            }
        }
        hideContextMenu();
    });
});

greetingBtn.addEventListener('click', async () => {

// ================================================================
// Звонки (WebRTC)
// ================================================================
callBtn.addEventListener('click', () => {
    if (!currentChatId) return;
    const chat = allChats[currentChatId];
    if (!chat) return;
    // Инициируем звонок
    startWebRTC(chat.participant, currentChatId, false);
});

function startWebRTC(targetUserId, chatId, isAnswer) {
    if (callActive) {
        alert('Звонок уже активен');
        return;
    }
    callActive = true;
    const peer = new SimplePeer({
        initiator: !isAnswer,
        trickle: false
    });

    peer.on('signal', (data) => {
        // Отправляем сигнал через Gun
        const signalKey = 'webrtc_' + chatId + '_' + targetUserId;
        gun.get(signalKey).put({
            from: MY_ID,
            type: data.type,
            data: data,
            target: targetUserId,
            chatId: chatId
        });
    });

    peer.on('connect', () => {
        console.log('WebRTC connected');
        chatStatus.textContent = 'В звонке...';
        // Отправить сообщение о начале звонка
    });

    peer.on('data', (data) => {
        console.log('Data received:', data.toString());
    });

    peer.on('close', () => {
        console.log('WebRTC closed');
        callActive = false;
        currentPeer = null;
        chatStatus.textContent = 'онлайн';
    });

    peer.on('error', (err) => {
        console.error('WebRTC error', err);
        callActive = false;
        currentPeer = null;
        chatStatus.textContent = 'ошибка';
    });

    currentPeer = peer;

    // Если исходящий звонок, отправляем уведомление (через Gun)
    if (!isAnswer) {
        const callNotify = gun.get('calls').get(chatId).get('incoming');
        callNotify.put({ from: MY_ID, target: targetUserId, timestamp: Date.now() });
    }
}

// Подписка на сигналы WebRTC (входящие)
gun.get('webrtc_*').on((data, key) => {
    if (!data) return;
    // Проверяем, что это для нас
    if (data.target === MY_ID) {
        // Обрабатываем сигнал
        if (!currentPeer) {
            // Если пришёл offer, создаём peer как ответчик
            if (data.type === 'offer') {
                // Показываем уведомление о входящем звонке
                if (confirm(`Входящий звонок от ${data.from}. Принять?`)) {
                    startWebRTC(data.from, data.chatId, true);
                    // Отправить сигнал обратно
                    setTimeout(() => {
                        if (currentPeer) {
                            currentPeer.signal(data.data);
                        }
                    }, 100);
                } else {
                    // Отклонить
                    gun.get('webrtc_' + data.chatId + '_' + data.from).put(null);
                }
            }
        } else {
            // Передаём сигнал
            try {
                currentPeer.signal(data.data);
            } catch (e) {}
        }
    }
});

// Подписка на входящие звонки (уведомления)
gun.get('calls').map().on((data, chatId) => {
    if (data && data.incoming && data.incoming.target === MY_ID) {
        // Показать уведомление о звонке (если ещё не обработано)
        if (!callActive) {
            const from = data.incoming.from;
            // Получаем имя собеседника
            gun.get('profiles').get(from).once((profile) => {
                const name = profile ? profile.name : from;
                if (confirm(`Входящий звонок от ${name}. Принять?`)) {
                    startWebRTC(from, chatId, true);
                } else {
                    // Отклонить
                    gun.get('calls').get(chatId).get('incoming').put(null);
                }
            });
        }
    }
});

// ================================================================
// Уведомления (кастомные)
// ================================================================
function showNotification(title, body) {
    if (!('Notification' in window)) return;
    if (Notification.permission === 'granted') {
        new Notification(title, { body, icon: 'icon.ico' });
    } else if (Notification.permission !== 'denied') {
        Notification.requestPermission().then(perm => {
            if (perm === 'granted') {
                new Notification(title, { body, icon: 'icon.ico' });
            }
        });
    }
}

// Запрашиваем разрешение при загрузке
if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
}

        reader.onload = (ev) => {
            document.getElementById('avatarEmoji').textContent = '🖼️';

                emptyState.style.display = 'flex';

});

// ================================================================
// Инициализация: загружаем профили собеседников для чатов

    if (data && allChats) {
        for (let chatId in allChats) {
            const chat = allChats[chatId];
            if (chat.participant === userId) {
                chat.name = data.name || 'Неизвестный';
                chat.avatar = data.avatar || '😀';
                renderChatList();
                if (currentChatId === chatId) {
                    chatName.textContent = chat.name;
                    chatAvatar.textContent = chat.avatar;
                }
            }
        }
    }
});

    messagesContainer.style.backgroundImage = `url(${myBackground})`;
}

// Service Worker для PWA (inline)
if ('serviceWorker' in navigator) {
    const swCode = `
        self.addEventListener('install', e => e.waitUntil(skipWaiting()));
        self.addEventListener('activate', e => e.waitUntil(clients.claim()));
        self.addEventListener('fetch', e => e.respondWith(fetch(e.request)));
    `;
    const blob = new Blob([swCode], { type: 'application/javascript' });
    const swUrl = URL.createObjectURL(blob);
    navigator.serviceWorker.register(swUrl, { scope: '/' })
        .then(() => console.log('Service Worker registered'))
        .catch(err => console.error('SW registration failed', err));
}
